          画像の雰囲気はスマホと鍵、パスワード管理、連鎖被害の可視化、警告感と安心感、白と水色を基調にした実用解説で生成してください。下部20%は字幕とキャラクター用に余白を残し、実在ブランド、実在UI、会話全文、長文日本語、細かい表、ウォーターマークは入れないでください。
