meta:
  id: "ep010-zundamon-morning-focus"
  episode_id: "ep010-zundamon-morning-focus"
  layout_template: "Scene12"
  character_pair: "ZM"
  pair: "ZM"
  title: "朝の集中力が落ちるNG習慣"
  fps: 30
  width: 1280
  height: 720
  audience: "初心者向け"
  tone: "やさしく実用的"
  voice_engine: "voicevox"
  target_duration_sec: 180
characters:
  left:
    character: "zundamon"
    voicevox_speaker_id: 3
  right:
    character: "metan"
    voicevox_speaker_id: 2
scenes:
  - id: s01
    role: intro
    title_text: "朝の集中力、最初で決まる"
    main:
      kind: image
      asset: assets/s01_main.png
      caption: "朝の集中スイッチ"
      image_direction:
        scene_id: s01
        dialogue_role: 冒頭フック
        scene_emotion: ワクワク
        visual_type: hook_poster
        composition_type: desk_top_down
        image_should_support: "ずんだもんが朝の集中力は才能ではなく、最初の行動で崩れると気づく冒頭"
        key_visual_sentence: "朝の机に、スマホ通知、白いノート、湯気のある飲み物が並ぶ"
        main_subject: "朝の作業机と集中スイッチの抽象表現"
        foreground: "通知が光るスマホと小さな集中スイッチ"
        midground: "開いたノート、ペン、湯気のあるマグ"
        background: "柔らかい朝日と薄い教室風の壁"
        color_palette: "コーラルピンク、ミント、クリーム、淡い紫"
        text_strategy:
          image_text_allowed: false
          image_text_max_words: 0
        layout_safety:
          keep_bottom_20_percent_empty: true
          avoid_character_area: true
          avoid_sub_area_overlap: true
        must_not_include: [ "実在アプリ", "実在ロゴ", "既存キャラ", "長文日本語", "人物の顔" ]
        quality_bar: "朝の気分と集中の崩れが同時に伝わる、やさしい教育イラスト"
      asset_requirements:
        imagegen_prompt: |
          ずんだもん解説のScene01メイン枠で使う hook_poster 型ビジュアル。構図は机の上を見下ろす desk top down で、前景に通知が光るスマホと小さな集中スイッチ、中景に開いたノート、ペン、湯気のあるマグ、背景に柔らかい朝日と薄い教室風の壁を置く。soft flat illustration, gentle rounded shapes, warm coral-pink palette (#FF7043 #EC407A), mint accents, soft shadows, top-left morning light。16:9、designed for 1920x1080 display, clean edges for video rendering。下部20%は字幕とキャラ用に空け、Remotion で正確な日本語タイトルを重ねる余白を上部に残す。文字方針：画像内文字は入れない。禁止：実在アプリ、実在ロゴ、既存キャラクター、写真風人物、長文テキスト、単体アイコンだけの無背景素材、細かい表、watermark。
        style: "soft flat illustration, warm coral-pink explanatory diagram"
        aspect: "16:9"
        negative: "写真風, リアル調, 文字, ロゴ, 人物の顔, photorealistic, 3D render, photograph,
          camera shot, stock photo, generic clipart, busy background, cluttered
          composition, text overlay, watermark, signature, border frame,
          vignette"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "朝から集中できないのだ" }
      - { id: l02, speaker: right, text: "才能より手順の問題よ" }
      - { id: l03, speaker: left, text: "手順で変わるの？" }
      - { id: l04, speaker: right, text: "朝は脳の入口が大事" }
      - { id: l05, speaker: left, text: "入口で転んでたのだ" }
      - { id: l06, speaker: right, text: "転ぶ習慣を外しましょ" }
      - { id: l07, speaker: left, text: "今日は朝のNG探しだね" }
      - { id: l08, speaker: right, text: "やさしく直せるものだけよ" }
      - { id: l09, speaker: left, text: "朝が怖くなくなるのだ" }
      - { id: l10, speaker: right, text: "まず通知から見るわ" }

  - id: s02
    role: body
    title_text: "通知で一日を始めるNG"
    main:
      kind: text
      text: "通知チェックは\n集中の主導権を渡す"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "起きたらスマホを見るよ" }
      - { id: l02, speaker: right, text: "一つ目のNGね" }
      - { id: l03, speaker: left, text: "目覚ましのついでなのだ" }
      - { id: l04, speaker: right, text: "ついでが一番強いの" }
      - { id: l05, speaker: left, text: "ニュースも見ちゃう" }
      - { id: l06, speaker: right, text: "脳が他人の予定に入る" }
      - { id: l07, speaker: left, text: "自分の朝じゃなくなる？" }
      - { id: l08, speaker: right, text: "そう、主導権が移るわ" }
      - { id: l09, speaker: left, text: "通知は後回しなのだ" }
      - { id: l10, speaker: right, text: "最初の十分は守って" }

  - id: s03
    role: body
    title_text: "甘い物だけで始めるNG"
    main:
      kind: image
      asset: assets/s03_main.png
      caption: "朝食の急上昇"
      image_direction:
        scene_id: s03
        dialogue_role: 誤解訂正
        scene_emotion: 納得
        visual_type: myth_vs_fact
        composition_type: split_danger_safe
        image_should_support: "甘い物だけの朝食で一瞬元気になっても、その後に集中が落ちやすいことを訂正する"
        key_visual_sentence: "甘い朝食だけの急な波と、たんぱく質を足した安定した波を比較する"
        main_subject: "朝食と集中エネルギーの比較図"
        foreground: "急上昇して落ちる抽象エネルギー波"
        midground: "甘いパン、卵、ヨーグルト風の抽象皿"
        background: "左右分割のやさしい比較パネル"
        color_palette: "コーラルピンク、クリーム、ミント、淡い黄色"
        text_strategy:
          image_text_allowed: false
          image_text_max_words: 0
        layout_safety:
          keep_bottom_20_percent_empty: true
          avoid_character_area: true
          avoid_sub_area_overlap: true
        must_not_include: [ "実在食品ブランド", "実在ロゴ", "既存キャラ", "長文説明", "人物の顔" ]
        quality_bar: "食事制限ではなく、朝の安定感を伝えるやさしい図解"
      asset_requirements:
        imagegen_prompt: |
          ずんだもん解説のScene03メイン枠で使う myth_vs_fact 型ビジュアル。構図は左右分割で、前景に急上昇して落ちる抽象エネルギー波、中景に甘いパン、卵、ヨーグルト風の抽象皿、背景にやさしい比較パネルを置く。左は不安定な波、右はなだらかで安定した波にする。soft flat illustration, gentle rounded shapes, warm coral-pink palette (#FF7043 #EC407A), cream and mint accents, soft shadows, light bg。16:9、designed for 1920x1080 display, clean edges for video rendering。下部20%は字幕とキャラ用に空け、Remotion 用の文字余白を上部に確保。文字方針：画像内文字は入れない。禁止：実在食品ブランド、実在ロゴ、既存キャラクター、写真風、人物の顔、長文テキスト、単体アイコンだけの無背景素材、細かい栄養表、watermark。
        style: "soft flat illustration, warm nutrition comparison"
        aspect: "16:9"
        negative: "写真風, リアル調, 文字, ロゴ, 人物の顔, photorealistic, 3D render, photograph,
          camera shot, stock photo, generic clipart, busy background, cluttered
          composition, text overlay, watermark, signature, border frame,
          vignette"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "甘いパンだけでも元気だよ" }
      - { id: l02, speaker: right, text: "二つ目のNGね" }
      - { id: l03, speaker: left, text: "朝は糖が必要なのだ" }
      - { id: l04, speaker: right, text: "必要だけど偏ると落ちる" }
      - { id: l05, speaker: left, text: "急に眠くなるやつ？" }
      - { id: l06, speaker: right, text: "波が大きいと集中も揺れる" }
      - { id: l07, speaker: left, text: "何を足せばいいの？" }
      - { id: l08, speaker: right, text: "たんぱく質を少し足す" }
      - { id: l09, speaker: left, text: "完璧朝食じゃなくていい？" }
      - { id: l10, speaker: right, text: "足すだけで十分よ" }

  - id: s04
    role: body
    title_text: "予定を全部並べるNG"
    main:
      kind: text
      text: "朝いちばんに\n全部を見ない"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "今日やる事を全部見るよ" }
      - { id: l02, speaker: right, text: "三つ目のNGね" }
      - { id: l03, speaker: left, text: "真面目な行動なのだ" }
      - { id: l04, speaker: right, text: "量で脳が固まるの" }
      - { id: l05, speaker: left, text: "朝から絶望するやつ" }
      - { id: l06, speaker: right, text: "実は選ぶ数が大事よ" }
      - { id: l07, speaker: left, text: "一個だけ選ぶの？" }
      - { id: l08, speaker: right, text: "最初の一個に絞る" }
      - { id: l09, speaker: left, text: "全部見るより軽いのだ" }
      - { id: l10, speaker: right, text: "朝は入口を細くするの" }

  - id: s05
    role: body
    title_text: "最初の5分を空白にするNG"
    main:
      kind: image
      asset: assets/s05_main.png
      caption: "最初の5分設計"
      image_direction:
        scene_id: s05
        dialogue_role: 手順提示
        scene_emotion: 希望
        visual_type: three_step_board
        composition_type: three_cards
        image_should_support: "最初の5分だけを決めると、朝の迷いが減って集中に入りやすい手順"
        key_visual_sentence: "机、タイマー、ノートの3カードで小さく始める流れを示す"
        main_subject: "朝の最初5分を決める3ステップ"
        foreground: "3枚の丸いステップカード"
        midground: "机を整える、タイマー、ノート一行の抽象アイコン"
        background: "淡い朝色のグラデーションと教室風の丸い飾り"
        color_palette: "コーラルピンク、ミント、クリーム、淡い紫"
        text_strategy:
          image_text_allowed: false
          image_text_max_words: 0
        layout_safety:
          keep_bottom_20_percent_empty: true
          avoid_character_area: true
          avoid_sub_area_overlap: true
        must_not_include: [ "実在タイマーアプリ", "実在ロゴ", "既存キャラ", "長文日本語", "人物の顔" ]
        quality_bar: "小さく始める安心感があり、3手順が一目で分かるボード"
      asset_requirements:
        imagegen_prompt: |
          ずんだもん解説のScene05メイン枠で使う three_step_board 型ビジュアル。構図は横並び3カードで、前景に丸いステップカード、中景に机を整える、タイマー、ノート一行を示す抽象アイコン、背景に淡い朝色のグラデーションと教室風の丸い飾りを置く。soft flat illustration, gentle rounded shapes, warm coral-pink palette (#FF7043 #EC407A), mint accents, soft shadows, top-left morning light。16:9、designed for 1920x1080 display, clean edges for video rendering。下部20%は字幕とキャラ用に空け、Remotion で正確な手順テキストを重ねる余白を残す。文字方針：画像内文字は入れない。禁止：実在アプリ、実在ロゴ、既存キャラクター、写真風人物、長文テキスト、単体アイコンだけの無背景素材、細かい表、watermark。
        style: "soft flat illustration, three step morning board"
        aspect: "16:9"
        negative: "写真風, リアル調, 文字, ロゴ, 人物の顔, photorealistic, 3D render, photograph,
          camera shot, stock photo, generic clipart, busy background, cluttered
          composition, text overlay, watermark, signature, border frame,
          vignette"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "机に座ってから迷うよ" }
      - { id: l02, speaker: right, text: "四つ目のNGね" }
      - { id: l03, speaker: left, text: "座れば始まると思ってた" }
      - { id: l04, speaker: right, text: "最初の5分が空白なの" }
      - { id: l05, speaker: left, text: "ここで迷子になるのだ" }
      - { id: l06, speaker: right, text: "前夜に一行だけ書く" }
      - { id: l07, speaker: left, text: "何から始めるか？" }
      - { id: l08, speaker: right, text: "それだけで十分よ" }
      - { id: l09, speaker: left, text: "朝の自分を助けるのだ" }
      - { id: l10, speaker: right, text: "未来の自分に渡すの" }

  - id: s06
    role: body
    title_text: "同時に片づけるNG"
    main:
      kind: text
      text: "朝の脳は\n一つずつ温める"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "音楽と返信と作業をする" }
      - { id: l02, speaker: right, text: "五つ目は同時進行よ" }
      - { id: l03, speaker: left, text: "効率よさそうなのだ" }
      - { id: l04, speaker: right, text: "切り替えで力を使うの" }
      - { id: l05, speaker: left, text: "頭のタブが多い感じ" }
      - { id: l06, speaker: right, text: "まさにそれね" }
      - { id: l07, speaker: left, text: "一つだけにする？" }
      - { id: l08, speaker: right, text: "朝の一発目ほど一つよ" }
      - { id: l09, speaker: left, text: "返信は後でいいのだ" }
      - { id: l10, speaker: right, text: "通知と作業は分けて" }

  - id: s07
    role: body
    title_text: "休憩を後払いにするNG"
    main:
      kind: text
      text: "疲れてから休むより\n先に区切りを入れる"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "集中したら休まないよ" }
      - { id: l02, speaker: right, text: "六つ目のNGね" }
      - { id: l03, speaker: left, text: "続くなら良くない？" }
      - { id: l04, speaker: right, text: "後で反動が来るわ" }
      - { id: l05, speaker: left, text: "午後に眠くなるやつ" }
      - { id: l06, speaker: right, text: "朝から借金してるの" }
      - { id: l07, speaker: left, text: "怖い例えなのだ" }
      - { id: l08, speaker: right, text: "25分で一度立って" }
      - { id: l09, speaker: left, text: "先に区切るのだね" }
      - { id: l10, speaker: right, text: "短い休憩で守るの" }

  - id: s08
    role: cta
    title_text: "明日の朝にやる3セット"
    main:
      kind: image
      asset: assets/s08_main.png
      caption: "閉じる・選ぶ・区切る"
      image_direction:
        scene_id: s08
        dialogue_role: 最終行動
        scene_emotion: 安心
        visual_type: final_action_card
        composition_type: three_cards
        image_should_support: "スマホを閉じる、最初の一つを選ぶ、休憩を先に入れる3行動で締める"
        key_visual_sentence: "スマホオフ、ノート一行、タイマー休憩の3カードを並べる"
        main_subject: "朝の集中を守る3アクションカード"
        foreground: "3枚の大きな丸角カードとチェックマーク"
        midground: "スマホオフ、ノート一行、タイマー休憩の抽象アイコン"
        background: "明るいコーラルとミントの柔らかいグラデーション"
        color_palette: "コーラルピンク、ミント、クリーム、白"
        text_strategy:
          image_text_allowed: false
          image_text_max_words: 0
        layout_safety:
          keep_bottom_20_percent_empty: true
          avoid_character_area: true
          avoid_sub_area_overlap: true
        must_not_include: [ "実在アプリ", "実在ロゴ", "既存キャラ", "長文日本語", "人物の顔" ]
        quality_bar: "明日の朝すぐ実行できる安心感のある行動カード"
      asset_requirements:
        imagegen_prompt: |
          ずんだもん解説のScene08メイン枠で使う final_action_card 型ビジュアル。構図は横並び3カードで、前景に大きな丸角カードとチェックマーク、中景にスマホオフ、ノート一行、タイマー休憩の抽象アイコン、背景に明るいコーラルとミントの柔らかいグラデーションを置く。soft flat illustration, gentle rounded shapes, warm coral-pink palette (#FF7043 #EC407A), mint accents, soft shadows, light bg。16:9、designed for 1920x1080 display, clean edges for video rendering。下部20%は字幕とキャラ用に空け、Remotion で正確な3アクション文字を重ねる余白を確保。文字方針：画像内文字は入れない。禁止：実在UI、実在ロゴ、既存キャラクター、写真風人物、長文テキスト、単体アイコンだけの無背景素材、細かい表、watermark。
        style: "soft flat illustration, final morning action cards"
        aspect: "16:9"
        negative: "写真風, リアル調, 文字, ロゴ, 人物の顔, photorealistic, 3D render, photograph,
          camera shot, stock photo, generic clipart, busy background, cluttered
          composition, text overlay, watermark, signature, border frame,
          vignette"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "明日の朝は何をする？" }
      - { id: l02, speaker: right, text: "三つだけ決めるわ" }
      - { id: l03, speaker: left, text: "一つ目、通知を閉じる" }
      - { id: l04, speaker: right, text: "スマホを遠くへ置いて" }
      - { id: l05, speaker: left, text: "二つ目、最初の一個を選ぶ" }
      - { id: l06, speaker: right, text: "ノートに一行書くの" }
      - { id: l07, speaker: left, text: "三つ目、休憩を予定する" }
      - { id: l08, speaker: right, text: "タイマーに登録してね" }
      - { id: l09, speaker: left, text: "これならできそうなのだ" }
      - { id: l10, speaker: right, text: "閉じる、選ぶ、区切るよ" }
bgm:
  title: upbeat step
  source_url: https://dova-s.jp/en/bgm/detail/16211
