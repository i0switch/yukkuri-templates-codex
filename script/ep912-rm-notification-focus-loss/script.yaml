      caption: 通知で今日が消える
      asset_requirements:
        description: 通知まみれの机とスマホ
        imagegen_prompt: |-
          使用目的：Scene02 main枠で使う高品質ビジュアル素材。
          動画ジャンル：ゆっくり解説 / ずんだもん解説。
          Sceneテンプレート：Scene02。
          この画像は、台本内の「霊夢が通知を軽く見て、魔理沙が今日の集中が削れると止める瞬間」という会話・掛け合いを視覚的に補強する。
          visual_typeは「hook_poster」、composition_typeは「phone_alarm_overload」。

          画面構図：
          主役は赤い通知バッジが積み上がったスマホ。
          前景には赤い通知バッジが積み上がったスマホ。
          中景には途中で止まったノートとタイマー。
          背景には薄い作業机、下部20%は空白。
          視線は左上から中央の要点へ流れる。

          デザイン：
          品質基準はYouTube解説動画内スライドとして使える高品質、完成度、視認性を満たすこと。
          実在ブランドや実在UIは模写しない。
          色は太線フラット図解。グレー背景でも読める白、青、黄色アクセント。警告だけ赤。。
          光は柔らかく、影は薄く、輪郭は太め。
          画面下部20%は字幕とキャラ表示用に空ける。
          Remotionで重ねる文字のため、中央上部に余白を残す。

          文字方針：
          画像内の文字は最大3語まで。
          正確な日本語タイトルや説明はRemotionで重ねるため、長文は入れない。
          入れてよい短語は「!」「OK」「NG」程度。
          Remotion重ね文字の候補は「通知で今日が消える」。
          制約：細かい文字なし、ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし。

          禁止：
          白背景に中央アイコンだけ、実在ロゴ、実在UI、既存キャラクター、写真風人物、長文テキスト、細かい表。

          生成単位：
          この1枚専用のプロンプトとして、1枚ずつ生成する。他画像と同時生成しない。

          追加禁止：人物、顔、手、実在キャラクター、既存キャラクター風、アニメキャラ、マスコットを一切描かない。スマホ、書類、矢印、箱、時計などの物だけで構成する。
        style: 太線フラット図解。グレー背景でも読める白、青、黄色アクセント。警告だけ赤。
        aspect: 16:9
