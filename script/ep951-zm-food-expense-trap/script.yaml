          話者A「ぼくの冷蔵庫の奥にある謎のものを、まず把握することから始めるのだ」
          話者B「それが第一歩ですわ」
          話者A「今月から食費の記録もつけてみるのだ。変化がわかると楽しそうなのだ」
          話者B「食費を記録するだけでも節約意識が高まって、自然と支出が減る人が多いのですよ」
