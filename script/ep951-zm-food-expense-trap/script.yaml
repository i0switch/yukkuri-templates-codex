          話者A「NGの話か、大事なのだ」
          話者B「1つ目。「安い食材だけ買う」節約ですの。もやしと卵だけで乗り切ろうとするタイプ」
          話者A「それぼくやったことあるのだ！でも途中で限界が来て外食してしまったのだ」
          話者B「そうなるのですよ。食の満足度を極端に下げると反動で外食や中食が増えて、結局高くつくのですわ」
