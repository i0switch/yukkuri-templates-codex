          話者B「2つ目。「○○専門の激安スーパーだけで買う」節約ですの」
          話者A「それも罠なの？安い店で買うのは正しいんじゃないのだ？」
          話者B「安い店が遠い場合、交通費や時間コストがかかりますわ。近所で無駄買いを減らすほうがトータルで安くなることが多いのですよ」
