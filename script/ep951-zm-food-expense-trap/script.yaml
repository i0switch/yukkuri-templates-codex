          話者B「今週末に買い物に行く前に、冷蔵庫を開けて中を全部確認することですわ」
          話者A「冷蔵庫の中を確認？」
          話者B「今何があるかを把握してから、週のメニューを決めて、買い物リストを作って行く。この流れを1回体験するだけで感覚が変わりますわよ」
