  - id: s11
    title_text: 今週末からやること
    role: outro
    scene_goal: 冷蔵庫確認→メニュー決め→リスト作成→買い物の流れを今週末からやる1つの行動に集約する
    viewer_question: 全部覚えられないけど何から始めればいいの
