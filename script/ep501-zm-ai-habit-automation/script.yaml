meta:
  id: ep501-zm-ai-habit-automation
  title: AI自動化で時間が増えない本当の理由
  pair: ZM
  fps: 30
  width: 1280
  height: 720
  audience: 初心者向け
  tone: 少し危機感あり、実用重視
  bgm_mood: 軽い解説用ループ
  voice_engine: voicevox
  target_duration_sec: 300
  image_style: ローカル生成のフラット図解カード
  allow_duplicate_templates: true
characters:
  left:
    character: zundamon
    voicevox_speaker_id: 3
    speaking_style: 疑問役。語尾はのだ。
  right:
    character: metan
    voicevox_speaker_id: 2
    speaking_style: 解説役。語尾はわ、のよ、ね。
bgm:
  file: bgm/track.mp3
  license: 既存ローカルBGM。プロジェクト内素材として流用
  volume: 0.08
  fade_in_sec: 1
  fade_out_sec: 2
