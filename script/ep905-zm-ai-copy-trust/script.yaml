meta:
  id: ep905-zm-ai-copy-trust
  title: AI文章コピペで信頼を落とす理由
  layout_template: Scene10
  scene_template: Scene10
  pair: ZM
  fps: 30
  width: 1280
  height: 720
  audience: SNSやスマホ利用で失敗を避けたい初心者
  tone: 短く刺すが、不安だけで終わらせず対処まで出す
  bgm_mood: 軽く緊張感のある解説用
  voice_engine: voicevox
  target_duration_sec: 180
  image_style: 太線フラット図解。モノクロ背景でも読める高コントラスト、緑と青緑をアクセント、文字なし。
  typography:
    subtitle_family: gothic
    content_family: gothic
    title_family: gothic
characters:
  left:
    character: zundamon
    voicevox_speaker_id: 3
    speaking_style: 視聴者代表。浅い理解、驚き、ボケを担当。語尾は自然にのだ。
  right:
    character: metan
    voicevox_speaker_id: 2
    speaking_style: 解説役。冷静に刺し、対処まで落とす。
scenes:
  - id: s01
    role: intro
    scene_goal: AI文の丸写しが信頼低下につながると刺す
    viewer_question: AI文をそのまま使ってよいのか
    visual_role: mainはAI文と警告、subは最初の論点
    main:
      kind: image
      asset: assets/s01_main.png
      caption: コピペ文章で信頼が落ちる
      asset_requirements:
        description: AI生成文をそのまま投稿して警告サインが出る図解
        imagegen_prompt: 【用途】s01 main枠。ずんだもん解説で「コピペ文章で信頼が落ちる」を一瞬で理解させる素材。【主題】AI生成文をそのまま投稿して警告サインが出る図解【構図】主役を中央大きめ、補助アイコンは左右上部に少量。下部字幕帯と左右キャラ位置は空ける。【テンプレート枠】Scene10 の main枠に収める。右sub枠、下字幕帯、左右キャラ領域に重要物を置かない。【色】白または淡い背景、主色は青緑、注意だけ赤、影は薄く、全シーンで色味を揃える。【情報量】1枚1メッセージ。画像内文字なし。細部を詰めず遠目でも読める。【絵柄】太線フラット図解。モノクロ背景でも読める高コントラスト、緑と青緑をアクセント、文字なし。 ゆっくり/ずんだもん解説向けの太線フラット図解。【禁止】実在人物、既存キャラクター、ブランドロゴ、実在UI模写、英語UI、細かい文字、密な表、写真風人物。
        style: ずんだもん解説向け、16:9、余白多め、文字なし
        aspect: 16:9
    sub:
      kind: bullets
      items:
        - そのままNG
        - 違和感
        - 信用低下
    visual_asset_plan:
      - slot: main
        purpose: AI生成文をそのまま投稿して警告サインが出る図解
        insert_timing: s01 の l01 直前から表示
        asset: assets/s01_main.png
        imagegen_prompt: 【用途】s01 main枠。ずんだもん解説で「コピペ文章で信頼が落ちる」を一瞬で理解させる素材。【主題】AI生成文をそのまま投稿して警告サインが出る図解【構図】主役を中央大きめ、補助アイコンは左右上部に少量。下部字幕帯と左右キャラ位置は空ける。【テンプレート枠】Scene10 の main枠に収める。右sub枠、下字幕帯、左右キャラ領域に重要物を置かない。【色】白または淡い背景、主色は青緑、注意だけ赤、影は薄く、全シーンで色味を揃える。【情報量】1枚1メッセージ。画像内文字なし。細部を詰めず遠目でも読める。【絵柄】太線フラット図解。モノクロ背景でも読める高コントラスト、緑と青緑をアクセント、文字なし。 ゆっくり/ずんだもん解説向けの太線フラット図解。【禁止】実在人物、既存キャラクター、ブランドロゴ、実在UI模写、英語UI、細かい文字、密な表、写真風人物。
        audit_points:
          - 1枚1メッセージ
          - Scene10のmain枠に収まる
          - ロゴや細かい文字がない
      - slot: sub
        purpose: 右サブ枠で要点を3項目に整理する
        insert_timing: s01 全体で表示
        audit_points:
          - 3項目以内
          - mainと役割が違う
          - 字幕を邪魔しない
