  title: スクショとPDFが散らかると資料が見つからない理由
  layout_template: Scene13
  pair: ZM
  fps: 30
  width: 1280
  height: 720
  audience: スクショやPDFをとりあえず保存して探せなくなる人
  tone: 危機感は出すが、3つの箱と今日の小掃除に落とす
  bgm_mood: 少し不穏だが前向きな整理解説
  voice_engine: voicevox
  target_duration_sec: 180
  image_style: 太線フラット図解。黒背景に映える白、青紫、ミントを基調、警告だけ赤。
  typography:
    subtitle_family: gothic
    content_family: gothic
    title_family: gothic
    subtitle_stroke_color: "#000000"
    subtitle_stroke_width: 6
  reference_style: single_big_question_mystery
characters:
  left:
    character: zundamon
    voicevox_speaker_id: 3
    speaking_style: 視聴者代表。浅い理解、驚き、ボケを担当。語尾は自然にのだ。
  right:
    character: metan
    voicevox_speaker_id: 2
    speaking_style: 解説役。冷静に刺し、対処まで落とす。
scenes:
  - id: s01
    role: intro
    scene_goal: 保存したのに迷子
    scene_format: 誤解訂正型
    hook_type: loss_or_warning
    viewer_question: スクショは撮るだけなら安全と思う
    viewer_misunderstanding: スクショは撮るだけなら安全と思う
    boke_or_reaction: 保存したのに迷子
    reaction_level: L3
    number_or_example: 30枚たまると探す方が長い
    mini_punchline: 保存したのに迷子
    visual_role: ずんだもんがとりあえず撮れば安心と言い、めたんが探せなくなると刺す瞬間
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 保存したのに迷子
      asset_requirements:
        description: スクショとPDFの山に埋もれた資料
        imagegen_prompt: |-
          使用目的：Scene13 main枠で使う高品質ビジュアル素材。
          動画ジャンル：ゆっくり解説 / ずんだもん解説。
          Sceneテンプレート：Scene13。
          この画像は、台本内の「ずんだもんがとりあえず撮れば安心と言い、めたんが探せなくなると刺す瞬間」という会話・掛け合いを視覚的に補強する。
          visual_typeは「hook_poster」、composition_typeは「screenshot_pile_dark」。

          画面構図：
          主役は山積みのスクショカードとPDF束。
          前景には山積みのスクショカードとPDF束。
          中景には探している虫眼鏡と焦りマーク。
          背景には黒基調のScene13に合う暗い整理ボード。
          視線は左上から中央の要点へ流れる。

          デザイン：
          品質基準はYouTube解説動画内スライドとして使える高品質、完成度、視認性を満たすこと。
          実在ブランドや実在UIは模写しない。
          色は太線フラット図解。黒背景に映える白、青紫、ミントを基調、警告だけ赤。。
          光は柔らかく、影は薄く、輪郭は太め。
          画面下部20%は字幕とキャラ表示用に空ける。
          Remotionで重ねる文字のため、中央上部に余白を残す。

          文字方針：
          画像内の文字は最大3語まで。
          正確な日本語タイトルや説明はRemotionで重ねるため、長文は入れない。
          入れてよい短語は「!」「OK」「NG」程度。
          Remotion重ね文字の候補は「保存したのに迷子」。
          制約：細かい文字なし、ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし。

          禁止：
          白背景に中央アイコンだけ、実在ロゴ、実在UI、既存キャラクター、写真風人物、長文テキスト、細かい表。

          生成単位：
          この1枚専用のプロンプトとして、1枚ずつ生成する。他画像と同時生成しない。

          追加禁止：人物、顔、手、実在キャラクター、既存キャラクター風、アニメキャラ、マスコットを一切描かない。スマホ、書類、矢印、箱、時計などの物だけで構成する。
        style: 太線フラット図解。黒背景に映える白、青紫、ミントを基調、警告だけ赤。
        aspect: 16:9
    sub:
