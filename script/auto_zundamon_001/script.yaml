  - id: s07
    role: body
    scene_goal: 定期的な使い切り習慣を作る
    viewer_question: 期限近い食品をどう消費するか
    visual_role: 週末の10分タイマーと「使い切り候補」ケースを確認するキッチン画面
    duration_sec: 30
    main:
      kind: image
      asset: assets/s07_main.png
      asset_requirements:
        imagegen_prompt: |-
          s07: 週1回の救出タイム

          話者A「毎日ちゃんと管理するのは無理だよ。」
          話者B「毎日完璧を狙わなくていいわ。週1回、10分の救出タイムを作るの。」
          話者A「救出タイム。冷蔵庫パトロールだね。」
          話者B「手前の今日明日席、透明ケース、日付ラベルを見て、使い切り候補を出す。」
          話者A「何を作るか決めてから見るんじゃないの？」
          話者B「逆ね。残っているものからメニューを決めるほうがロスは減りやすい。」
          話者A「しなびかけ野菜の声を聞くんだな。」
