          話者A「たしかに同じ野菜でも、今日しなびそうな子と元気な子がいるのだ。」
          話者B「そう。種類別にきれいでも、期限が奥に隠れたら捨てる未来が近づくわ。」
          話者A「整列しているのに救えない。切ない。」
          話者B「見た目の美しさより、先に使うものが目に入ることが大事ですわ。」
          話者A「冷蔵庫は展示棚じゃなくて、消費の順番表なのだな。」
