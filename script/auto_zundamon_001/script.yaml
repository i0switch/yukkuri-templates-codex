    role: intro
    scene_goal: 食品ロスの痛みを冒頭で共感化する
    viewer_question: 冷蔵庫で同じ失敗をしているかも
    visual_role: 冷蔵庫の奥から期限切れ食品が発見されるが、見やすい整理へ変わる導入図
    duration_sec: 30
    main:
      kind: image
      asset: assets/s01_main.png
      asset_requirements:
        imagegen_prompt: |-
          s01: 奥から出る化石を止める

          話者A「冷蔵庫の奥から、いつ買ったかわからない小鉢が出てきたんだけど。」
          話者B「それは保存ではなく発掘に近いわね。」
          話者A「食べ物に歴史を感じた。ちょっと怖い。」
          話者B「今日は食品ロスを減らす見える化習慣を話すわ。節約の根性論ではないの。」
          話者A「冷蔵庫が広ければ解決するんじゃない？」
          話者B「広い冷蔵庫ほど奥に隠れるものも増えるわ。」
          話者A「広さが敵になるの？マジで？」
          話者B「大事なのは量より見え方。使う順番が見えれば、捨てる前に気づけるの。」
          話者A「ぼくの冷蔵庫、気づきにくい迷路なのだ。」
          話者B「その迷路を、今日から3つの置き方でほどいていくわ。」

          ゆっくり解説動画向けの挿入画像を日本語で生成してください。 この画像は会話内容をそのまま再現するためのものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。 字幕やセリフは別で表示するため、会話等は画像に入れないでください。 キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、UI、概念図、状況説明ビジュアルを中心に構成してください。 画面全体を有効活用し、情報が一目で伝わる、整理された高品質なビジュアルにしてください。 動画の解説画面に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。 Make the aspect ratio 16:9.

