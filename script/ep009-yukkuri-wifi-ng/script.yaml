meta:
  id: "ep009-yukkuri-wifi-ng"
  episode_id: "ep009-yukkuri-wifi-ng"
  layout_template: "Scene16"
  character_pair: "RM"
  pair: "RM"
  title: "家のWi-Fiが遅い原因、やりがちNG7選"
  fps: 30
  width: 1280
  height: 720
  audience: "初心者向け"
  tone: "軽快で実用的"
  voice_engine: "aquestalk"
  target_duration_sec: 180
characters:
  left:
    character: "reimu"
    aquestalk_preset: "AquesTalk10 F1"
  right:
    character: "marisa"
    aquestalk_preset: "AquesTalk10 F2"
scenes:
  - id: s01
    role: intro
    title_text: "Wi-Fiが遅い本当の原因"
    main:
      kind: image
      asset: assets/s01_main.png
      caption: "遅いWi-Fiの見落とし"
      image_direction:
        scene_id: s01
        dialogue_role: 冒頭フック
        scene_emotion: 焦り
        visual_type: hook_poster
        composition_type: smartphone_closeup
        image_should_support: "霊夢がWi-Fiの遅さをスマホの故障だと思い込み、魔理沙が家の環境側を疑わせる冒頭"
        key_visual_sentence: "スマホの読み込み円と、奥で障害物に囲まれたルーターを同時に見せる"
        main_subject: "読み込み中のスマホと障害物に囲まれたルーター"
        foreground: "スマホ画面の抽象的な読み込み円と弱い電波アイコン"
        midground: "棚の奥に押し込まれた家庭用ルーター"
        background: "青緑の室内グリッドと薄い電波の波紋"
        color_palette: "青緑、白、紺、警告の小さなオレンジ"
        text_strategy:
          image_text_allowed: false
          image_text_max_words: 0
        layout_safety:
          keep_bottom_20_percent_empty: true
          avoid_character_area: true
          avoid_sub_area_overlap: true
        must_not_include: [ "実在メーカー", "実在ロゴ", "既存キャラ", "長文日本語", "人物の顔" ]
        quality_bar: "家電広告ではなく、通信トラブルを一目で理解できる教育番組の図解レベル"
      asset_requirements:
        imagegen_prompt: |
          ゆっくり解説のScene01メイン枠で使う hook_poster 型ビジュアル。構図は、前景に読み込み中のスマホと弱い電波を示す抽象アイコン、中景に棚の奥で本や箱に囲まれた家庭用ルーター、背景に青緑の室内グリッドと薄い電波の波紋を置く。視線はスマホからルーターへ流す。clean flat vector illustration, bold geometric shapes, cool blue-teal palette (#00BCD4 #1976D2), laboratory/data aesthetic, top-left rim light, soft ambient fill。16:9、designed for 1920x1080 display, clean edges for video rendering。下部20%は字幕とキャラ用に空け、Remotion で正確な日本語タイトルを重ねる余白を上部左に残す。文字方針：画像内文字は入れない。禁止：単体アイコンだけの無背景素材、実在ロゴ、実在UI、既存キャラクター、写真風人物、長文テキスト、細かい表、watermark。
        style: "clean flat vector, bold geometric shapes, cool blue-teal palette"
        aspect: "16:9"
        negative: "写真風, リアル調, 文字, ロゴ, 人物の顔, photorealistic, 3D render, photograph,
          camera shot, stock photo, generic clipart, busy background, cluttered
          composition, text overlay, watermark, signature, border frame,
          vignette"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "Wi-Fiまた止まった！" }
      - { id: l02, speaker: right, text: "犯人はスマホじゃないぜ" }
      - { id: l03, speaker: left, text: "じゃあ家が悪いの？" }
      - { id: l04, speaker: right, text: "置き方でかなり変わるぜ" }
      - { id: l05, speaker: left, text: "電波って見えないから怖い" }
      - { id: l06, speaker: right, text: "見えないから雑になるんだ" }
      - { id: l07, speaker: left, text: "私の家、雑の展示場よ" }
      - { id: l08, speaker: right, text: "今日はNGを7つ見るぜ" }
      - { id: l09, speaker: left, text: "すぐ直るやつある？" }
      - { id: l10, speaker: right, text: "まず置き場所からだぜ" }

  - id: s02
    role: body
    title_text: "棚の奥に押し込むNG"
    main:
      kind: text
      text: "ルーターは\n隠すほど弱くなる"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "ルーターは見えない方がいい" }
      - { id: l02, speaker: right, text: "それが一つ目のNGだぜ" }
      - { id: l03, speaker: left, text: "生活感を隠したいのよ" }
      - { id: l04, speaker: right, text: "電波まで隠してるぞ" }
      - { id: l05, speaker: left, text: "箱の中はダメ？" }
      - { id: l06, speaker: right, text: "金属棚と壁際は重いぜ" }
      - { id: l07, speaker: left, text: "見た目より通信か" }
      - { id: l08, speaker: right, text: "家の中心寄りが基本だぜ" }
      - { id: l09, speaker: left, text: "高めの場所が良い？" }
      - { id: l10, speaker: right, text: "床置きよりずっと良いぜ" }

  - id: s03
    role: body
    title_text: "電子レンジ横に置くNG"
    main:
      kind: image
      asset: assets/s03_main.png
      caption: "電波干渉"
      image_direction:
        scene_id: s03
        dialogue_role: 危険喚起
        scene_emotion: 驚き
        visual_type: danger_simulation
        composition_type: split_danger_safe
        image_should_support: "電子レンジや水槽の近くに置いたルーターが、電波干渉で不安定になる説明"
        key_visual_sentence: "レンジ側の乱れた波と、離した側の整った波を左右比較する"
        main_subject: "ルーターと電子レンジの干渉シミュレーション"
        foreground: "赤橙の乱れた電波波形"
        midground: "抽象化した電子レンジとルーター"
        background: "左右分割の安全比較パネル"
        color_palette: "青緑、紺、警告のオレンジ、薄グレー"
        text_strategy:
          image_text_allowed: false
          image_text_max_words: 0
        layout_safety:
          keep_bottom_20_percent_empty: true
          avoid_character_area: true
          avoid_sub_area_overlap: true
        must_not_include: [ "実在家電ブランド", "実在ロゴ", "既存キャラ", "長文説明", "人物の顔" ]
        quality_bar: "電波の乱れが直感で伝わる、ニュース解説の比較図レベル"
      asset_requirements:
        imagegen_prompt: |
          ゆっくり解説のScene03メイン枠で使う danger_simulation 型ビジュアル。構図は左右分割で、前景に赤橙で乱れた電波波形、中景に抽象化した電子レンジとルーター、背景に安全側へ流れる青緑の整った波を配置する。右側はルーターを離して整った通信波にする。clean flat vector illustration, bold outlines 3px, geometric shapes, cool blue-teal palette with orange warning accents, top-left rim light, soft ambient fill。16:9、designed for 1920x1080 display, clean edges for video rendering。下部20%は字幕とキャラ用に空け、Remotion 用の余白を上部に確保。文字方針：画像内文字は入れない。禁止：実在ロゴ、実在UI、写真風、人物の顔、長文テキスト、単体アイコンだけの無背景素材、細かい表、watermark。
        style: "clean flat vector, warning comparison diagram"
        aspect: "16:9"
        negative: "写真風, リアル調, 文字, ロゴ, 人物の顔, photorealistic, 3D render, photograph,
          camera shot, stock photo, generic clipart, busy background, cluttered
          composition, text overlay, watermark, signature, border frame,
          vignette"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "レンジ横なら便利じゃない？" }
      - { id: l02, speaker: right, text: "二つ目のNGだぜ" }
      - { id: l03, speaker: left, text: "何がぶつかるの？" }
      - { id: l04, speaker: right, text: "電波の通り道だぜ" }
      - { id: l05, speaker: left, text: "水槽もダメって聞いた" }
      - { id: l06, speaker: right, text: "水は電波に優しくない" }
      - { id: l07, speaker: left, text: "おしゃれ水槽、強敵ね" }
      - { id: l08, speaker: right, text: "近くの障害物を疑え" }
      - { id: l09, speaker: left, text: "まず周りを空けるのね" }
      - { id: l10, speaker: right, text: "一メートルでも変わるぜ" }

  - id: s04
    role: body
    title_text: "再起動しないNG"
    main:
      kind: text
      text: "長時間つけっぱなしは\n小さな不調をためる"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "ルーターって触らないよね" }
      - { id: l02, speaker: right, text: "三つ目は放置だぜ" }
      - { id: l03, speaker: left, text: "電源抜くの怖い" }
      - { id: l04, speaker: right, text: "手順を守れば大丈夫だ" }
      - { id: l05, speaker: left, text: "ここで再起動なの？" }
      - { id: l06, speaker: right, text: "月一の掃除感覚だぜ" }
      - { id: l07, speaker: left, text: "家電にも休憩がいる？" }
      - { id: l08, speaker: right, text: "熱と詰まりを逃がすんだ" }
      - { id: l09, speaker: left, text: "夜中にやれば安全ね" }
      - { id: l10, speaker: right, text: "予定化すると忘れないぜ" }

  - id: s05
    role: body
    title_text: "測る場所が毎回違うNG"
    main:
      kind: image
      asset: assets/s05_main.png
      caption: "速度チェックの罠"
      image_direction:
        scene_id: s05
        dialogue_role: 誤解訂正
        scene_emotion: 納得
        visual_type: before_after
        composition_type: before_after_split
        image_should_support: "速度測定の場所や時間が毎回違うと、原因を見誤ることを訂正する"
        key_visual_sentence: "同じスマホを、バラバラ測定と固定測定の2画面で比較する"
        main_subject: "Wi-Fi速度を測るスマホと固定測定ポイント"
        foreground: "スマホの抽象メーターとピン留めアイコン"
        midground: "部屋の簡略マップと同じ測定位置"
        background: "左は散らばった点、右は整列した比較グリッド"
        color_palette: "青緑、白、薄グレー、アクセント黄"
        text_strategy:
          image_text_allowed: false
          image_text_max_words: 0
        layout_safety:
          keep_bottom_20_percent_empty: true
          avoid_character_area: true
          avoid_sub_area_overlap: true
        must_not_include: [ "実在アプリ", "実在ロゴ", "既存キャラ", "長文日本語", "人物の顔" ]
        quality_bar: "初心者でも測定条件の固定が理解できる、整理された検証ボード"
      asset_requirements:
        imagegen_prompt: |
          ゆっくり解説のScene05メイン枠で使う before_after 型ビジュアル。構図は左右比較で、前景にスマホの抽象メーターとピン留めアイコン、中景に部屋の簡略マップと同じ測定位置、背景に左は散らばった点、右は整列した比較グリッドを描く。実在アプリ画面ではなく safe mockup。clean flat vector illustration, bold geometric shapes, cool blue-teal palette (#00BCD4 #1976D2), yellow accent, soft ambient fill。16:9、designed for 1920x1080 display, clean edges for video rendering。下部20%は字幕とキャラ用に空け、Remotion で正確な説明文字を重ねる余白を残す。文字方針：画像内文字は入れない。禁止：実在UI、実在ロゴ、写真風、人物の顔、長文テキスト、単体アイコンだけの無背景素材、細かい数値表、watermark。
        style: "clean flat vector, before-after verification board"
        aspect: "16:9"
        negative: "写真風, リアル調, 文字, ロゴ, 人物の顔, photorealistic, 3D render, photograph,
          camera shot, stock photo, generic clipart, busy background, cluttered
          composition, text overlay, watermark, signature, border frame,
          vignette"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "速度測定は毎回してるよ" }
      - { id: l02, speaker: right, text: "場所が違うと迷子だぜ" }
      - { id: l03, speaker: left, text: "寝室と廊下で比べてた" }
      - { id: l04, speaker: right, text: "それは別の実験だ" }
      - { id: l05, speaker: left, text: "実は測り方が雑かも" }
      - { id: l06, speaker: right, text: "ここで条件を固定するぜ" }
      - { id: l07, speaker: left, text: "同じ場所、同じ時間？" }
      - { id: l08, speaker: right, text: "同じ端末も大事だぜ" }
      - { id: l09, speaker: left, text: "原因が見えやすくなる" }
      - { id: l10, speaker: right, text: "四つ目、測定ブレだぜ" }

  - id: s06
    role: body
    title_text: "古い規格のまま使うNG"
    main:
      kind: text
      text: "古いルーターは\n速さより安定性で差が出る"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "壊れてないなら使えるよ" }
      - { id: l02, speaker: right, text: "五つ目は古さだぜ" }
      - { id: l03, speaker: left, text: "買い替えの話？" }
      - { id: l04, speaker: right, text: "まず対応規格を見るんだ" }
      - { id: l05, speaker: left, text: "箱、もう捨てたわ" }
      - { id: l06, speaker: right, text: "型番で調べればいいぜ" }
      - { id: l07, speaker: left, text: "何年くらいが目安？" }
      - { id: l08, speaker: right, text: "五年超なら確認だぜ" }
      - { id: l09, speaker: left, text: "セキュリティも関係ある？" }
      - { id: l10, speaker: right, text: "古い暗号化は危険だぜ" }

  - id: s07
    role: body
    title_text: "混雑時間だけで判断するNG"
    main:
      kind: text
      text: "夜だけ遅いなら\n家の中だけが原因とは限らない"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "夜だけ遅いのは何？" }
      - { id: l02, speaker: right, text: "六つ目は時間帯だぜ" }
      - { id: l03, speaker: left, text: "みんな使うから？" }
      - { id: l04, speaker: right, text: "回線側の混雑もある" }
      - { id: l05, speaker: left, text: "家で直せない時もある？" }
      - { id: l06, speaker: right, text: "切り分けが先なんだ" }
      - { id: l07, speaker: left, text: "朝昼夜で測るのね" }
      - { id: l08, speaker: right, text: "記録が相談材料になるぜ" }
      - { id: l09, speaker: left, text: "感覚だけだと弱いか" }
      - { id: l10, speaker: right, text: "証拠があると早いぜ" }

  - id: s08
    role: cta
    title_text: "今日やる3つの確認"
    main:
      kind: image
      asset: assets/s08_main.png
      caption: "置く・測る・予定化"
      image_direction:
        scene_id: s08
        dialogue_role: 最終行動
        scene_emotion: 安心
        visual_type: final_action_card
        composition_type: three_cards
        image_should_support: "視聴後すぐ、置き場所変更、同条件測定、再起動予定化の3行動に移す締め"
        key_visual_sentence: "3枚のカードに、ルーター移動、速度測定、カレンダー登録のアイコンを並べる"
        main_subject: "Wi-Fi改善の3アクションカード"
        foreground: "3枚の大きな行動カードとチェックマーク"
        midground: "ルーター、スマホ測定、カレンダーの抽象アイコン"
        background: "明るい青緑のグラデーションと余白の広いパネル"
        color_palette: "青緑、白、紺、安心感のある黄"
        text_strategy:
          image_text_allowed: false
          image_text_max_words: 0
        layout_safety:
          keep_bottom_20_percent_empty: true
          avoid_character_area: true
          avoid_sub_area_overlap: true
        must_not_include: [ "実在アプリ", "実在ロゴ", "既存キャラ", "長文日本語", "人物の顔" ]
        quality_bar: "行動が3つに整理され、動画の締めとして保存したくなるカード"
      asset_requirements:
        imagegen_prompt: |
          ゆっくり解説のScene08メイン枠で使う final_action_card 型ビジュアル。構図は横並び3カードで、前景に大きなチェックマークとカード枠、中景にルーター移動、スマホ測定、カレンダー登録を示す抽象アイコン、背景に明るい青緑のグラデーションと広い余白を置く。clean flat vector illustration, bold outlines 3px, cool blue-teal palette (#00BCD4 #1976D2), bright highlights, soft ambient fill, flat matte。16:9、designed for 1920x1080 display, clean edges for video rendering。下部20%は字幕とキャラ用に空け、Remotion で正確な3手順テキストを重ねる余白を確保。文字方針：画像内文字は入れない。禁止：実在UI、実在ロゴ、既存キャラクター、写真風人物、長文テキスト、単体アイコンだけの無背景素材、細かい表、watermark。
        style: "clean flat vector, final action cards"
        aspect: "16:9"
        negative: "写真風, リアル調, 文字, ロゴ, 人物の顔, photorealistic, 3D render, photograph,
          camera shot, stock photo, generic clipart, busy background, cluttered
          composition, text overlay, watermark, signature, border frame,
          vignette"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "で、今すぐ何する？" }
      - { id: l02, speaker: right, text: "三つだけでいいぜ" }
      - { id: l03, speaker: left, text: "一つ目は置き場所確認" }
      - { id: l04, speaker: right, text: "箱と床から出すんだ" }
      - { id: l05, speaker: left, text: "二つ目は同じ場所で測る" }
      - { id: l06, speaker: right, text: "結果をメモで残すぜ" }
      - { id: l07, speaker: left, text: "三つ目は再起動を予定化" }
      - { id: l08, speaker: right, text: "月一で登録しておけ" }
      - { id: l09, speaker: left, text: "今日一つ選んでやるわ" }
      - { id: l10, speaker: right, text: "置く、測る、予定化だぜ" }
