meta:
  id: ep912-rm-sleep-debt
  title: 睡眠の借金を毎朝踏み倒してる人の話
  layout_template: Scene08
  pair: RM
  fps: 30
  width: 1280
  height: 720
  audience: 慢性的に眠いが原因が分からない社会人
  tone: 日常あるある型。危機感を出しつつ、小さい行動で終わらせる
  bgm_mood: 落ち着いた和風解説用BGM
  voice_engine: voicevox
  target_duration_sec: 180
  image_style: 太線フラット図解。温かみのある和色（朱・紺・黄緑）アクセント。 余白多め、文字は最小限、モノクロ背景でも読める高コントラスト。
  typography:
    subtitle_family: gothic
    content_family: gothic
    title_family: gothic
    subtitle_stroke_color: "#000000"
    subtitle_stroke_width: 6
characters:
  left:
    character: reimu
    voicevox_speaker_id: 0
    speaking_style: 視聴者代表。雑な理解、勘違い、ツッコミ、焦りを担当。
  right:
    character: marisa
    voicevox_speaker_id: 1
    speaking_style: 解説役。日常例と数字で補足し、短い結論を置く。語尾は「だぜ」中心。
scenes:
  - id: s01
    role: intro
    scene_goal: 睡眠負債という借金が無自覚に積もることをフックで刺す
    scene_format: 誤解訂正型
    viewer_question: 眠いのはなぜか
    viewer_misunderstanding: 眠気は疲れのせいで睡眠とは別の問題だと思っている
    number_or_example: 毎晩1時間不足で週7時間の借金
    visual_role: 睡眠不足が借金として積み重なるイメージ
    title_text: 毎朝踏み倒してる「睡眠の借金」
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 知らずに借金が増えている
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 冒頭フックで睡眠負債の概念を視覚化する
        supports_dialogue:
          - s01_l03
          - s01_l04
        supports_moment: 霊夢が「借金みたいなやつ？」と反応した瞬間
        visual_type: hook_poster
        composition_type: balance_sheet_metaphor
        image_direction:
          dialogue_role: 視聴者が「自分も借金してるかも」と思わせる冒頭フック
          scene_emotion: 軽いショック＋日常感
          image_should_support: 睡眠不足が目に見えない借金として積まれる感覚
          key_visual_sentence: 毎晩少し眠れない分が静かに積み重なっている
          main_subject: 積み重なる「睡眠時間の赤字」を表す積み重ねグラフ
          foreground: 赤字ゲージ（朱色）が下から積み上がる縦棒
          midground: 毎日の睡眠時間メモリ（水色）が少しずつ減る視覚
          background: 淡い和紙テクスチャ
          color_palette: 朱・紺・クリーム・薄黄
          text_strategy:
            image_text_allowed: true
            image_text_max_words: 3
            remotion_overlay_text:
              - 睡眠負債
          layout_safety:
            keep_bottom_20_percent_empty: true
            avoid_character_area: true
            avoid_sub_area_overlap: true
          must_not_include:
            - 実在ブランドロゴ
            - 実在人物
            - 既存キャラクター
          quality_bar: ゆっくり解説動画のスライドとして視聴維持に貢献する品質
          composition_type: balance_sheet_metaphor
        imagegen_prompt: |-
          ゆっくり解説動画Scene08 main枠（1920×1080、下部20%空き）用の高品質ビジュアル素材。1枚のみ生成。
          テーマ：睡眠負債の概念を「借金が積み重なる」比喩で表現する冒頭フックビジュアル。
          構図：朱色の縦棒グラフが画面中央からやや上に積み上がっていく。各棒に小さい夜のアイコン（月・星）。
          右側に小さく「睡眠負債」と書いた付箋風ラベル。
          色：朱・紺・クリーム・薄黄、太線フラット、高コントラスト。
          禁止：実在ブランド、実在人物、霊夢魔理沙風キャラ、英語UI、写真風。
          下部20%完全空き。
          【使用目的】ゆっくり解説動画のhook_posterのセリフ補強素材。高品質なYouTube解説動画向け仕上がり。この1枚専用に個別生成すること。他画像と同時生成しない。
          前景・中景・背景の3層で構成すること。 余白を十分に取り、シンプルで読みやすい構図にすること。実在人物なし、ロゴなし、既存キャラクターなし、細かい文字なし。
          Remotionの重ねテキストは最小限。画像内の文字は長文は入れない。
    dialogue:
      - id: l01
        speaker: left
        text: 最近ずっと眠いんだけどなんで？
      - id: l02
        speaker: right
        text: 睡眠負債が溜まってるんだぜ。
      - id: l03
        speaker: left
        text: 負債？借金みたいなやつ？
      - id: l04
        speaker: right
        text: そうだぜ。毎晩少し眠れてない分が
      - id: l05
        speaker: right
        text: 積み重なっていくのが睡眠負債だ。
      - id: l06
        speaker: left
        text: 知らないうちに借金してたの！？
      - id: l07
        speaker: right
        text: 返さないと体と頭に利子がつくぞ。
      - id: l08
        speaker: left
        text: ちなみに今6時間くらいしか寝てないわ。
      - id: l09
        speaker: right
        text: 6時間台は危険ゾーンだぜ。
      - id: l10
        speaker: left
        text: もう借金中だったのね！！
  - id: s02
    role: body
    scene_goal: 睡眠負債の仕組みと「眠気が消える怖さ」を伝える
    scene_format: 数字補強型
    viewer_question: どうやって借金が増えるのか
    viewer_misunderstanding: 眠くなければ睡眠は足りていると思っている
    number_or_example: 1時間不足が7日続くと週7時間の借金
    visual_role: 借金が積み重なるグラフと「眠くない＝大丈夫ではない」の対比
    title_text: 眠くないのに借金が増える理由
    main:
      kind: image
      asset: assets/s02_main.png
      caption: 感覚がなくなるのが一番怖い
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 眠気が消えても負債は増えるという誤解訂正を補強
        supports_dialogue:
          - s02_l05
          - s02_l06
        supports_moment: 霊夢が「眠くないから大丈夫だと思ってた」と反応した瞬間
        visual_type: myth_vs_fact
        composition_type: two_column_contrast
        image_direction:
          dialogue_role: 誤解訂正フレーム
          scene_emotion: じわじわとした気づきの恐怖
          image_should_support: 眠気センサーが麻痺しても負債は増え続けるという事実
          key_visual_sentence: 眠くなくなっても借金は増えている
          main_subject: 左「眠い」右「眠くない」の2コラム比較、どちらも赤字メーター付き
          foreground: 2コラムの見出し（眠い／眠くない）
          midground: 赤字メーター（どちらも同じくらい赤い）
          background: 淡い和紙テクスチャ
          color_palette: 朱・紺・薄黄
          text_strategy:
            image_text_allowed: true
            image_text_max_words: 3
            remotion_overlay_text:
              - 眠くても
              - 眠くなくても
          layout_safety:
            keep_bottom_20_percent_empty: true
            avoid_character_area: true
            avoid_sub_area_overlap: true
          must_not_include:
            - 実在人物
            - 既存キャラクター
            - 長文テキスト
          quality_bar: 誤解訂正の2コラム比較として1秒で意味が取れる品質
          composition_type: two_column_contrast
        imagegen_prompt: |-
          ゆっくり解説動画Scene08 main枠用。1枚のみ生成。
          テーマ：「眠い状態」と「眠くない状態」を左右に並べ、どちらも赤字メーターが同じだけ増えているmyth vs factビジュアル。
          構図：画面を2カラムに分割。左「眠い」右「眠くない」の見出し付きカラム。
          各カラム下部に同じ高さの朱色バーゲージ（赤字メーター）を配置。
          色：朱・紺・薄黄、太線フラットスタイル、高コントラスト。
          禁止：実在人物、長文、霊夢魔理沙風キャラ。
          下部20%完全空き。
          【使用目的】ゆっくり解説動画のmyth_vs_factのセリフ補強素材。高品質なYouTube解説動画向け仕上がり。この1枚専用に個別生成すること。他画像と同時生成しない。
          前景・中景・背景の3層で構成すること。 余白を十分に取り、シンプルで読みやすい構図にすること。実在人物なし、ロゴなし、既存キャラクターなし、細かい文字なし。
          Remotionの重ねテキストは最小限。画像内の文字は長文は入れない。
    dialogue:
      - id: l01
        speaker: left
        text: どうやって借金が増えるの？
      - id: l02
        speaker: right
        text: 必要な睡眠より1時間少ない日が続くと
      - id: l03
        speaker: right
        text: 1週間で7時間分の借金になるんだぜ。
      - id: l04
        speaker: left
        text: 7時間！？気づかないわよそんなの。
      - id: l05
        speaker: right
        text: 眠気を感じなくなるのが怖いところだぜ。
      - id: l06
        speaker: left
        text: 眠くないから大丈夫だと思ってたやつだ！
      - id: l07
        speaker: right
        text: 脳の処理速度は確実に落ちてるんだぜ。
      - id: l08
        speaker: left
        text: 眠くなくても頭が鈍ってるってこと？
      - id: l09
        speaker: right
        text: 自覚なしに劣化していくんだぜ。
      - id: l10
        speaker: left
        text: 怖いわ、自分では気づけないのね。
  - id: s03
