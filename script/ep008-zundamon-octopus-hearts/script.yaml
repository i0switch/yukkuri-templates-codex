meta:
  id: ep008-zundamon-octopus-hearts
  episode_id: ep008-zundamon-octopus-hearts
  layout_template: Scene07
  character_pair: ZM
  pair: ZM
  title: なぜタコは3つの心臓を持つのか
  fps: 30
  width: 1280
  height: 720
  audience: 初心者向け
  tone: やさしい生物ミステリー
  voice_engine: voicevox
  target_duration_sec: 180
bgm:
  title: upbeat step
  source_url: https://dova-s.jp/en/bgm/detail/16211
  file: bgm/track.mp3
  license: DOVA-SYNDROME 標準利用規約
  volume: 0.09
  fade_in_sec: 1.0
  fade_out_sec: 1.5
characters:
  left:
    character: zundamon
    voicevox_speaker_id: 3
  right:
    character: metan
    voicevox_speaker_id: 2
scenes:
  - id: s01
    title_text: 心臓3つで血が青い生き物
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 3心臓の謎
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          中央に紫色の抽象的なタコのシルエット、頭部に3つのハートマーク（赤、青、青）が並ぶ。
          周囲に薄い青の波線で水中表現。
          色は紫、赤、青の3色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、人物の顔、リアル写真は禁止。
        style: フラット・かわいい生物アイコン
        aspect: 16:9
        negative: 写真風、グロ、文字、ロゴ、リアル動物
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: めたん、タコの心臓は何個なのだ
      - id: l02
        speaker: right
        text: 普通は1個だけど、タコは違うのよ
      - id: l03
        speaker: left
        text: えっ、まさか2個なのか
      - id: l04
        speaker: right
        text: もう1個足しなさい、3個よ
      - id: l05
        speaker: left
        text: みっつ！？心臓フェスじゃん
      - id: l06
        speaker: right
        text: しかも血の色は青なのよ
      - id: l07
        speaker: left
        text: ガチでエイリアンなのだ…
      - id: l08
        speaker: right
        text: 今日はその謎を3分で解くわ
  - id: s02
    title_text: 1つは全身、2つは鰓専用
    main:
      kind: image
      asset: assets/s02_main.png
      caption: 心臓3つの役割分担
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          中央に大きなハート、左右に少し小さめのハートが2つ。
          中央のハートから全身を表す矢印が放射状に伸び、左右のハートからは鰓を表すシダ状の形へ短い矢印。
          色は赤と青、グレーの3色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、解剖図のリアル表現は禁止。
        style: フラット解剖アイコン
        aspect: 16:9
        negative: グロ、リアル解剖、文字、ロゴ、人物
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: 心臓3つの内訳から見るわ
      - id: l02
        speaker: left
        text: 全部全身に血を送るやつ？
      - id: l03
        speaker: right
        text: 違う、ちゃんと役割分担があるのよ
      - id: l04
        speaker: left
        text: 心臓の派遣バイトみたいだね
      - id: l05
        speaker: right
        text: 真ん中の主心臓1つは全身担当
      - id: l06
        speaker: left
        text: 残り2つは何してるのだ
      - id: l07
        speaker: right
        text: 左右の鰓に1つずつ専用ポンプよ
      - id: l08
        speaker: left
        text: 鰓に直行便、贅沢タクシーなのだ
  - id: s03
    title_text: なぜ普通の1個じゃダメなのか
    main:
      kind: image
      asset: assets/s03_main.png
      caption: 鍵はヘモシアニン
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          左に赤い丸（鉄の血を象徴、ヘモグロビン）、右に青い丸（銅の血、ヘモシアニン）。
          中央に大きな疑問符、両者を比較する矢印。
          色は赤、青、グレーの3色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、化学式の文字、人物は禁止。
        style: フラット比較図
        aspect: 16:9
        negative: 文字、化学式、ロゴ、人物、リアル写真
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: なんで1個じゃダメなのだ
      - id: l02
        speaker: right
        text: ここから仮説の話に入るわ
      - id: l03
        speaker: left
        text: 仮説、ぼく好きなやつ
      - id: l04
        speaker: right
        text: 鍵は血の正体、ヘモシアニンよ
      - id: l05
        speaker: left
        text: なんかコシヒカリみたいだね
      - id: l06
        speaker: right
        text: 米じゃないわ、銅を使う色素よ
      - id: l07
        speaker: left
        text: 銅が酸素運ぶ？10円玉でなのだ
      - id: l08
        speaker: right
        text: 例えはアレだけど考えは合ってる
      - id: l09
        speaker: left
        text: ヘモグロビンは鉄、こっちは銅か
      - id: l10
        speaker: right
        text: その違いが効いてくるのよ
  - id: s04
    title_text: 冷たく酸素少ない海で強い血
    main:
      kind: image
      asset: assets/s04_main.png
      caption: 仮説 低温低酸素で有利
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          深い青の海中、上部に薄い水面の波線、底に岩を抽象化した三角形。
          中央に銅色の小さな粒子が漂う表現、薄い気泡数個。
          色は深青、水色、銅色の3色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、人物、リアル深海写真は禁止。
        style: フラット深海アイコン
        aspect: 16:9
        negative: リアル写真、文字、ロゴ、人物、グロ
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: ヘモシアニンは冷たい海で強い
      - id: l02
        speaker: left
        text: 鉄の血より冷えに強いのだ
      - id: l03
        speaker: right
        text: 低温・低酸素の深海で性能を出す
      - id: l04
        speaker: left
        text: なるほど、深海ガチ勢の装備
      - id: l05
        speaker: right
        text: でも欠点が1つあるのよ
      - id: l06
        speaker: left
        text: なんか嫌な予感がする…
      - id: l07
        speaker: right
        text: 酸素を運ぶ効率は鉄より弱いの
      - id: l08
        speaker: left
        text: えっ、それじゃ酸欠じゃん
  - id: s05
    title_text: 弱点を心臓の数で補う作戦
    main:
      kind: image
      asset: assets/s05_main.png
      caption: 心臓3段ロケット
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          縦に3段のハート型タンクが繋がるロケット風シルエット。
          下から上へ青い気泡が流れる表現、各段の間に細い管。
          色は赤、青、グレーの3色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、リアル機械、人物は禁止。
        style: フラット概念アイコン
        aspect: 16:9
        negative: 文字、リアル機械、ロゴ、人物、写真
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: そこで心臓の数で殴るのよ
      - id: l02
        speaker: left
        text: 力技なのだ、結構好き
      - id: l03
        speaker: right
        text: 鰓専用ポンプ2つで圧を上げる
      - id: l04
        speaker: left
        text: 酸素を効率よく取るためだね
      - id: l05
        speaker: right
        text: 取り込んだ後、主心臓で全身へ送る
      - id: l06
        speaker: left
        text: 工場の三段ロケットみたいだ
      - id: l07
        speaker: right
        text: 例えとしては割と正しいわよ
      - id: l08
        speaker: left
        text: 進化、努力で補うスタイルだね
  - id: s06
    title_text: 泳ぐと主心臓が止まる弱点
    main:
      kind: image
      asset: assets/s06_main.png
      caption: 歩く方が燃費がいい
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          左に泳ぐタコ（流線型）と止まったハートのアイコン、右に海底を歩くタコと動くハートのアイコン。
          矢印で左から右へ「歩く方がいい」を示す流れ。
          色は紫、赤、青の3色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、人物、リアル動物は禁止。
        style: フラット比較イラスト
        aspect: 16:9
        negative: 文字、リアル動物、ロゴ、人物、写真
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: ただ、この設計には弱点もある
      - id: l02
        speaker: left
        text: えっ、まだ落ちあるの！？
      - id: l03
        speaker: right
        text: タコは泳ぐと主心臓が止まる
      - id: l04
        speaker: left
        text: 止まる！？普通に詰みじゃん
      - id: l05
        speaker: right
        text: だから歩く方が燃費がいいのよ
      - id: l06
        speaker: left
        text: タコが歩く理由、ガチで切実
      - id: l07
        speaker: right
        text: 寒い海と低酸素から生まれた工夫
      - id: l08
        speaker: left
        text: 弱点だらけでも生き残ってる
      - id: l09
        speaker: right
        text: 進化って妥協と工夫の塊なのよ
      - id: l10
        speaker: left
        text: タコさん、リスペクトしかないのだ
  - id: s07
    title_text: 図鑑を開いて推しを1匹決める
    main:
      kind: image
      asset: assets/s07_main.png
      caption: 行動2ステップ
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          左に開いた本のアイコン（ページの中に小さな魚やタコのシルエット）、右にハートマーク付きのチェックボックス。
          中央に右向き矢印で2ステップを表現。
          色は青緑とオレンジの2色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、実在UI、人物は禁止。
        style: フラットUI風アイコン
        aspect: 16:9
        negative: 文字、ロゴ、実在UI、人物、写真
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: 今日のまとめを1分で行くわ
      - id: l02
        speaker: left
        text: 心臓3個、主1鰓2の役割分担なのだ
      - id: l03
        speaker: right
        text: 血が青いのは銅ベースだから
      - id: l04
        speaker: left
        text: 寒くて酸素少ない海で進化したんだ
      - id: l05
        speaker: right
        text: 1つ目の宿題、生物図鑑を開く
      - id: l06
        speaker: left
        text: 今日は心臓の数だけ見るのだ
      - id: l07
        speaker: right
        text: 2つ目、推し生物を1匹だけ決める
      - id: l08
        speaker: left
        text: ぼくは絶対タコ推し決定！
      - id: l09
        speaker: right
        text: その推しを今夜のメモに保存ね
      - id: l10
        speaker: left
        text: 高評価とコメで推し生物おしえてほしいのだ
