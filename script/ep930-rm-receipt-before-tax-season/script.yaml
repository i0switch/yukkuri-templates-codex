          s01: その1枚、3月に消える

          霊夢「魔理沙、確定申告前にレシート探すのって、毎年ちょっとした宝探しじゃない？」
          魔理沙「宝探しなら楽しいけど、経費になるかもしれない紙を掘る作業はただの損失だぜ」
          霊夢「え、そんな大げさ？財布の奥をガサガサすれば出てくるでしょ」
          魔理沙「出てくるならいい。問題は、財布、紙袋、机の引き出し、カメラロールに分散してることなんだぜ」
          霊夢「うっ、心当たりが多すぎて、今ちょっと胸が痛い」
          魔理沙「1枚5000円の領収書でも、5枚見つからなければ25000円分の判断材料が消える」
          霊夢「マジで！？私の雑な保管、普通にお金を隠してるじゃん」
          魔理沙「そうだぜ。今日は確定申告の直前に探さなくて済む、レシートの逃がし方を作る」
          霊夢「つまり魔法の封筒を買えば勝ちね」
          魔理沙「その魔法の封筒が毎年行方不明になるから、今日は仕組みで勝つんだぜ」

