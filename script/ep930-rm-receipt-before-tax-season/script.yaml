  - id: s03
    role: body
    scene_goal: 入口を1つに固定する
    viewer_question: 後でまとめればいい
    visual_role: 玄関やデスクに置かれた小さなレシートトレー
    scene_format: 手順型
    duration_sec: 30
    main:
      kind: image
      asset: assets/s03_main.png
      asset_requirements:
        imagegen_prompt: |-
          s03: 帰宅後30秒が分かれ道

          霊夢「じゃあ、帰ってからちゃんと整理すればいいのね。明日の私に任せるわ」
          魔理沙「明日の霊夢は、だいたい今日の霊夢より忙しいぜ」
          霊夢「ひどい。でも否定できない」
          魔理沙「だから帰宅後30秒だけでいい。レシートは1つのトレーか封筒に入れる」
          霊夢「30秒ならできそう。気合いの大掃除じゃないのね」
          魔理沙「大掃除にすると続かない。入口だけ固定して、細かい整理は週1に回す」
          霊夢「つまり、レシートの一時避難所を作るってこと？」
          魔理沙「そうだぜ。紙はトレー、データは専用フォルダ。入口が1つなら迷子が減る」
          霊夢「マジで！？それだけで未来の私が助かるの？」
          魔理沙「助かる。未来の自分を信用しすぎず、今の30秒で柵を作るんだぜ」

