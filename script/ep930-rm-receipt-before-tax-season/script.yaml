  - id: s10
    role: outro
    scene_goal: 今日やる行動へ落とす
    viewer_question: 来月からでいい
    visual_role: 今日のレシート1枚を撮って保存する場面
    scene_format: まとめ再フック型
    duration_sec: 30
    main:
      kind: image
      asset: assets/s10_main.png
      asset_requirements:
        imagegen_prompt: |-
          s10: 今日の1枚で未来を救う

          霊夢「よし、来月から本気出すわ」
          魔理沙「それが一番危ない。今日の1枚で仕組みを作るんだぜ」
          霊夢「今日の1枚だけでいいの？」
          魔理沙「いい。今日のレシートを撮る、専用フォルダへ入れる、名前を日付_店名_用途にする」
          霊夢「それを1回やれば、次から同じ型でできるわけね」
          魔理沙「さらに週1の10分をカレンダーに入れる。これで探す作業を未来に押し付けない」
          霊夢「マジで！？今やらないと、未来の私がまた机を掘るのね」
          魔理沙「そうだぜ。確定申告前に焦る人ほど、今の小さい固定が効く」
