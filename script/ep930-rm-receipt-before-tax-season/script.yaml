          霊夢「私は財布に入れる日もあるし、バッグのポケットの日もあるし、疲れた日は机にポイかな」
          魔理沙「それが三分裂だ。あとで探す時に、候補地が増えすぎる」
          霊夢「候補地って言うと聞こえはいいけど、ただの迷宮ね」
          魔理沙「しかも紙だけじゃない。写真で撮った領収書もカメラロールに混ざる」
          霊夢「ああ、昼ごはんの写真と領収書が同じ場所にいるやつ」
          魔理沙「そう。犬の写真、ラーメン、領収書、全部同じ流れにいるから検索できない」
          霊夢「領収書、ラーメンに埋もれて成仏してる」
          魔理沙「だから最初の敵はゴミ箱じゃなくて、保存場所の分裂なんだぜ」

