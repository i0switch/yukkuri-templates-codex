meta:
  id: ep007-yukkuri-mystery-places
  episode_id: ep007-yukkuri-mystery-places
  layout_template: Scene09
  character_pair: RM
  pair: RM
  title: 地球で科学が説明できない場所Top5
  fps: 30
  width: 1280
  height: 720
  audience: 初心者向け
  tone: 軽快なミステリー雑学
  voice_engine: aquestalk
  target_duration_sec: 180
bgm:
  title: upbeat step
  source_url: https://dova-s.jp/en/bgm/detail/16211
  file: bgm/track.mp3
  license: DOVA-SYNDROME 標準利用規約
  volume: 0.09
  fade_in_sec: 1.0
  fade_out_sec: 1.5
characters:
  left:
    character: reimu
    aquestalk_preset: "AquesTalk10 F1"
  right:
    character: marisa
    aquestalk_preset: "AquesTalk10 F2"
scenes:
  - id: s01
    title_text: 地球はまだ謎だらけだぜ
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 世界に散る5つの謎
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、暗い紺色の世界地図シルエット、白背景。
          地図上に5つの大きめの星マーク（黄色とオレンジ）が散らばる。
          各星から薄い光のリングがふわっと広がる構図。
          余白多め、シンプル。16:9 アスペクト比。
          文字、ロゴ、実在ブランド、人物の顔は禁止。
        style: フラット・ミステリー雑学
        aspect: 16:9
        negative: 写真風、リアル調、文字、ロゴ、実在ブランド、人物の顔
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 地球の謎ってもう全部解けたよね
      - id: l02
        speaker: right
        text: いや、解けてない場所が普通にあるぜ
      - id: l03
        speaker: left
        text: え、検索すれば全部出てくるじゃん
      - id: l04
        speaker: right
        text: 検索しても理由不明な場所、5つ並べる
      - id: l05
        speaker: left
        text: 5個もあるの？全部UFO案件？
      - id: l06
        speaker: right
        text: 真面目な科学未解決だけ選んだんだぜ
      - id: l07
        speaker: left
        text: 怖いやつから来そうで震えるんだけど
      - id: l08
        speaker: right
        text: 5位から行くぞ、最後が一番ヤバい
  - id: s02
    title_text: シベリアの巨大円形クレーター
    main:
      kind: image
      asset: assets/s02_main.png
      caption: 第5位 パトムスキー
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          森林の中央にぽっかり開いた円形の盛り上がり、上空から見た俯瞰図。
          クレーターは茶色とベージュ、周囲は緑の針葉樹を抽象化した三角形。
          クレーター中央にうっすら光のリング。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、実在地形写真、人物は禁止。
        style: フラット俯瞰図
        aspect: 16:9
        negative: 写真風、リアル衛星画像、文字、ロゴ、人物
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: シベリアの穴ってメタンガスでしょ
      - id: l02
        speaker: right
        text: それは別物、今回はパトムスキーだ
      - id: l03
        speaker: left
        text: 何それ、聞いたことないやつ
      - id: l04
        speaker: right
        text: 直径80mの巨大な円形クレーター
      - id: l05
        speaker: left
        text: 隕石でいいじゃん、はい次
      - id: l06
        speaker: right
        text: でも周りに衝突跡が無いんだぜ
      - id: l07
        speaker: left
        text: えっ、隕石なら絶対跡あるよね
      - id: l08
        speaker: right
        text: だから今も正体は不明のままだ
      - id: l09
        speaker: left
        text: 地下から押し上げた説もあるの？
      - id: l10
        speaker: right
        text: 水蒸気爆発説や地下核反応説まである
  - id: s03
    title_text: 鳥が石になる赤い湖
    main:
      kind: image
      asset: assets/s03_main.png
      caption: 第4位 ナトロン湖
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          中央に鮮やかなピンク赤の湖を上空から俯瞰、湖の縁は塩の白い結晶帯。
          湖畔に石化した鳥のシルエットが2羽、薄いグレーで配置。
          色は赤ピンクと白、グレーの3色。シンプル、余白多め。
          16:9 アスペクト比。
          リアル動物写真、文字、ロゴ、流血表現は禁止。
        style: フラット俯瞰図
        aspect: 16:9
        negative: 写真風、リアル動物、流血、文字、ロゴ
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: お次はタンザニアのナトロン湖だぜ
      - id: l02
        speaker: left
        text: 動物が石化するって都市伝説でしょ
      - id: l03
        speaker: right
        text: 実際の写真が現実に存在してるぜ
      - id: l04
        speaker: left
        text: マジで？完全に呪い案件じゃん
      - id: l05
        speaker: right
        text: pH10超え、強アルカリの湖なんだ
      - id: l06
        speaker: left
        text: ザリガニのお風呂にも厳しそう
      - id: l07
        speaker: right
        text: 落ちた鳥が炭酸カルシウムで包まれる
      - id: l08
        speaker: left
        text: ミイラじゃなく石化、上位互換の呪い
      - id: l09
        speaker: right
        text: なぜ生物が落ちるかは未解明なんだ
      - id: l10
        speaker: left
        text: 鳥も困惑する湖、地球やばすぎ
  - id: s04
    title_text: 草原に並ぶ謎の丸い禿げ
    main:
      kind: image
      asset: assets/s04_main.png
      caption: 第3位 妖精の輪
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          黄緑の草原を上空から俯瞰、規則正しく並んだ円形の禿げ地（茶色）が10個ほど整列。
          サイズは大小ばらつき、整然としたパターン。
          色は黄緑と土色の2色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、人物、実在写真は禁止。
        style: フラット俯瞰図
        aspect: 16:9
        negative: 写真風、文字、ロゴ、人物、実在地形
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: ここで一回ペースを整理するぜ
      - id: l02
        speaker: left
        text: もう3つ目、私の脳がバグった
      - id: l03
        speaker: right
        text: 残り3つ、変なやつしか来ないぞ
      - id: l04
        speaker: left
        text: 来い、心の準備はもう終わった
      - id: l05
        speaker: right
        text: ナミブ砂漠の妖精の輪、知ってるか
      - id: l06
        speaker: left
        text: 草原に丸い禿げが並ぶやつ？
      - id: l07
        speaker: right
        text: 直径2〜10m、不気味なほど整列
      - id: l08
        speaker: left
        text: 誰かが芝刈り機で遊んだだけでは
      - id: l09
        speaker: right
        text: 白アリ説と植物競合説で学者対立中
      - id: l10
        speaker: left
        text: え、学者がガチで揉めてるの？
  - id: s05
    title_text: 200万年雨が降らない南極の谷
    main:
      kind: image
      asset: assets/s05_main.png
      caption: 第2位 ドライバレー
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          中央に乾いた茶色の谷、両脇に切り立った白い雪山。
          谷の奥に、赤い水が氷から滴る「血の滝」を抽象化したアイコン。
          色は茶色、白、赤の3色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、リアル写真、流血表現は禁止。
        style: フラット俯瞰図
        aspect: 16:9
        negative: 写真風、流血、文字、ロゴ、人物
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: 第2位、南極のドライバレーだ
      - id: l02
        speaker: left
        text: 南極なら全部凍ってんじゃないの
      - id: l03
        speaker: right
        text: ここは200万年雨も雪も降らないぜ
      - id: l04
        speaker: left
        text: えっ、南極で雨降らないとか嘘でしょ
      - id: l05
        speaker: right
        text: 山脈が湿った空気を全部はじいてる
      - id: l06
        speaker: left
        text: でも血みたいな滝あるって聞いたよ
      - id: l07
        speaker: right
        text: 鉄分で赤い水が垂れる血の滝だぜ
      - id: l08
        speaker: left
        text: 名前のセンスがホラー映画じゃん
      - id: l09
        speaker: right
        text: 内部の塩水と微生物の一部は未解明
      - id: l10
        speaker: left
        text: 火星みたいなのが地球にもあるんだ
  - id: s06
    title_text: 4kmまるごと熱湯の川
    main:
      kind: image
      asset: assets/s06_main.png
      caption: 第1位 沸騰川
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          ジャングルの中を蛇行して流れる青い川、川面から白い湯気がもくもく立ち上る。
          周囲は緑の三角形で抽象化された熱帯雨林。
          色は青、白、緑の3色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、人物、リアル写真は禁止。
        style: フラットイラスト
        aspect: 16:9
        negative: 写真風、文字、ロゴ、人物、リアル背景
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: ラスト、ペルー奥地の沸騰川だぜ
      - id: l02
        speaker: left
        text: 沸騰川って、比喩ですよね
      - id: l03
        speaker: right
        text: 比喩じゃない、4kmが90℃超え
      - id: l04
        speaker: left
        text: 落ちたら3秒で終了の川じゃん
      - id: l05
        speaker: right
        text: 動物が落ちて茹で上がる事故もある
      - id: l06
        speaker: left
        text: もう湯沸かし器のお化けじゃん
      - id: l07
        speaker: right
        text: 地熱だけじゃ流量を説明できないぜ
      - id: l08
        speaker: left
        text: えっ、まだ原因分かってないの
      - id: l09
        speaker: right
        text: 火山活動から離れすぎてるんだぜ
      - id: l10
        speaker: left
        text: 自然は完全にホラー作家じゃん
  - id: s07
    title_text: 今日選ぶ1つと、月1で見る予定
    main:
      kind: image
      asset: assets/s07_main.png
      caption: 行動チェックリスト
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          縦に並んだ3つのチェックボックス（未チェット状態）。
          各ボックスの右に短い線（中身の文字は描かない）。
          一番上のボックスにだけ青緑のチェックマーク。
          色は青緑とグレーの2色。シンプル、余白多め。
          16:9 アスペクト比。
          文字、ロゴ、実在UIの模写は禁止。
        style: フラットUI風アイコン
        aspect: 16:9
        negative: 文字、ロゴ、実在UI、人物
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: 今日のTop5、覚えてるか霊夢
      - id: l02
        speaker: left
        text: ナトロン湖と沸騰川、脳に焼けた
      - id: l03
        speaker: right
        text: 地球はまだ未解決だらけなんだぜ
      - id: l04
        speaker: left
        text: で、私たちは何をすればいいの
      - id: l05
        speaker: right
        text: まず気になる1ヶ所を決めるぜ
      - id: l06
        speaker: left
        text: 私はナミブ妖精の輪、整列フェチ
      - id: l07
        speaker: right
        text: 次に保存先のメモに名前を書く
      - id: l08
        speaker: right
        text: 月末に新説出てないかチェック予定
      - id: l09
        speaker: left
        text: 地球のニュースが毎月楽しみになる
      - id: l10
        speaker: right
        text: 高評価とコメントで君の1位も教えろ
