meta:
  id: ep-smartphone-storage-rm
  title: 消す前に逃がせ スマホ容量整理
  layout_template: Scene02
  pair: RM
  fps: 30
  width: 1920
  height: 1080
  audience: スマホ容量整理で焦りがちな初心者
  tone: フランクに損失回避を刺す
  voice_engine: aquestalk
  target_duration_sec: 300
characters:
  left:
    character: reimu
    speaking_style: 視聴者代表。焦り、勘違い、ツッコミを担当。
  right:
    character: marisa
    speaking_style: 解説役。短く訂正し、結論ではだぜを混ぜる。
scenes:
  - id: s01
    role: intro
    title_text: 消す前に逃がせ
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 容量不足で詰む流れ
    sub:
      kind: bullets
      items: [消す前に確認, 容量一覧を見る, 逃がし先を決める]
    dialogue:
      - {id: l01, speaker: left, text: 容量が赤いのよ, expression: halfOpen}
      - {id: l02, speaker: right, text: 今消すと危ないぜ, expression: calm}
      - {id: l03, speaker: left, text: 消せば空くじゃない, expression: smile}
      - {id: l04, speaker: right, text: 未保存なら詰むぜ, expression: calm}
      - {id: l05, speaker: left, text: 旅行写真で泣くやつね, expression: halfOpen}
      - {id: l06, speaker: right, text: 先に逃がすんだぜ, expression: smile}
    duration_sec: 60
  - id: s02
    role: body
    title_text: 写真より動画が危ない
    main:
      kind: image
      asset: assets/s03_main.png
      caption: 写真と動画の容量差
    sub:
      kind: bullets
      items: [動画を優先, 重い順で見る, 数字で判断]
    dialogue:
      - {id: l01, speaker: left, text: 写真だけ消せばいい？, expression: smile}
      - {id: l02, speaker: right, text: まず動画を見るんだぜ, expression: calm}
      - {id: l03, speaker: left, text: なんで動画なの？, expression: halfOpen}
      - {id: l04, speaker: right, text: 1分で数百MBもある, expression: calm}
      - {id: l05, speaker: left, text: 一口サイズの怪物ね, expression: smile}
      - {id: l06, speaker: right, text: 重い順が近道だぜ, expression: smile}
    duration_sec: 60
  - id: s03
    role: body
    title_text: 同期中は未完了
    main:
      kind: image
      asset: assets/s05_main.png
      caption: 保存完了を確認
    sub:
      kind: bullets
      items: [同期完了を見る, 別端末で開く, 大事な物は二重]
    dialogue:
      - {id: l01, speaker: left, text: クラウドなら平気？, expression: smile}
      - {id: l02, speaker: right, text: 半分だけ正解だぜ, expression: calm}
      - {id: l03, speaker: left, text: 半分って怖いな, expression: halfOpen}
      - {id: l04, speaker: right, text: 同期中なら未完了だ, expression: calm}
      - {id: l05, speaker: left, text: 届く前の弁当ね, expression: smile}
      - {id: l06, speaker: right, text: 開けるか確認だぜ, expression: smile}
    duration_sec: 60
  - id: s04
    role: body
    title_text: アプリも太る
    main:
      kind: image
      asset: assets/s07_main.png
      caption: 一時保存の掃除ポイント
    sub:
      kind: bullets
      items: [キャッシュ確認, 添付を確認, ログイン注意]
    dialogue:
      - {id: l01, speaker: left, text: 写真だけじゃないのね, expression: halfOpen}
      - {id: l02, speaker: right, text: アプリも太るぜ, expression: calm}
      - {id: l03, speaker: left, text: 太るアプリって何よ, expression: smile}
      - {id: l04, speaker: right, text: 一時保存が溜まるんだ, expression: calm}
      - {id: l05, speaker: left, text: レシートの山ね, expression: smile}
      - {id: l06, speaker: right, text: 安全な項目だけ消すぜ, expression: smile}
    duration_sec: 60
  - id: s05
    role: cta
    title_text: 今日やる三手順
    main:
      kind: image
      asset: assets/s10_main.png
      caption: 見る、逃がす、最後に消す
    sub:
      kind: bullets
      items: [容量一覧, 最大動画, 月1予定]
    dialogue:
      - {id: l01, speaker: left, text: 結局、順番が大事ね, expression: smile}
      - {id: l02, speaker: right, text: 確認、逃がす、消すだぜ, expression: calm}
      - {id: l03, speaker: left, text: 今日やることは？, expression: halfOpen}
      - {id: l04, speaker: right, text: 容量一覧を開くんだぜ, expression: calm}
      - {id: l05, speaker: left, text: 一番重い動画を選ぶ, expression: smile}
      - {id: l06, speaker: right, text: 保存先へ逃がすんだぜ, expression: smile}
    duration_sec: 60
total_duration_sec: 300
