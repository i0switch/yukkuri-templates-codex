meta:
  id: ep907-zm-free-ai-tool-sprawl
  title: 無料AIツールを増やしすぎると作業が止まる理由
  layout_template: Scene10
  pair: ZM
  fps: 30
  width: 1280
  height: 720
  audience: AIツールを試しすぎて作業が進まない初心者
  tone: 短く刺すが、不安だけで終わらせず対処まで出す
  bgm_mood: 軽く緊張感のある解説用
  voice_engine: voicevox
  target_duration_sec: 180
  image_style: 太線フラット図解。モノクロ背景でも読める高コントラスト、緑と青緑をアクセントにする。
  typography:
    subtitle_family: gothic
    content_family: gothic
    title_family: gothic
    subtitle_stroke_color: "#000000"
    subtitle_stroke_width: 6
characters:
  left:
    character: zundamon
    voicevox_speaker_id: 3
    speaking_style: 視聴者代表。浅い理解、驚き、ボケを担当。語尾は自然にのだ。
  right:
    character: metan
    voicevox_speaker_id: 2
    speaking_style: 解説役。冷静に刺し、対処まで落とす。
scenes:
  - id: s01
    role: intro
    scene_goal: 無料AIツールの増やしすぎが作業停止を招くと刺す
    scene_format: 誤解訂正型
    viewer_question: 無料なら増やしてよいのか
    viewer_misunderstanding: 無料ツールは多いほど得だと思う
    number_or_example: 5個開いて選ぶだけで10分溶ける
    visual_role: ずんだもんが無料ツールを増やし、めたんが作業停止を指摘する瞬間
    main:
      kind: image
      asset: assets/s01_main.png
      caption: ツールが多いほど止まる
      asset_requirements:
        description: 画面を埋める多数のAIカード
        imagegen_prompt: |-
          ゆっくり解説 / ずんだもん解説動画のScene10 main枠で使う高品質ビジュアル素材。
          この画像は、台本内の「ずんだもんが無料ツールを増やし、めたんが作業停止を指摘する瞬間」を視覚的に補強する。
          visual_typeは「hook_poster」、composition_typeは「calendar_warning_closeup」。

          画面構図：
          前景には画面を埋める多数のAIカードを大きく配置する。
          中景には5個開いて選ぶだけで10分溶けるが伝わる補助アイコンを少量置く。
          背景には淡い余白と流れを示す線だけを置く。
          視線は左上の主役から中央の結論へ流れる。

          デザイン：
          高品質な日本の解説動画内スライドのように、余白、階層、視線誘導がある完成度の高い画面。
          ただし実在ブランドや実在UIは模写しない。
          色は太線フラット図解。モノクロ背景でも読める高コントラスト、緑と青緑をアクセントにする。。
          光は柔らかく、影は薄くする。
          画面下部20%は字幕とキャラ表示用に空ける。

          文字方針：
          画像内の文字は最大3語まで。
          正確な日本語タイトルや説明はRemotionで重ねるため、長文は入れない。
          入れてよい短語は「OK」「!」「¥」「AI」程度。

          安全制約：細かい文字なし、ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし。

          禁止：
          単体アイコンだけの使い回し画像、実在ロゴ、実在UI、既存キャラクター、写真風人物、長文テキスト、細かい表。
        style: ずんだもん解説向け、16:9、余白多め、文字最小限
        aspect: 16:9
    sub:
      kind: bullets
      items:
        - 迷う
        - 探す
        - 止まる
    visual_asset_plan:
      - slot: main
        purpose: 無料AIツールの増やしすぎが作業停止を招くと刺す
        supports_dialogue:
          - s01_l01
          - s01_l02
        supports_moment: ずんだもんが無料ツールを増やし、めたんが作業停止を指摘する瞬間
        visual_type: hook_poster
        composition_type: calendar_warning_closeup
