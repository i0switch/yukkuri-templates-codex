meta:
  id: ep906-rm-subscription-leak
  title: サブスク解約忘れで毎月損する理由
  layout_template: Scene02
  pair: RM
  fps: 30
  width: 1280
  height: 720
  audience: サブスクを増やしがちな初心者
  tone: 短く刺すが、不安だけで終わらせず対処まで出す
  bgm_mood: 軽く緊張感のある解説用
  voice_engine: aquestalk
  target_duration_sec: 180
  image_style: 太線フラット図解。白基調、青と青緑を主色、警告だけ赤、下部余白を広く取る。
  typography:
    subtitle_family: gothic
    content_family: gothic
    title_family: gothic
    subtitle_stroke_color: "#000000"
    subtitle_stroke_width: 6
characters:
  left:
    character: reimu
    aquestalk_preset: れいむ
    speaking_style: 視聴者代表。損に焦り、雑な解決策とツッコミを担当。
  right:
    character: marisa
    aquestalk_preset: まりさ
    speaking_style: 解説役。短く訂正し、自然に「だぜ」を混ぜる。
scenes:
  - id: s01
    role: intro
    scene_goal: 小さい月額でも放置すると損になると刺す
    scene_format: あるある型
    viewer_question: 数百円のサブスクは放置してよいのか
    viewer_misunderstanding: 数百円なら痛くないと思う
    number_or_example: 月500円でも年6000円
    visual_role: 霊夢が小額を軽く見て、魔理沙が年額で止める瞬間
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 毎月の小さな漏れ
      asset_requirements:
        description: 料金マークが増えるカレンダー
        imagegen_prompt: |-
          ゆっくり解説 / ずんだもん解説動画のScene02 main枠で使う高品質ビジュアル素材。
          この画像は、台本内の「霊夢が小額を軽く見て、魔理沙が年額で止める瞬間」を視覚的に補強する。
          visual_typeは「hook_poster」、composition_typeは「calendar_warning_closeup」。

          画面構図：
          前景には料金マークが増えるカレンダーを大きく配置する。
          中景には月500円でも年6000円が伝わる補助アイコンを少量置く。
          背景には淡い余白と流れを示す線だけを置く。
          視線は左上の主役から中央の結論へ流れる。

          デザイン：
          高品質な日本の解説動画内スライドのように、余白、階層、視線誘導がある完成度の高い画面。
          ただし実在ブランドや実在UIは模写しない。
          色は太線フラット図解。白基調、青と青緑を主色、警告だけ赤、下部余白を広く取る。。
          光は柔らかく、影は薄くする。
          画面下部20%は字幕とキャラ表示用に空ける。

          文字方針：
          画像内の文字は最大3語まで。
          正確な日本語タイトルや説明はRemotionで重ねるため、長文は入れない。
          入れてよい短語は「OK」「!」「¥」「AI」程度。

          安全制約：細かい文字なし、ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし。

          禁止：
          単体アイコンだけの使い回し画像、実在ロゴ、実在UI、既存キャラクター、写真風人物、長文テキスト、細かい表。
        style: ゆっくり解説向け、16:9、余白多め、文字最小限
        aspect: 16:9
    sub:
      kind: bullets
      items:
        - 月額
        - 放置
        - 積み上げ
    visual_asset_plan:
      - slot: main
        purpose: 小さい月額でも放置すると損になると刺す
        supports_dialogue:
          - s01_l01
          - s01_l02
        supports_moment: 霊夢が小額を軽く見て、魔理沙が年額で止める瞬間
        visual_type: hook_poster
        composition_type: calendar_warning_closeup
        insert_timing: s01 の l01 直前から表示
        asset: assets/s01_main.png
        image_direction:
          scene_id: s01
          dialogue_role: 冒頭フック
          scene_emotion: 焦り
          visual_type: hook_poster
          composition_type: calendar_warning_closeup
          image_should_support: 霊夢が小額を軽く見て、魔理沙が年額で止める瞬間
