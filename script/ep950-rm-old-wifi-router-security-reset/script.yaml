        imagegen_prompt: >-
          s01: ルーター、5年ぶりに見た


          霊夢「ねえ魔理沙、うちのWi-Fiルーターって引っ越してきた時から使ってるんだけど」

          魔理沙「それ何年前だぜ？」

          霊夢「えーと……5年くらい前かな」

          魔理沙「5年！？パスワードとかSSIDって変えたことある？」

          霊夢「え、変えるものなの？繋がってれば別に問題ないじゃない」

          魔理沙「それ、結構ヤバい状態かもしれないだぜ」

          霊夢「ヤバいって何が。電波は飛んでるし速度も普通だけど」

          魔理沙「今日は5年放置ルーターを15分で安全にする話をするんだぜ。3つのことをやっていないと、見えないリスクが積み上がってるんだぜ」

          霊夢「3つ……なんかもう面倒くさい予感がするわ」

          魔理沙「難しい話じゃないだぜ。ただ知らないまま放置するのが一番まずいだぜ」


