          魔理沙「管理画面に入られると設定を好き勝手いじられるだぜ。DNSを書き換えて、アクセスするサイトをすり替えることもできるんだぜ」

          霊夢「DNSって何かよく分かんないけど……なんか怖いことは分かった」

