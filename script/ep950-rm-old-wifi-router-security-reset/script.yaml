          霊夢「そもそも、パスワードって変えなくていい理由あるじゃない。忘れたら困るし」

          魔理沙「待て待て霊夢、それが一番の勘違いだぜ」

          霊夢「え、でも繋がってるんだから問題ないでしょ」

          魔理沙「ルーターの初期パスワードってのはさ、機種ごとにパターンがあって、ネット上に一覧で出回ってるんだぜ」

          霊夢「え？！そんなの公開されてるの？」

          魔理沙「BUFFALOなら「admin」とか、NECなら「admin」とか。知ってる人が見れば5秒で試せるだぜ」

