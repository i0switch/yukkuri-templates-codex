meta:
  id: ep971-zm-qr-code-phishing-trap
  title: 偽QRコードでアカウントとお金を取られる前に見る3つの確認
  layout_template: Scene02
  pair: ZM
  fps: 30
  width: 1920
  height: 1080
  audience: QR決済、宅配通知、店舗ポスターのQRを日常的に読み取るスマホ利用者
  tone: 日常の油断から偽QRの見分け方へ進む防犯解説。ずんだもんの焦りをめたんが冷静に止める。
  bgm_mood: 少し緊張感のあるサイバー防犯解説BGM
  voice_engine: voicevox
  target_duration_sec: 300
  image_style: スマホ、QRコード、宅配通知、警告マーク、公式確認を使った黒黄アクセントの防犯図解
