  left:
    character: zundamon
    voicevox_speaker_id: 3
    speaking_style: 焦り、勘違い、素直な反応、行動宣言
  right:
    character: metan
    voicevox_speaker_id: 2
    speaking_style: 冷静な訂正、短い皮肉、具体的な防犯手順
