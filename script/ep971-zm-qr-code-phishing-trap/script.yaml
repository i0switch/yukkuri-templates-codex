          ずんだもん「本日中なら急ぐべきでしょ。」
          めたん「急がせる時点で警戒ですわ。」
          ずんだもん「つまり焦らせるのが罠なのだ？」
          めたん「24時間、再配達、保管期限はよく使われますの。」
          ずんだもん「宅配っぽい言葉だと信じちゃうのだ。」
