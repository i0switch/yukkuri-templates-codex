        adoption_reason: 日常のQRが危険に変わる瞬間を見せるため
        image_role: 不安喚起
        composition_type: 事故寸前構図
        imagegen_prompt_ref: image_prompts.json#s01.main
        imagegen_prompt: |-
          s01: 貼り替えQRで支払いが消える

          ずんだもん「宅配のQRを読んだら、危険なログイン画面が出てきたのだ。」
          めたん「毎日スマホで読む人ほど、そこで止まるべきですわ。」
          ずんだもん「今日は偽QRでお金とアカウントを取られない確認をするのだ。」
          めたん「QRは便利だけど、見た目では行き先が読めませんの。」
          ずんだもん「黒い四角が全部まじめに見えるのだ。」
          めたん「だから読み取った後の画面で判断しますわ。」
          ずんだもん「マジで？読み取る前じゃなく後も大事なのだ？」
          めたん「前、直後、入力前の3か所で止まるの。」
          ずんだもん「3回ブレーキなのだな。」
          めたん「急がせる画面ほど疑うべきですわ。」
          ずんだもん「ぼく、急げって言われると走るタイプなのだ。」
          めたん「そこを今日は止めますわ。」

          ゆっくり解説動画向けの挿入画像を日本語で生成してください。 この画像は会話内容をそのまま再現するためのものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。 字幕やセリフは別で表示するため、会話等は画像に入れないでください。 キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、抽象的な画面風ビジュアル、概念図、状況説明ビジュアルを中心に構成してください。 画像内の可読テキストは日本語だけにしてください。英語ラベル、英語見出し、英語UI、英単語の装飾文字は禁止です。 文字が崩れる可能性がある場合は、文字を使わずアイコン、色分け、形、配置で表現してください。 下部に白帯、入力欄、チャット欄、テキストボックス風の余白を作らないでください。 画像の役割は「不安喚起」、構図タイプは「事故寸前構図」です。 画面で一番大きく見せる対象は「貼り替えられたQRシールを読み取りそうなスマホ」です。その理由は「日常のQRが危険に変わる瞬間を見せるため」です。 小さくする、または入れない対象は「既存キャラクター、実在人物、ブランドロゴ、実在UI、長文の説明」です。 対象シーンから画像化する一言は「そのQR、本物？」です。画像で再現する状況は「ポスター上のQRに薄い偽シールが重なっている」です。画像で再現しない要素は「会話全文、人物同士の会話、字幕用余白」です。 スマホ視聴でも伝わるように主役は1つ、画像内の小さい文字は最大3語、アイコンは最大5個、重要要素は画面中央から上部に置いてください。 どのシーンにも使える白背景アイコン、抽象的な青いネットワーク線、台本の具体例と関係が薄い綺麗な汎用図解は禁止です。 字幕やキャラクターに重なる位置へ重要情報を置かず、背景や小物は画面端まで自然に続けてください。 画面全体を有効活用し、情報が一目で伝わる、整理された高品質なビジュアルにしてください。 動画の解説画面に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。

          画像の雰囲気はスマホ、QRコード、宅配通知、警告マーク、公式確認を使った黒黄アクセントの防犯図解で生成してください。
