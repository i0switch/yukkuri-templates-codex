        imagegen_prompt: |-
          s04: URL短縮と変なドメイン

          ずんだもん「QRならURLを見なくていいでしょ。」
          めたん「そこを見ますの。」
          ずんだもん「え、黒い四角の正体はURLなのだ？」
          めたん「そう。短縮URLや変なドメインは警戒ですわ。」
          ずんだもん「公式っぽい名前でも油断するのだ。」
          めたん「1文字違い、余計な記号、長すぎる文字列を見る。」
          ずんだもん「読むの面倒だけど、開く前の1秒なのだ。」
          めたん「その1秒がログイン情報を守るのです。」
          ずんだもん「急いで開くほど相手の思うつぼなのだ。」
          めたん「URL確認はブレーキですわ。」
