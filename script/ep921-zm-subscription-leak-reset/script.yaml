          ずんだもん「でも三百円とか五百円なら、そんなに気にしなくてもいい気がするのだ。」
          めたん「一回だけならね。でもサブスクは毎月来る。しかも複数いる。」
          ずんだもん「三百円が五個で千五百円、十二か月で一万八千円なのだ。急に存在感が出たのだ。」
          めたん「そう。少額の怖さは、痛みが小さいから放置しやすいこと。」
          ずんだもん「財布が刺されたんじゃなく、じわじわ湿ってた感じなのだ。」
          めたん「例えは変だけど近いわ。気づきにくい漏れほど、定期的に見る必要がある。」
          ずんだもん「見ないと、契約した日のテンションだけが永遠に課金してるのだ。」
          めたん「無料体験や期間限定の勢いは、未来の自分に請求書を送ることもある。」
          ずんだもん「未来のぼく、ごめんなのだ。」
          めたん「謝る前に、まず一覧化しましょう。」

