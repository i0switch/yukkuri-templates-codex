    scene_goal: 無料体験の落とし穴を扱う
    viewer_question: 危機感
    visual_role: 無料体験のカレンダーが有料化日に変わり、通知ベルと請求アイコンが並ぶ分かりやすい概念図
    duration_sec: 30
    main:
      kind: image
      asset: assets/s03_main.png
      asset_requirements:
        imagegen_prompt: |-
          s03: 無料体験は終了日が本体

          ずんだもん「無料体験って、入る時は気軽なのだ。無料って書いてあるから。」
          めたん「でも本当に大事なのは開始日じゃなく終了日。そこを忘れると有料コースに入る。」
          ずんだもん「無料体験、入口はふわふわなのに出口が迷路なのだ。」
          めたん「だから入った瞬間に、終了日前のリマインドを作る。あとでやるは危険。」
          ずんだもん「あとで通知を入れよう、と思って忘れるやつなのだ。」
          めたん「その忘れを狙っているわけではなくても、人間は普通に忘れる。仕組みで守るの。」
          ずんだもん「無料体験は、試す権利と同時に終了日メモがセットなのだな。」
          めたん「そう。試して良かったら残す。微妙なら更新前に止める。」
          ずんだもん「無料だから入る、じゃなく、試す理由がある時だけ入るのだ。」
          めたん「その意識だけで、かなり漏れは減るわ。」

