scenes:
  - id: s01
    role: intro
    scene_goal: 容量不足の痛みと誤解を作る
    viewer_question: 空き容量ゼロで、犬の決定的瞬間を逃したのだ。
    visual_role: 容量ゼロ警告のスマホと撮れなかった犬の決定的瞬間の抽象ビジュアル
    motion_mode: punch
    duration_sec: 30
    main:
