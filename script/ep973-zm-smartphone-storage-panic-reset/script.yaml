      asset: assets/s01_main.png
    sub:
      kind: bullets
      items:
        - 容量ゼロで撮影失敗
        - 写真だけが犯人ではない
        - キャッシュも膨らむ
        - 今日消す順番を決める
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 容量不足が具体的な損失になることを冒頭で伝えるため
        image_role: 不安喚起
        composition_type: 事故寸前構図
        imagegen_prompt_ref: image_prompts.json#s01.main
        imagegen_prompt: |-
          s01: 空き容量ゼロは写真だけのせいじゃない

          ずんだもん「空き容量ゼロで、犬の決定的瞬間を逃したのだ。」
          めたん「それ、写真だけを消しても戻らないことがあるわ。」
          ずんだもん「え、写真が犯人じゃないのだ？」
          めたん「犯人は、動画、キャッシュ、重いアプリの合わせ技ね。」
          ずんだもん「スマホの中で荷物会議してるのだ。」
          めたん「しかも焦って消すと、大事なデータから失う。」
          ずんだもん「容量不足で判断力まで不足するのだ。」
          めたん「今日は、消す順番を決めてから動くわ。」
          ずんだもん「順番があるだけで、ちょっと人間に戻れるのだ。」
          めたん「目標は、写真を守りつつ数GB空けること。」
          ずんだもん「数GB、今の僕には宝の山なのだ。」

          ゆっくり解説・ずんだもん解説動画向けの挿入画像を日本語で生成してください。この画像は会話内容をそのまま再現するものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。字幕やセリフは別で表示するため、会話文は画像に入れないでください。キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、抽象的な画面風ビジュアル、概念図、状況説明ビジュアルを中心に構成してください。画像内の可読テキストは日本語だけにしてください。英語ラベル、英語見出し、英語UI、英単語の装飾文字は禁止です。文字が崩れる可能性がある場合は、文字を使わずアイコン、色分け、形、配置で表現してください。下部に白帯、入力欄、チャット欄、テキストボックス風の余白を作らないでください。画像の役割は「不安喚起」、構図タイプは「事故寸前構図」です。画面で一番大きく見せる対象は「容量ゼロ警告のスマホと撮れなかった犬の決定的瞬間の抽象ビジュアル」です。その理由は「容量不足が具体的な損失になることを冒頭で伝えるため」です。小さくする、または入れない対象は「既存キャラクター、実在人物、ブランドロゴ、実在UI、長文の説明」です。対象シーンから画像化する一言は「写真だけが犯人ではない」です。画像で再現する状況は「スマホ容量バーが赤くなり、写真、動画、キャッシュ、アプリ箱が詰まる」です。画像で再現しない要素は「会話全文、人物同士の会話、字幕用余白」です。スマホ視聴でも伝わるように主役は1つ、画像内の小さい文字は最大3語、アイコンは最大5個、重要要素は画面中央から上部に置いてください。どのシーンにも使える白背景アイコン、台本の具体例と関係が薄い汎用図解は禁止です。字幕やキャラクターに重なる位置へ重要情報を置かず、背景や小物は画面端まで自然に続けてください。動画の解説画面に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。Make the aspect ratio 16:9.

          画像の雰囲気はスマホ容量バー、写真、動画ファイル、キャッシュ、クラウド、チェックリストを使ったミントグリーンと白の整理図解。
          【トーン】ゆっくり/ずんだもん解説動画向け、明るく整理された実用解説。
          【禁止追記】ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし、細かい文字なし、英語UIなし。
