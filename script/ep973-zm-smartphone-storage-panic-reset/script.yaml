  layout_template: Scene10
  pair: ZM
  fps: 30
  width: 1280
  height: 720
  audience: スマホ容量不足で写真や動画を慌てて消しがちな生活者
  tone: 焦りから安全な整理順へ進む生活改善。ずんだもんの勢いをめたんが冷静に止める。
