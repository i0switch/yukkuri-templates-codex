meta:
  id: ep904-rm-scam-dm-stop
  title: 詐欺DM、開く前に止まれ
  layout_template: Scene02
  scene_template: Scene02
  pair: RM
  fps: 30
  width: 1280
  height: 720
  audience: SNSやスマホ利用で失敗を避けたい初心者
  tone: 短く刺すが、不安だけで終わらせず対処まで出す
  bgm_mood: 軽く緊張感のある解説用
  voice_engine: aquestalk
  target_duration_sec: 180
  image_style: 太線フラット図解。白背景、青緑基調、警告だけ赤、文字なし。
  typography:
    subtitle_family: gothic
    content_family: gothic
    title_family: gothic
characters:
  left:
    character: reimu
    aquestalk_preset: れいむ
    speaking_style: 視聴者代表。焦り、雑な理解、ツッコミを担当。
  right:
    character: marisa
    aquestalk_preset: まりさ
    speaking_style: 解説役。短く訂正し、自然に「だぜ」を混ぜる。
scenes:
  - id: s01
    role: intro
    scene_goal: 怪しいDMは開く前に止まる必要があると刺す
    viewer_question: 急ぎの通知は開いてよいのか
    visual_role: mainは警告つき通知、subは最初の停止ルール
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 怪しい通知で止まる
      asset_requirements:
        description: 不審なスマホ通知と警告マークを、開く前に止まる図解で示す
        imagegen_prompt: 【用途】s01 main枠。ゆっくり解説で「怪しい通知で止まる」を一瞬で理解させる素材。【主題】不審なスマホ通知と警告マークを、開く前に止まる図解で示す【構図】主役を中央大きめ、補助アイコンは左右上部に少量。下部字幕帯と左右キャラ位置は空ける。【テンプレート枠】Scene02 の main枠に収める。右sub枠、下字幕帯、左右キャラ領域に重要物を置かない。【色】白または淡い背景、主色は青緑、注意だけ赤、影は薄く、全シーンで色味を揃える。【情報量】1枚1メッセージ。画像内文字なし。細部を詰めず遠目でも読める。【絵柄】太線フラット図解。白背景、青緑基調、警告だけ赤、文字なし。 ゆっくり/ずんだもん解説向けの太線フラット図解。【禁止】実在人物、既存キャラクター、ブランドロゴ、実在UI模写、英語UI、細かい文字、密な表、写真風人物。
        style: ゆっくり解説向け、16:9、余白多め、文字なし
        aspect: 16:9
    sub:
      kind: bullets
      items:
        - 開かない
        - 押さない
        - 急がない
    visual_asset_plan:
      - slot: main
        purpose: 不審なスマホ通知と警告マークを、開く前に止まる図解で示す
        insert_timing: s01 の l01 直前から表示
        asset: assets/s01_main.png
        imagegen_prompt: 【用途】s01 main枠。ゆっくり解説で「怪しい通知で止まる」を一瞬で理解させる素材。【主題】不審なスマホ通知と警告マークを、開く前に止まる図解で示す【構図】主役を中央大きめ、補助アイコンは左右上部に少量。下部字幕帯と左右キャラ位置は空ける。【テンプレート枠】Scene02 の main枠に収める。右sub枠、下字幕帯、左右キャラ領域に重要物を置かない。【色】白または淡い背景、主色は青緑、注意だけ赤、影は薄く、全シーンで色味を揃える。【情報量】1枚1メッセージ。画像内文字なし。細部を詰めず遠目でも読める。【絵柄】太線フラット図解。白背景、青緑基調、警告だけ赤、文字なし。 ゆっくり/ずんだもん解説向けの太線フラット図解。【禁止】実在人物、既存キャラクター、ブランドロゴ、実在UI模写、英語UI、細かい文字、密な表、写真風人物。
        audit_points:
          - 1枚1メッセージ
          - Scene02のmain枠に収まる
          - ロゴや細かい文字がない
      - slot: sub
        purpose: 右サブ枠で要点を3項目に整理する
        insert_timing: s01 全体で表示
        audit_points:
          - 3項目以内
          - mainと役割が違う
          - 字幕を邪魔しない
