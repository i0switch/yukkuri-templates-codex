meta:
  id: "ep006-zundamon-sleep-brain"
  episode_id: "ep006-zundamon-sleep-brain"
  layout_template: "Scene17"
  character_pair: "ZM"
  pair: "ZM"
  title: "眠るだけで脳が片づく、睡眠の謎5選"
  fps: 30
  width: 1920
  height: 1080
  audience: "初心者向け"
  tone: "やさしい科学ミステリー"
  voice_engine: "voicevox"
  target_duration_sec: 300
characters:
  left:
    character: "zundamon"
    voicevox_speaker_id: 3
  right:
    character: "metan"
    voicevox_speaker_id: 2
scenes:
  - id: s01
    role: intro
    title_text: "眠るだけで脳が片づく？"
    main:
      kind: image
      asset: assets/s01_main.png
      caption: "睡眠の謎5選"
      asset_requirements:
        imagegen_prompt: |
          ダークSF風フラットイラスト。中央に眠る脳のアイコン、周囲に星と小さな掃除ロボ風アイコン。青紫とミント色、発光感。16:9。文字、数字、ロゴ、人物の顔は入れない。
        style: "フラット・SF・睡眠"
        aspect: "16:9"
        negative: "文字、数字、ロゴ、人物の顔、写真風"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "寝るだけで賢くなる？" }
      - { id: l02, speaker: right, text: "言い方が雑だけど近いわ" }
      - { id: l03, speaker: left, text: "なら今すぐ寝たいね" }
      - { id: l04, speaker: right, text: "動画中に寝ないで" }
      - { id: l05, speaker: left, text: "脳は夜に何してるのだ？" }
      - { id: l06, speaker: right, text: "記憶整理と掃除をしてるの" }
      - { id: l07, speaker: left, text: "脳内に掃除当番がいるね" }
      - { id: l08, speaker: right, text: "かなり働き者よ" }
      - { id: l09, speaker: left, text: "それ普通にすごいのだ" }
      - { id: l10, speaker: right, text: "今日は5つの謎を見るわ" }

  - id: s02
    role: body
    title_text: "記憶は寝て固まる"
    main:
      kind: image
      asset: assets/s02_main.png
      caption: "記憶の固定"
      asset_requirements:
        imagegen_prompt: |
          ダークSF風フラット図解。左に散らばる小さなカード、中央に眠る脳、右に整列したカード。青紫背景、カードは淡いミント。16:9。文字、数字、ロゴは禁止。
        style: "フラット・SF・記憶図解"
        aspect: "16:9"
        negative: "文字、数字、ロゴ、人物"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "勉強後に寝ると強いのだ？" }
      - { id: l02, speaker: right, text: "記憶が固定されやすいの" }
      - { id: l03, speaker: left, text: "寝てる間に復習してる？" }
      - { id: l04, speaker: right, text: "脳が再生して整理するわ" }
      - { id: l05, speaker: left, text: "徹夜は逆効果かな？" }
      - { id: l06, speaker: right, text: "覚えた情報が散らかるの" }
      - { id: l07, speaker: left, text: "ずんだ知識も寝て固めるのだ" }
      - { id: l08, speaker: right, text: "まず寝る価値は大きいわ" }
      - { id: l09, speaker: left, text: "暗記前の夜更かし危険だね" }
      - { id: l10, speaker: right, text: "謎1、記憶の固定よ" }

  - id: s03
    role: body
    title_text: "脳のゴミ掃除"
    main:
      kind: image
      asset: assets/s03_main.png
      caption: "グリンパティック系"
      asset_requirements:
        imagegen_prompt: |
          ダークSF風フラット図解。脳の中を青い流れが通り、小さな粒子を外へ運ぶ構図。医療っぽく清潔、青と紫の発光。16:9。文字、ロゴ、リアルな臓器表現は禁止。
        style: "フラット・医療SF図解"
        aspect: "16:9"
        negative: "文字、ロゴ、リアル臓器、グロテスク"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "脳にもゴミが出る？" }
      - { id: l02, speaker: right, text: "代謝の老廃物が出るのよ" }
      - { id: l03, speaker: left, text: "それを寝て流す感じ？" }
      - { id: l04, speaker: right, text: "睡眠中に流れが強まるわ" }
      - { id: l05, speaker: left, text: "脳の夜間清掃だね" }
      - { id: l06, speaker: right, text: "かなり近い表現ね" }
      - { id: l07, speaker: left, text: "徹夜は掃除キャンセル？" }
      - { id: l08, speaker: right, text: "少なくとも負担は増えるわ" }
      - { id: l09, speaker: left, text: "それヤバい、寝たい" }
      - { id: l10, speaker: right, text: "謎2、脳の掃除よ" }

  - id: s04
    role: body
    title_text: "夢は何のため？"
    main:
      kind: image
      asset: assets/s04_main.png
      caption: "夢のシミュレーション"
      asset_requirements:
        imagegen_prompt: |
          ダークSF風フラットイラスト。眠る脳から半透明の吹き出しが伸び、迷路、雨雲、星の抽象アイコンが浮かぶ。青紫と淡い黄色。16:9。文字なし。ロゴ、人物の顔、写真風は禁止。
        style: "フラット・夢・SF"
        aspect: "16:9"
        negative: "文字、ロゴ、人物の顔、写真風"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "変な夢って意味あるのだ？" }
      - { id: l02, speaker: right, text: "完全には解明されてないわ" }
      - { id: l03, speaker: left, text: "まだ謎なのワクワクする" }
      - { id: l04, speaker: right, text: "感情整理の説があるの" }
      - { id: l05, speaker: left, text: "怖い夢も役に立つ？" }
      - { id: l06, speaker: right, text: "危険の練習という説もあるわ" }
      - { id: l07, speaker: left, text: "脳内避難訓練なのだ" }
      - { id: l08, speaker: right, text: "雑だけど覚えやすいわね" }
      - { id: l09, speaker: left, text: "悪夢にも仕事があるのね" }
      - { id: l10, speaker: right, text: "謎3、夢の役割よ" }

  - id: s05
    role: body
    title_text: "短い昼寝の効き目"
    main:
      kind: image
      asset: assets/s05_main.png
      caption: "短時間昼寝"
      asset_requirements:
        imagegen_prompt: |
          ダークSF風フラット図解。小さな月、時計アイコン、充電される脳バッテリー。文字や数字は描かず、短時間を抽象的に示す。青紫背景、ミントの発光。16:9。
        style: "フラット・睡眠インフォグラフィック"
        aspect: "16:9"
        negative: "文字、数字、ロゴ、人物"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "昼寝はサボりじゃない？" }
      - { id: l02, speaker: right, text: "短ければ回復に効くわ" }
      - { id: l03, speaker: left, text: "長く寝るほど強い？" }
      - { id: l04, speaker: right, text: "長すぎると重くなるの" }
      - { id: l05, speaker: left, text: "起きた時だるいやつだね" }
      - { id: l06, speaker: right, text: "浅い睡眠で止めるのがコツ" }
      - { id: l07, speaker: left, text: "短い回復魔法だね" }
      - { id: l08, speaker: right, text: "午後の集中に効きやすいわ" }
      - { id: l09, speaker: left, text: "中盤で眠い人に刺さるのだ" }
      - { id: l10, speaker: right, text: "謎4、昼寝の効き目よ" }

  - id: s06
    role: body
    title_text: "寝不足は感情を荒らす"
    main:
      kind: image
      asset: assets/s06_main.png
      caption: "感情ブレーキ"
      asset_requirements:
        imagegen_prompt: |
          ダークSF風フラット図解。脳アイコンと感情メーター、ブレーキのアイコン。メーターは抽象バーで文字なし。赤は控えめ。青紫背景、発光線。16:9。
        style: "フラット・脳科学図解"
        aspect: "16:9"
        negative: "文字、数字、ロゴ、人物の顔"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "寝不足だと怒りっぽい" }
      - { id: l02, speaker: right, text: "感情のブレーキが弱るわ" }
      - { id: l03, speaker: left, text: "私のせいじゃない？" }
      - { id: l04, speaker: right, text: "全部睡眠のせいではないわ" }
      - { id: l05, speaker: left, text: "逃げ道を塞がれたね" }
      - { id: l06, speaker: right, text: "でも影響はかなり大きいの" }
      - { id: l07, speaker: left, text: "人間関係にも効くのだ" }
      - { id: l08, speaker: right, text: "寝るのは礼儀でもあるわ" }
      - { id: l09, speaker: left, text: "それ普通に名言じゃん" }
      - { id: l10, speaker: right, text: "謎5、感情の安定よ" }

  - id: s07
    role: body
    title_text: "夜スマホが眠りを壊す"
    main:
      kind: image
      asset: assets/s07_main.png
      caption: "光と覚醒"
      asset_requirements:
        imagegen_prompt: |
          ダークSF風フラット図解。ベッド横のスマホから青い光、脳の覚醒スイッチが点く構図。文字なし、人物の顔なし。青紫とシアン。16:9。ロゴ、実在端末デザインは禁止。
        style: "フラット・夜スマホ図解"
        aspect: "16:9"
        negative: "文字、ロゴ、実在端末、人物の顔"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "寝る前スマホは敵かな？" }
      - { id: l02, speaker: right, text: "光と情報で脳が起きるわ" }
      - { id: l03, speaker: left, text: "動画あと一本が止まらないのだ" }
      - { id: l04, speaker: right, text: "それも覚醒の罠ね" }
      - { id: l05, speaker: left, text: "遠くに置けば勝てる？" }
      - { id: l06, speaker: right, text: "物理距離はかなり効くわ" }
      - { id: l07, speaker: left, text: "意思より配置だね" }
      - { id: l08, speaker: right, text: "環境で眠りを守るの" }
      - { id: l09, speaker: left, text: "自分を信用しない作戦だね" }
      - { id: l10, speaker: right, text: "仕組みに任せるのが現実的よ" }

  - id: s08
    role: body
    title_text: "睡眠負債は貯まる"
    main:
      kind: image
      asset: assets/s08_main.png
      caption: "睡眠負債"
      asset_requirements:
        imagegen_prompt: |
          ダークSF風フラット図解。積み上がる月形コインと、低下する脳バッテリー。文字、数字なし。青紫、ミント、薄い黄色。16:9。通貨記号、ロゴは禁止。
        style: "フラット・睡眠負債図解"
        aspect: "16:9"
        negative: "文字、数字、通貨記号、ロゴ"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "休日寝ればOKなのだ？" }
      - { id: l02, speaker: right, text: "多少戻るけど万能じゃないわ" }
      - { id: l03, speaker: left, text: "睡眠は借金かな？" }
      - { id: l04, speaker: right, text: "負債として貯まりやすいの" }
      - { id: l05, speaker: left, text: "寝だめ銀行はない？" }
      - { id: l06, speaker: right, text: "未来分の貯金は難しいわ" }
      - { id: l07, speaker: left, text: "毎日返すのが大事なのだ" }
      - { id: l08, speaker: right, text: "少しずつ整えるのが現実的よ" }
      - { id: l09, speaker: left, text: "借金取りが脳に来るね" }
      - { id: l10, speaker: right, text: "怖い例えだけど近いわ" }

  - id: s09
    role: body
    title_text: "今夜の最小ルール"
    main:
      kind: image
      asset: assets/s09_main.png
      caption: "眠りの準備"
      asset_requirements:
        imagegen_prompt: |
          ダークSF風フラットチェックリスト。3つのアイコンを横並び、スマホを遠ざける、照明を落とす、起床時刻を固定。文字なし。青紫背景、ミントの線。16:9。ロゴ、実在UI、人物は禁止。
        style: "フラット・睡眠チェックリスト"
        aspect: "16:9"
        negative: "文字、ロゴ、実在UI、人物"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "結局何からやる？" }
      - { id: l02, speaker: right, text: "今夜は3つだけでいいわ" }
      - { id: l03, speaker: left, text: "スマホを布団から離す" }
      - { id: l04, speaker: right, text: "照明を少し落とす" }
      - { id: l05, speaker: left, text: "起きる時刻を決める" }
      - { id: l06, speaker: right, text: "それで入口は作れるわ" }
      - { id: l07, speaker: left, text: "完璧主義はいらないのだ" }
      - { id: l08, speaker: right, text: "小さく続けるのが強いの" }
      - { id: l09, speaker: left, text: "やること少なくて助かるのだ" }
      - { id: l10, speaker: right, text: "少ないほど今夜できるわ" }

  - id: s10
    role: cta
    title_text: "見るだけで終わらせない"
    main:
      kind: image
      asset: assets/s10_main.png
      caption: "2アクション"
      asset_requirements:
        imagegen_prompt: |
          ダークSF風フラットイラスト。月、ペン、カレンダー、チェックマークをシンプルに配置。今夜の行動を促す明るい構図。文字なし。青紫とミント、16:9。ロゴ、人物は禁止。
        style: "フラット・CTA・睡眠"
        aspect: "16:9"
        negative: "文字、ロゴ、人物、実在UI"
    sub: null
    dialogue:
      - { id: l01, speaker: left, text: "見るだけで終わり？" }
      - { id: l02, speaker: right, text: "終わらせないわよ" }
      - { id: l03, speaker: left, text: "今夜スマホ置き場を変える" }
      - { id: l04, speaker: right, text: "そして起床時刻を書く" }
      - { id: l05, speaker: left, text: "2つならできそうだね" }
      - { id: l06, speaker: right, text: "できたらコメントで宣言ね" }
      - { id: l07, speaker: left, text: "睡眠で脳を片づけるのだ" }
      - { id: l08, speaker: right, text: "今夜から試してみてね" }
      - { id: l09, speaker: left, text: "置き場と時刻を保存なのだ" }
      - { id: l10, speaker: right, text: "その2つで始めましょう" }
bgm:
  file: bgm/track.mp3
  license: 既存ローカルBGMを再利用。公開前に原典と利用条件を再確認
  volume: 0.08
  fade_in_sec: 1
  fade_out_sec: 1.5
