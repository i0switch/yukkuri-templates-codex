          話者B「名前は飾りだぜ。安さと品質保証はまったく別の話だ」
          話者A「熱かったのに気づかないまま寝てたら……それは詰むじゃん」
          話者B「就寝中の発火は気づけない。だから特に危ないんだぜ」

