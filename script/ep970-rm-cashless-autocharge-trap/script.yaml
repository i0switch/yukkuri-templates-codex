        composition_type: 事故寸前構図
        imagegen_prompt_ref: image_prompts.json#s01.main
        imagegen_prompt: |-
          s01: 8,000円が静かに消える

          霊夢「オートチャージで、今月の残高が8,000円消えてたわ。」
          魔理沙「毎月、ついタッチする人ほど見落とすやつだぜ。」
          霊夢「今日はその小さい支払いを一回見える化するのね。」
          魔理沙「そうだ。犯人は大きな買い物だけじゃない。」
          霊夢「コンビニのコーヒーが忍者だったってこと？」
          魔理沙「忍者より静かに残高を削るんだぜ。」
          霊夢「マジで！？節約してるつもりだったのに。」
          魔理沙「だから最初に決済の通り道を見る。」
          霊夢「家計簿より先に通り道ね。」
          魔理沙「見る場所は3つだけでいい。」
          霊夢「それなら今夜できそう。」
          魔理沙「放置しない入口を作るんだぜ。」

