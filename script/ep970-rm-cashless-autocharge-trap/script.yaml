          霊夢「決済手段を分ければ管理できるじゃない。」
          魔理沙「分けるだけでは見えない。」
          霊夢「つまり財布が3つに分身してるの？」
          魔理沙「交通系、QR、クレカが同じ食費を削る。」
          霊夢「コンビニ支出が三方向から攻めてくるわ。」
          魔理沙「週5回なら月20回近い。」
          霊夢「1回が軽いと全部別物に見えるのね。」
          魔理沙「用途でまとめる。昼食、飲み物、移動だ。」
          霊夢「支払い方法じゃなく使い道で見る。」
          魔理沙「そこが家計の地図になる。」
