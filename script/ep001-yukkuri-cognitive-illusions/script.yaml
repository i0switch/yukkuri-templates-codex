meta:
  id: ep001-yukkuri-cognitive-illusions
  episode_id: ep001-yukkuri-cognitive-illusions
  layout_template: Scene04
  character_pair: RM
  pair: RM
  title: 冷静と思った時点で詰んでる、認知バグ7選
  fps: 30
  width: 1920
  height: 1080
  audience: 初心者向け
  tone: 軽快で実用的
  voice_engine: aquestalk
  target_duration_sec: 300
bgm:
  title: upbeat step
  source_url: https://dova-s.jp/en/bgm/detail/16211
  file: bgm/track.mp3
  license: DOVA-SYNDROME 標準利用規約
  volume: 0.09
  fade_in_sec: 1.0
  fade_out_sec: 1.5
characters:
  left:
    character: reimu
    aquestalk_preset: "AquesTalk10 F1"
  right:
    character: marisa
    aquestalk_preset: "AquesTalk10 F2"
scenes:
  - id: s01
    title_text: 冷静と思った時点で詰んでる
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 脳のバグ
      asset_requirements:
        imagegen_prompt: |
          フラットデザインのイラスト、白背景。
          中央に正面向きの脳のシルエット、青緑系のパステルカラー。
          脳の周囲に小さなエラー記号（!マーク、×マーク）が3〜4個、控えめに配置。
          柔らかいタッチ、シンプル。16:9 アスペクト比。
          テキスト・文字・人物の顔・ロゴ・実在ブランドは入れない。
        style: フラット・アイコン系
        aspect: 16:9
        negative: 写真風、リアル調、文字、ロゴ、人物の顔、実在ブランド
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 今日の話、私には関係ないやつだぜ
      - id: l02
        speaker: right
        text: もう1個目のバグ発動だぜ
      - id: l03
        speaker: left
        text: え？まだ何も話してないのに？
      - id: l04
        speaker: right
        text: 自分は冷静、と思った瞬間が罠だ
      - id: l05
        speaker: left
        text: マジで？それで何が始まるの？
      - id: l06
        speaker: right
        text: 人間の判断、7割は錯覚で動いてる
      - id: l07
        speaker: left
        text: うわ、それヤバいじゃん
      - id: l08
        speaker: right
        text: 今日は脳のバグを7つ並べる
      - id: l09
        speaker: left
        text: 私だけ無傷で勝ち抜けるやつ？
      - id: l10
        speaker: right
        text: たぶん全部踏むから覚悟しとけ
  - id: s02
    title_text: 信じたい情報だけ拾う罠
    main:
      kind: image
      asset: assets/s02_main.png
      caption: 確証バイアス
      asset_requirements:
        imagegen_prompt: |
          フラットデザイン、白背景。
          中央に正面向きの抽象的な人物（顔は省略、頭部シルエットのみ）。
          頭の周りに同じ色の矢印が4〜5本集まる構図。色は青緑系、矢印は同色で統一。
          シンプル、視線が頭部に集まるレイアウト。16:9 アスペクト比。
          テキスト・文字・ロゴ・実在ブランドは禁止。
        style: フラット・アイコン系
        aspect: 16:9
        negative: 写真風、文字、ロゴ、表情、実在ブランド
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 私は逆の意見もちゃんと見てるぜ
      - id: l02
        speaker: right
        text: 見てるけど信じてないだけだろ
      - id: l03
        speaker: left
        text: それは別問題じゃない？
      - id: l04
        speaker: right
        text: それを確証バイアスと呼ぶ
      - id: l05
        speaker: left
        text: 自分が好きな意見だけ拾うやつか
      - id: l06
        speaker: right
        text: SNSのタイムライン見てみろ
      - id: l07
        speaker: left
        text: あ、確かに同じ系統ばっかだ
      - id: l08
        speaker: right
        text: 脳が同色だけ集めて満足してる
      - id: l09
        speaker: left
        text: 自分の鏡を見てたってこと？
      - id: l10
        speaker: right
        text: 1個目、確証バイアスだ
  - id: s03
    title_text: イケメンは仕事もできる、はホント？
    main:
      kind: image
      asset: assets/s03_main.png
      caption: ハロー効果
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          中央に抽象人物（顔は省略、シルエットのみ）。
          頭上に薄い黄色の光輪、足元に★マークが3つ並ぶ。
          色はパステル系、青緑とイエロー。シンプル、余白多め。
          16:9 アスペクト比。
          文字・ロゴ・実在人物・表情は禁止。
        style: フラット・アイコン系
        aspect: 16:9
        negative: 写真風、文字、ロゴ、表情、実在人物
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 美人は性格も良い、これ私の持論だぜ
      - id: l02
        speaker: right
        text: それ全力でハロー効果だ
      - id: l03
        speaker: left
        text: え、性格までは別人格でしょ？
      - id: l04
        speaker: right
        text: 見た目の好印象が能力評価に滲む
      - id: l05
        speaker: left
        text: マジで？採用面接でも？
      - id: l06
        speaker: right
        text: 印象点がそのまま能力点に流れる
      - id: l07
        speaker: left
        text: うわ、私それやってるかも
      - id: l08
        speaker: right
        text: 光ってる人は中身も光って見える
      - id: l09
        speaker: left
        text: 眩しい人にだまされてた説
      - id: l10
        speaker: right
        text: 2個目、ハロー効果だ
  - id: s04
    title_text: 最初に見た数字に脳が引っ張られる
    main:
      kind: image
      asset: assets/s04_main.png
      caption: アンカリング効果
      asset_requirements:
        imagegen_prompt: |
          フラットアイコン、白背景。
          中央に大きな値札イラスト。上に「定価」位置（数値はぼかすか抽象記号 ●●●● で）、下に「割引後」位置（同様に抽象記号）。
          矢印で「上→下」を示す。
          色は青緑とオレンジの2色。シンプル、余白多め。
          16:9 アスペクト比。
          実在通貨記号・具体的な数字・読める文字は描かない、抽象記号のみ。ロゴ・実在ブランド禁止。
        style: フラット・アイコン系
        aspect: 16:9
        negative: 実在通貨、具体数字、読める文字、ロゴ、ブランド
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 私はセールでも冷静派だぜ
      - id: l02
        speaker: right
        text: 定価が無いセール、不安にならないか
      - id: l03
        speaker: left
        text: …正直ちょっと不安になる
      - id: l04
        speaker: right
        text: それがアンカリング効果だ
      - id: l05
        speaker: left
        text: 最初の数字に脳が引っ張られるやつ？
      - id: l06
        speaker: right
        text: 上の値札が錨になって判断を曲げる
      - id: l07
        speaker: left
        text: 定価が脳に住み着くイメージか
      - id: l08
        speaker: right
        text: 割引札が無いと安くても安く感じない
      - id: l09
        speaker: left
        text: 店、よく分かってるじゃん
      - id: l10
        speaker: right
        text: 3個目、アンカリング効果だ
  - id: s05
    title_text: 半分来たけどここまでで4個
    main:
      kind: image
      asset: assets/s05_main.png
      caption: ここまで4/7
      asset_requirements:
        imagegen_prompt: |
          フラットインフォグラフィック、白背景。
          横長の7マスメーター（横並びの長方形7個）。
          左から4マス目までを青緑で点灯（塗りつぶし）、5〜7マスは薄いグレー。
          シンプル、余白多め、視線が左から右へ流れる構図。
          16:9 アスペクト比。
          数字・文字・ロゴは入れない。
        style: フラット・インフォグラフィック
        aspect: 16:9
        negative: 数字、文字、ロゴ、実在UI
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: ここまでで4個、私もう疲れた
      - id: l02
        speaker: right
        text: 体力じゃなくて自覚で疲れてる
      - id: l03
        speaker: left
        text: 全部ハマってる気がするから怖い
      - id: l04
        speaker: right
        text: お前の脳はちゃんと普通の脳だ
      - id: l05
        speaker: left
        text: それ慰めになってないぜ
      - id: l06
        speaker: right
        text: ここから3つ、もっと身近なやつ来る
      - id: l07
        speaker: left
        text: もう怖いから先に対策教えて
      - id: l08
        speaker: right
        text: 対策はラストに3行でまとめる
  - id: s06
    title_text: 旅行が楽しかったかは最後の30分で決まる
    main:
      kind: image
      asset: assets/s06_main.png
      caption: ピーク・エンドの法則
      asset_requirements:
        imagegen_prompt: |
          フラット折れ線グラフ、白背景。
          横軸は時間（左→右の流れ）、縦軸は楽しさのイメージ。
          山と谷のある曲線が中央に大きく描かれ、最高点（山頂）と最右端（終点）に★マーク。
          色は青緑と濃いオレンジの2色。シンプル、余白多め。
          16:9 アスペクト比。
          数値ラベル・文字・軸名は入れない。
        style: フラット・インフォグラフィック
        aspect: 16:9
        negative: 数字、文字、ラベル、ロゴ
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 旅行の思い出って平均で覚えてるよね
      - id: l02
        speaker: right
        text: それが思い込みだ
      - id: l03
        speaker: left
        text: え、私の旅行記憶は平均派だぜ
      - id: l04
        speaker: right
        text: 最後にケンカした旅行、どう覚えてる
      - id: l05
        speaker: left
        text: …うわ、丸ごとクソ判定してる
      - id: l06
        speaker: right
        text: それがピーク・エンドの法則だ
      - id: l07
        speaker: left
        text: ピークと最後だけで全部上書き？
      - id: l08
        speaker: right
        text: 脳は省エネで2点だけ覚える
      - id: l09
        speaker: left
        text: 途中の楽しさ全部捨てるってこと？
      - id: l10
        speaker: right
        text: 4個目、ピーク・エンドだ
  - id: s07
    title_text: 視界の半分は見てない
    main:
      kind: image
      asset: assets/s07_main.png
      caption: 変化盲
      asset_requirements:
        imagegen_prompt: |
          フラット2コマ並列イラスト、白背景。
          左と右にほぼ同じ室内風景（机、椅子、窓、シンプルな家具）を描く。
          1箇所だけ色か位置が違う（例：左の壁飾りが右では消えている）。違いの位置に小さな赤い○。
          色はパステル、シンプル、余白多め。
          16:9 アスペクト比。
          文字・人物・ロゴ・実在ブランド・複雑な装飾は禁止。
        style: フラット・アイコン系
        aspect: 16:9
        negative: 文字、人物、ロゴ、実在ブランド、複雑装飾
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 私、視界はバッチリ広い派
      - id: l02
        speaker: right
        text: 人混みで友達消えるやつ覚えてるか
      - id: l03
        speaker: left
        text: あれは友達が悪いんだぜ
      - id: l04
        speaker: right
        text: それを変化盲という
      - id: l05
        speaker: left
        text: 見えてたはずなのに気づかないやつ？
      - id: l06
        speaker: right
        text: 注意の外は脳が描き足してる
      - id: l07
        speaker: left
        text: マジで？描き足し作業してるの？
      - id: l08
        speaker: right
        text: 省エネのために省略してる
      - id: l09
        speaker: left
        text: 視界の半分は脳の創作ってこと？
      - id: l10
        speaker: right
        text: 5個目、変化盲だ
  - id: s08
    title_text: あれ私、最初から知ってたって？
    main:
      kind: image
      asset: assets/s08_main.png
      caption: 後知恵バイアス
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          左に「結果」を象徴するチェックマークの大きなアイコン、右に空の吹き出し（中身は記号のみ、文字なし、●や★で抽象表現）。
          矢印で右から左に逆流する流れを示す（時間が遡るイメージ）。
          色は青緑と薄いグレーの2色。シンプル、余白多め。
          16:9 アスペクト比。
          文字・実在人物・ロゴは禁止。
        style: フラット・アイコン系
        aspect: 16:9
        negative: 文字、人物、ロゴ、ブランド
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 試合の結果見てから知ってたって言うやつ
      - id: l02
        speaker: right
        text: それ自分もやってるぞ
      - id: l03
        speaker: left
        text: え、私はちゃんと予測する派だぜ
      - id: l04
        speaker: right
        text: 覚えてる予測、結果と一致してないか
      - id: l05
        speaker: left
        text: …うわ、思い出が結果に寄ってる
      - id: l06
        speaker: right
        text: それが後知恵バイアスだ
      - id: l07
        speaker: left
        text: 脳が結果に合わせて記憶を編集？
      - id: l08
        speaker: right
        text: 未来予測の自信が膨らむ副作用
      - id: l09
        speaker: left
        text: 私の自信、もう信じられないぜ
      - id: l10
        speaker: right
        text: 6個目、後知恵バイアスだ
  - id: s09
    title_text: プライミング、行動が引っ張られる
    main:
      kind: image
      asset: assets/s09_main.png
      caption: プライミング効果
      asset_requirements:
        imagegen_prompt: |
          フラットイラスト、白背景。
          3コマ横並び構成。
          左コマ：ラーメン丼のシンプルなアイコン、湯気あり。
          中央コマ：脳のシルエット、青緑系。
          右コマ：シンプルな食卓アイコン（皿とフォーク程度）。
          各コマ間に右向き矢印で連結。色は青緑とオレンジ。
          シンプル、余白多め。16:9 アスペクト比。
          文字・実在ブランド・ロゴは禁止。
        style: フラット・アイコン系
        aspect: 16:9
        negative: 文字、ブランドロゴ、人物、実在ロゴ
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 私の選択は完全に自分で決めてる
      - id: l02
        speaker: right
        text: 昨夜の夕飯、何だった
      - id: l03
        speaker: left
        text: ラーメン…昼に動画見たやつだぜ
      - id: l04
        speaker: right
        text: それがプライミング効果だ
      - id: l05
        speaker: left
        text: 直前に見たもので行動引っ張られる？
      - id: l06
        speaker: right
        text: 脳は連想で次の行動を準備する
      - id: l07
        speaker: left
        text: 自由意志、半分くらい怪しくない？
      - id: l08
        speaker: right
        text: 完全自由ではないが対策はできる
      - id: l09
        speaker: left
        text: 見るものを選ぶってこと？
      - id: l10
        speaker: right
        text: 7個目、プライミング効果だ
  - id: s10
    title_text: 今日やる、3行のバグ対策
    main:
      kind: image
      asset: assets/s10_main.png
      caption: 今日の3行
      asset_requirements:
        imagegen_prompt: |
          フラットチェックリスト、白背景。
          縦に3つのチェックボックスが並ぶ、各横に細い横線（中身は描かない、文字なし）。
          各ボックスはシンプルな四角、未チェック状態。
          色は青緑のアクセントのみ、余白多め。
          16:9 アスペクト比。
          文字・ロゴ・実在UIの模写は禁止。
        style: フラット・アイコン系
        aspect: 16:9
        negative: 文字、UI模写、ロゴ、実在ブランド
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 7つ全部直すの無理だぜ
      - id: l02
        speaker: right
        text: 直さなくていい、1つだけ確認しろ
      - id: l03
        speaker: left
        text: 1個目、今日の判断1つを書き出す
      - id: l04
        speaker: right
        text: 書き出した判断を逆から検証する
      - id: l05
        speaker: left
        text: 信じたい派と疑う派、両方の根拠
      - id: l06
        speaker: right
        text: 2個目、決定を1日寝かせる
      - id: l07
        speaker: left
        text: 寝かせ判断、明日の自分に渡すやつ
      - id: l08
        speaker: right
        text: 3個目、結果を後で書く
      - id: l09
        speaker: left
        text: 最初から知ってたを防ぐ記録だな
      - id: l10
        speaker: right
        text: 書く、寝かす、検証する。今日3行だ
