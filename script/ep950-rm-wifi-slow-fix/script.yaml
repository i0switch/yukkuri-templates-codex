    role: body
    scene_goal: 中盤再フック。ルーター改善の期待を適切に調整し、「倍速感」は現実的という結論を出す
    viewer_question: 全部直したら爆速になるの？
    visual_role: 高速道路と合流地点の比較で「回線は道路・ルーターは合流地点」を示す概念図
    duration_sec: 25
    main:
      kind: image
      asset: assets/s06_main.png
      asset_requirements:
        imagegen_prompt: |-
          s06: 全部直したら光回線より速くなる？

          話者A「ねえ魔理沙、今まで聞いた全部を直したら、うちのWi-Fiが光の速さになるんじゃない？」
          話者B「光の速さは回線の速度だぜ。ルーターは回線を生み出せないぜ」
          話者A「え、違うの？良い場所に置いて、チャンネル変えて、冷やして……爆速になりそうじゃない」
          話者B「今より確実に改善するぜ。でも料理で例えると、良い調理環境を整えても食材の質を超えられないだろ」
