          話者B「720pの動画をなんとか見られるギリギリのラインだぜ。快適とは程遠いな」
          話者A「光回線を毎月お金払って使ってるのに！どういうことよ」
          話者B「怒りはわかるぜ。でも原因のほとんどはルーター側の問題だぜ」
          話者A「電話会社じゃなくてルーターの問題？」
          話者B「回線が速くてもルーターやその周辺がボトルネックになると速度が出なくなるんだぜ」
