  - id: s03
    title_text: 電波を遮る意外な障害物
    role: body
    scene_goal: コンクリート・電子レンジ・冷蔵庫が電波を妨害することを示す
    viewer_question: 壁があってもWi-Fiは届くんじゃないの
    visual_role: コンクリート壁と電子レンジの近くに置かれたルーターから電波が弱くなるイメージ
    duration_sec: 25
    main:
      kind: image
      asset: assets/s03_main.png
      asset_requirements:
        imagegen_prompt: |-
          s03: 電波を遮る意外な障害物

          話者A「うち鉄筋マンションなんだけど、それって関係ある？」
          話者B「大ありだぜ。コンクリートはWi-Fi電波を大幅に減衰させる最強の障害物だぜ」
          話者A「壁も？普通の壁でも弱くなるの？」
          話者B「素材によるぜ。木造の壁なら影響は少ないが、コンクリートや鉄筋入りだとガクッと落ちる」
          話者A「じゃあ隣の部屋がもう圏外みたいなもの？」
          話者B「部屋数が多いと遠い部屋はかなり弱くなるぜ。でも壁だけが問題じゃないんだぜ」
          話者A「他にも障害物があるの？」
          話者B「電子レンジと冷蔵庫は電波と干渉しやすいぜ。特に電子レンジは動作中に2.4GHz帯の電波を出す」
          話者A「え、電子レンジが電波を出してるの！？うちのキッチン最悪じゃない」
          話者B「ルーターを電子レンジの近くに置くのは避けたほうがいいぜ」
          話者A「私のルーター……キッチンの棚の中に置いてたわ。電子レンジの隣に」
          話者B「場所も最悪、密閉も最悪、電子レンジも隣。三重苦だったな」
          話者A「なんで今まで気づかなかったのよ……次の原因は何なの？」
          話者B「もっと意外な話だぜ。隣の家が関係してくる話だぜ」

