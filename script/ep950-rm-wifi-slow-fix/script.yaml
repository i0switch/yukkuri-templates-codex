          話者B「その通りだぜ。今日はその原因と今日から直せる対処を3つ教えるぜ」
          話者A「回線じゃなくてルーターの問題なら自分で直せるかもってこと？」
          話者B「まずは一番よくある誤解から崩すぜ」

