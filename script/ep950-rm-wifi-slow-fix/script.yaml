          話者A「え、棚の中ってダメなの？スッキリするしインテリアに馴染むじゃない」
          話者B「ルーターは見た目じゃなくて電波の通り道を最優先で置くものだぜ」
          話者A「どこに置けばいいの？」
          話者B「使う場所の中間地点で、床より高い位置、壁から少し離した場所が基本だぜ」
          話者A「中間地点って……リビングのど真ん中に鎮座させるの？」
          話者B「そこまで厳密じゃなくていい。棚の上や壁掛けにするだけで別物になるぜ」
          話者A「それくらいなら許容範囲ね。でも棚の中のほうがコードが見えなくてよかったのに」
          話者B「ルーターは熱を持つから密閉された空間は二重にダメだぜ。電波と熱が両方篭もる」
          話者A「熱まで！？うちのルーター今頃サウナ状態じゃない」
          話者B「可能性は高いぜ。棚から出すだけで体感速度が変わることがあるんだぜ」
          話者A「今夜やってみる。でも他にも原因があるんでしょ？」
          話者B「次は電波が届かない死角の話だぜ」

