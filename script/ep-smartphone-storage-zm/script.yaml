meta:
  id: ep-smartphone-storage-zm
  title: 消す前に逃がせ スマホ容量整理
  layout_template: Scene02
  pair: ZM
  fps: 30
  width: 1920
  height: 1080
  audience: スマホ容量整理で焦りがちな初心者
  tone: テンポよく危機感と行動を通す
  voice_engine: voicevox
  target_duration_sec: 300
characters:
  left:
    character: zundamon
    voicevox_speaker_id: 3
    speaking_style: 視聴者代表。素朴な誤解、驚き、ボケを担当。
  right:
    character: metan
    voicevox_speaker_id: 2
    speaking_style: 解説役。冷静に整理し、現実的な対処へ落とす。
scenes:
  - id: s01
    role: intro
    title_text: 消す前に逃がせ
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 消す前に逃がす全体像
    sub:
      kind: bullets
      items: [消す前に確認, 容量一覧を見る, 逃がし先を決める]
    dialogue:
      - {id: l01, speaker: left, text: スマホが赤いのだ！, expression: halfOpen}
      - {id: l02, speaker: right, text: 容量警告ですわね, expression: calm}
      - {id: l03, speaker: left, text: 写真を消せば勝ち？, expression: smile}
      - {id: l04, speaker: right, text: その前に逃がすのよ, expression: calm}
      - {id: l05, speaker: left, text: 写真が避難するのだ？, expression: halfOpen}
      - {id: l06, speaker: right, text: バックアップのことですわ, expression: smile}
    duration_sec: 60
  - id: s02
    role: body
    title_text: 動画が容量を食う
    main:
      kind: image
      asset: assets/s03_main.png
      caption: 写真と動画の重さ比較
    sub:
      kind: bullets
      items: [動画を優先, 重い順で見る, 数字で判断]
    dialogue:
      - {id: l01, speaker: left, text: 写真が犯人じゃないのだ？, expression: halfOpen}
      - {id: l02, speaker: right, text: 動画が大物ですわ, expression: calm}
      - {id: l03, speaker: left, text: 1本くらい平気じゃん, expression: smile}
      - {id: l04, speaker: right, text: 1分で数百MBもあるの, expression: calm}
      - {id: l05, speaker: left, text: それヤバいのだ, expression: halfOpen}
      - {id: l06, speaker: right, text: 容量一覧が近道ですわ, expression: smile}
    duration_sec: 60
  - id: s03
    role: body
    title_text: 同期中は未完了
    main:
      kind: image
      asset: assets/s05_main.png
      caption: 同期中と保存完了の違い
    sub:
      kind: bullets
      items: [完了表示を見る, 別端末で開く, 大事な物は二重]
    dialogue:
      - {id: l01, speaker: left, text: クラウドなら平気なのだ, expression: smile}
      - {id: l02, speaker: right, text: 半分だけ正解ですわ, expression: calm}
      - {id: l03, speaker: left, text: 半分って嫌なのだ, expression: halfOpen}
      - {id: l04, speaker: right, text: 同期中なら未完了よ, expression: calm}
      - {id: l05, speaker: left, text: 注文中の弁当なのだ, expression: smile}
      - {id: l06, speaker: right, text: 届く前は食べられないわ, expression: smile}
    duration_sec: 60
  - id: s04
    role: body
    title_text: 一時保存も見る
    main:
      kind: image
      asset: assets/s07_main.png
      caption: 一時保存の掃除ポイント
    sub:
      kind: bullets
      items: [キャッシュ確認, 添付を確認, ログイン注意]
    dialogue:
      - {id: l01, speaker: left, text: 写真以外も減らせる？, expression: halfOpen}
      - {id: l02, speaker: right, text: 一時保存ですわ, expression: calm}
      - {id: l03, speaker: left, text: 一時なのに残るのだ？, expression: smile}
      - {id: l04, speaker: right, text: 机の紙みたいなもの, expression: calm}
      - {id: l05, speaker: left, text: ボクの机と同じなのだ, expression: smile}
      - {id: l06, speaker: right, text: それは片付けましょう, expression: smile}
    duration_sec: 60
  - id: s05
    role: cta
    title_text: 今日やる三手順
    main:
      kind: image
      asset: assets/s10_main.png
      caption: 容量整理の三手順
    sub:
      kind: bullets
      items: [容量一覧, 最大動画, 月1予定]
    dialogue:
      - {id: l01, speaker: left, text: 削除ボタン怖いのだ, expression: halfOpen}
      - {id: l02, speaker: right, text: 怖がるだけでは進まないわ, expression: calm}
      - {id: l03, speaker: left, text: 今日やることは？, expression: smile}
      - {id: l04, speaker: right, text: 容量一覧を開きますわ, expression: calm}
      - {id: l05, speaker: left, text: 重い動画を逃がすのだ, expression: smile}
      - {id: l06, speaker: right, text: 月1予定も入れると安心ね, expression: smile}
    duration_sec: 60
total_duration_sec: 300
