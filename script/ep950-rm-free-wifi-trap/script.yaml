          霊夢「うわ、言い方が刺さる」
          魔理沙「無料Wi-Fi経由でどこかのログイン情報を取られた時、使い回しだと他も試される」
          霊夢「メール、通販、SNSが同じパスワードだったら？」
          魔理沙「一枚倒れると全部倒れる。特にメールを取られると、再設定メールまで狙われる」
