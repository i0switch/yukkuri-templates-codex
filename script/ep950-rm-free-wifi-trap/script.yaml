          魔理沙「その例えは変だが、踏む前に確認する感覚は合ってる」
          霊夢「今日は無料Wi-Fiの見分け方ってこと？」
          魔理沙「見分け方だけじゃない。危ない使い方をやめて、安全な逃がし方まで作るぜ」

