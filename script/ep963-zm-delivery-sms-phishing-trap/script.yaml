meta:
  id: ep963-zm-delivery-sms-phishing-trap
  title: 宅配不在通知SMSで個人情報を抜かれる罠と安全に確認する3ステップ
  layout_template: Scene14
  pair: ZM
  fps: 30
  width: 1920
  height: 1080
  audience: 宅配SMSや不在通知リンクをつい開きそうになるスマホ利用者
  tone: 不安を煽りすぎず、ずんだもんの焦りをめたんが冷静に止める安全確認系の実用解説。
  bgm_mood: 少し緊張感のあるデジタル安全対策系の解説BGM
  voice_engine: voicevox
  target_duration_sec: 300
  image_style: スマホSMS、宅配箱、偽ログイン画面風の抽象図、警告色、濃紺とミントのサイバー安全ビジュアル
characters:
  left:
    character: zundamon
    voicevox_speaker_id: 3
    speaking_style: 焦り、勘違い、素直な反応、軽いボケ
  right:
    character: metan
    voicevox_speaker_id: 2
    speaking_style: 冷静な制止、具体例、短いツッコミ、安全な手順
bgm:
  source_url: https://dova-s.jp/bgm/detail/22234
  file: bgm/track.mp3
  license: DOVA-SYNDROME 音源利用ライセンス（背景音楽利用・商用利用可・クレジット不要）
  volume: 0.11
  fade_in_sec: 1
  fade_out_sec: 1.5
scenes:
  - id: s01
    role: intro
    scene_goal: 偽SMSの身近さと損失を刺す
    viewer_question: 不在通知SMSを開いていいのか
    visual_role: スマホに宅配不在通知SMSが表示され、偽リンクの先に個人情報入力欄が待っている警告図
    scene_format: あるある型
    motion_mode: warning
    main:
      kind: image
      asset: assets/s01_main.png
    sub:
      kind: bullets
      items:
        - SMSリンクは疑う
        - 焦って開かない
        - 公式アプリで確認
        - 番号検索も慎重
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: スマホに宅配不在通知SMSが表示され、偽リンクの先に個人情報入力欄が待っている警告図
        image_role: 不安喚起
        composition_type: 事故寸前構図
        imagegen_prompt_ref: s01.main
    dialogue:
      - id: l01
        speaker: left
        text: 宅配の不在SMS、焦って押すと個人情報が抜かれる危険があるのだ。
        expression: shock
        emphasis:
          words:
            - 不在SMS
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l02
        speaker: right
        text: スマホに来るとつい本物だと思うあるあるですわ。今日は公式確認の手順まで決めます。
      - id: l03
        speaker: left
        text: それ、今から見れば避けられるのだ。
      - id: l04
        speaker: right
        text: 今日は公式から安全に確認する手順まで決めますわ。
      - id: l05
        speaker: left
        text: マジで？段ボールの顔をした罠なのだ。
      - id: l06
        speaker: right
        text: そう。焦って再配達しようとすると、確認が雑になりますの。
      - id: l07
        speaker: left
        text: 荷物を逃す不安につけ込むのだな。
      - id: l08
        speaker: right
        text: 今日はリンクを開く前に見る場所と、安全な確認手順を決めますわ。
      - id: l09
        speaker: left
        text: 不在票より先に、ぼくの冷静さが不在なのだ。
  - id: s02
    role: body
    scene_goal: 偽SMSが本物に見える理由を説明する
    viewer_question: なぜ偽物と気づきにくいのか
    visual_role: 偽SMSの特徴を虫眼鏡で確認する図、社名風、短縮URL、急がせる文言をアイコン化
    scene_format: 誤解訂正型
    motion_mode: punch
    main:
      kind: image
      asset: assets/s02_main.png
    sub:
      kind: bullets
      items:
        - 社名っぽい文面
        - 短縮URL
        - 急がせる言葉
        - 不自然な日本語
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 偽SMSの特徴を虫眼鏡で確認する図、社名風、短縮URL、急がせる文言をアイコン化
        image_role: 理解補助
        composition_type: 原因マップ
        imagegen_prompt_ref: s02.main
    dialogue:
      - id: l01
        speaker: left
        text: でも文面に宅配っぽい名前が書いてあったのだ。本物じゃないのだ？
      - id: l02
        speaker: right
        text: 名前だけで信じない。
      - id: l03
        speaker: left
        text: マジで！？名前があると安心しちゃうのだ。
      - id: l04
        speaker: right
        text: 詐欺SMSは、社名風の文面、短いURL、期限切れの3つで急がせますの。
      - id: l05
        speaker: left
        text: 焦らせ文章の詰め合わせなのだ。
      - id: l06
        speaker: right
        text: しかも本物の荷物を待っている時ほど、疑う力が落ちますわ。
      - id: l07
        speaker: left
        text: ぼく、通販した翌日は全部信じそうなのだ。
      - id: l08
        speaker: right
        text: だからこそ、SMS本文ではなく、注文履歴や公式アプリで確認するのです。
      - id: l09
        speaker: left
        text: SMSはお知らせかもしれないけど、入口にはしない。
  - id: s03
    role: body
    scene_goal: 入力してはいけない情報を明確にする
    viewer_question: 何を入れると危ないか
    visual_role: 偽ログイン画面風の抽象フォームに重要情報が吸い込まれそうになる警告ビジュアル
    scene_format: 失敗エピソード型
    motion_mode: warning
    main:
      kind: image
      asset: assets/s03_main.png
    sub:
      kind: bullets
      items:
        - IDとパスワード
        - カード番号
        - 認証コード
        - 住所と電話番号
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 偽ログイン画面風の抽象フォームに重要情報が吸い込まれそうになる警告ビジュアル
        image_role: 不安喚起
        composition_type: 失敗例シミュレーション
        imagegen_prompt_ref: s03.main
    dialogue:
      - id: l01
        speaker: left
        text: どうせログインすれば再配達できるはずなのだ。
      - id: l02
        speaker: right
        text: 待ちなさい。それが一番危険な入口ですわ。
      - id: l03
        speaker: left
        text: マジで！？ログインだけでも危ないのだ。
      - id: l04
        speaker: right
        text: 偽サイトなら、入力したIDとパスワードがそのまま相手に渡りますの。
      - id: l05
        speaker: left
        text: 鍵を自分で渡すようなものなのだ。
      - id: l06
        speaker: right
        text: さらにカード番号、認証コード、住所、電話番号を求められたらかなり危険ですわ。
      - id: l07
        speaker: left
        text: 再配達なのにカード番号って変なのだ。
      - id: l08
        speaker: right
        text: その違和感が大事。荷物確認に不要な情報を求める画面は閉じてください。
      - id: l09
        speaker: left
        text: 閉じる勇気、大事なのだな。
  - id: s04
    role: body
    scene_goal: 安全な確認手順を示す
    viewer_question: どう確認すれば安全か
    visual_role: SMSを閉じて公式アプリ、注文履歴、追跡番号確認へ進む安全確認の3ステップ図
    scene_format: 手順型
    motion_mode: checklist
    main:
      kind: image
      asset: assets/s04_main.png
    sub:
      kind: bullets
      items:
        - SMSを閉じる
        - 公式アプリを開く
        - 注文履歴を見る
        - 追跡番号を手入力
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: SMSを閉じて公式アプリ、注文履歴、追跡番号確認へ進む安全確認の3ステップ図
        image_role: 手順整理
        composition_type: 手順図
        imagegen_prompt_ref: s04.main
    dialogue:
      - id: l01
        speaker: left
        text: 荷物が来てたらリンク確認が最強なのだ。
      - id: l02
        speaker: right
        text: リンクは入口にしない。
      - id: l03
        speaker: left
        text: つまり、自分で公式から入り直すのだな。
      - id: l04
        speaker: right
        text: そうです。通販サイトの注文履歴や配送会社の公式アプリから確認しますの。
      - id: l05
        speaker: left
        text: 追跡番号がある時も手入力なのだ。
      - id: l06
        speaker: right
        text: 公式サイトを検索して、自分で開いて、追跡番号を手入力しますわ。
      - id: l07
        speaker: left
        text: リンクを信用しないで、道を自分で選ぶのだ。
      - id: l08
        speaker: right
        text: その通り。詐欺リンクは道案内のふりをした落とし穴ですの。
      - id: l09
        speaker: left
        text: 落とし穴ナビ、怖すぎるのだ。
  - id: s05
    role: body
    scene_goal: 焦りが判断を壊すことを再フックする（中盤再フック）（中盤再フック）
    viewer_question: なぜわかっていても押すのか
    visual_role: 保管期限の赤い警告に焦ってリンクへ指が伸びる直前で止まるスマホ画面
    scene_format: まとめ再フック型
    motion_mode: reveal
    main:
      kind: image
      asset: assets/s05_main.png
    sub:
      kind: bullets
      items:
        - 急ぎ文句に注意
        - 保管期限に注意
        - 再配達を急がない
        - 公式で確認
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 保管期限の赤い警告に焦ってリンクへ指が伸びる直前で止まるスマホ画面
        image_role: 不安喚起
        composition_type: 事故寸前構図
        imagegen_prompt_ref: s05.main
    dialogue:
      - id: l01
        speaker: left
        text: 「本日中に確認」って書かれると、どうせ押したくなるのだ。
      - id: l02
        speaker: right
        text: 焦りが犯人ですわ。
        expression: confident
        emphasis:
          words:
            - 焦り
          style: danger
          se: reveal
          pause_after_ms: 300
      - id: l03
        speaker: left
        text: マジで！？ぼくの焦りが共犯なのだ？
      - id: l04
        speaker: right
        text: はい。保管期限、再配達不可、手数料発生のような言葉で判断を急がせますわ。
      - id: l05
        speaker: left
        text: 急がされると、確認を飛ばすのだ。
      - id: l06
        speaker: right
        text: だから急ぐ文面ほど、逆に一回止まる。これはかなり有効ですの。
      - id: l07
        speaker: left
        text: 急げって言われたら、急がない。天邪鬼作戦なのだ。
      - id: l08
        speaker: right
        text: 安全確認では正しい天邪鬼ですわ。
      - id: l09
        speaker: left
        text: 荷物より個人情報のほうが大事なのだな。
    reference_beat: midpoint_rehook
  - id: s06
    role: body
    scene_goal: 検索時にも偽情報が混ざることを示す
    viewer_question: 番号検索なら安全か
    visual_role: 電話番号検索結果で広告風の偽ページと公式ページを見分ける比較図
    scene_format: 反証型
    motion_mode: compare
    main:
      kind: image
      asset: assets/s06_main.png
    sub:
      kind: bullets
      items:
        - 番号だけで信じない
        - 広告枠に注意
        - 公式URLを見る
        - 会社名と照合
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 電話番号検索結果で広告風の偽ページと公式ページを見分ける比較図
        image_role: 比較
        composition_type: NG / OK 比較
        imagegen_prompt_ref: s06.main
    dialogue:
      - id: l01
        speaker: left
        text: 番号検索は3秒でできるし、たぶん本物だと信じていいのだ。
      - id: l02
        speaker: right
        text: それだけでは危険。
      - id: l03
        speaker: left
        text: マジで！？検索にも罠があるのだ。
      - id: l04
        speaker: right
        text: 検索結果に紛らわしいページや広告が出ることがありますの。公式URLかどうかを見ます。
      - id: l05
        speaker: left
        text: 上に出たから正義、ではないのだな。
      - id: l06
        speaker: right
        text: そうです。検索結果の順位より、公式ドメインと会社名の一致を見てください。
      - id: l07
        speaker: left
        text: ドメインはURLの住所みたいなものなのだ。
      - id: l08
        speaker: right
        text: いい理解ですわ。ただし似せた文字もあるので、公式アプリがあるならそちらが安全です。
      - id: l09
        speaker: left
        text: 検索しても、最後は公式に戻るのだ。
  - id: s07
    role: body
    scene_goal: 被害時の初動を提示する
    viewer_question: 入力後に何をすればいいか
    visual_role: 入力してしまった後の緊急対応フロー、パスワード変更、カード停止、相談窓口を示す
    scene_format: 失敗エピソード型
    motion_mode: warning
    main:
      kind: image
      asset: assets/s07_main.png
    sub:
      kind: bullets
      items:
        - パスワード変更
        - カード会社へ連絡
        - 認証コード確認
        - 公式窓口に相談
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 入力してしまった後の緊急対応フロー、パスワード変更、カード停止、相談窓口を示す
        image_role: 手順整理
        composition_type: 手順図
        imagegen_prompt_ref: s07.main
    dialogue:
      - id: l01
        speaker: left
        text: もう入力しちゃったら、どうせ布団に潜れば解決なのだ。
      - id: l02
        speaker: right
        text: すぐ動きますわ。
      - id: l03
        speaker: left
        text: マジで！？現実から逃げられないのだ。
      - id: l04
        speaker: right
        text: まず同じパスワードを使っているサービスのパスワードを変更しますの。
      - id: l05
        speaker: left
        text: 使い回しがあると連鎖するのだな。
      - id: l06
        speaker: right
        text: カード情報を入れたならカード会社へ連絡。身に覚えのない決済も確認しますわ。
      - id: l07
        speaker: left
        text: 認証コードを入れた時も履歴確認なのだ。
      - id: l08
        speaker: right
        text: アカウントのログイン履歴や連携端末を確認し、公式窓口に相談します。
      - id: l09
        speaker: left
        text: 早く動くほど被害を減らせるのだ。
  - id: s08
    role: body
    scene_goal: 自分以外の被害を防ぐ
    viewer_question: 誰に共有すべきか
    visual_role: 家族チャットに「宅配SMSリンクは押さない」と共有する安全メモ風ビジュアル
    scene_format: あるある型
    motion_mode: punch
    main:
      kind: image
      asset: assets/s08_main.png
    sub:
      kind: bullets
      items:
        - 家族に一言共有
        - SMSリンクを押さない
        - 公式から確認
        - 困ったら相談
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 家族チャットに「宅配SMSリンクは押さない」と共有する安全メモ風ビジュアル
        image_role: 理解補助
        composition_type: ツッコミ待ち構図
        imagegen_prompt_ref: s08.main
    dialogue:
      - id: l01
        speaker: left
        text: ぼくが気をつければ、たぶん家族も大丈夫なのだ。
      - id: l02
        speaker: right
        text: 共有も防御ですわ。
      - id: l03
        speaker: left
        text: マジで！？家族も狙われるのだ。
      - id: l04
        speaker: right
        text: もちろんです。荷物を待っている人、ネットに慣れていない人、忙しい人ほど押しやすいですの。
      - id: l05
        speaker: left
        text: 忙しい時の人間、だいたい弱いのだ。
      - id: l06
        speaker: right
        text: だから「宅配SMSのリンクは押さず、公式アプリで見る」と一言共有しますわ。
      - id: l07
        speaker: left
        text: 長い説教じゃなくて一文でいいのだな。
      - id: l08
        speaker: right
        text: はい。長すぎる注意喚起は読まれません。短く、具体的に。
      - id: l09
        speaker: left
        text: 家族チャットに送るのだ。
  - id: s09
    role: body
    scene_goal: 行動を3つに集約する
    viewer_question: 今後SMSが来たら何をするか
    visual_role: 宅配SMSが来た時の3ステップ、押さない、公式から確認、入力しないを大きく示すカード
    scene_format: まとめ再フック型
    motion_mode: checklist
    main:
      kind: image
      asset: assets/s09_main.png
    sub:
      kind: bullets
      items:
        - リンクを押さない
        - 公式から開く
        - 入力前に止まる
        - 家族に共有
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 宅配SMSが来た時の3ステップ、押さない、公式から確認、入力しないを大きく示すカード
        image_role: 手順整理
        composition_type: チェックリスト
        imagegen_prompt_ref: s09.main
    dialogue:
      - id: l01
        speaker: left
        text: 不在SMSが来たら、どうせSMSの中で解決したくなるのだ。
      - id: l02
        speaker: right
        text: 3手で止めますわ。
      - id: l03
        speaker: left
        text: つまり、押さない、公式、止まるなのだ。
      - id: l04
        speaker: right
        text: そして困ったら、配送会社や通販サイトの公式窓口から確認しますわ。
      - id: l05
        speaker: left
        text: SMSの中で解決しようとしないのだな。
      - id: l06
        speaker: right
        text: そうです。SMSはきっかけかもしれませんが、手続き場所にしない。
      - id: l07
        speaker: left
        text: コメントで、偽SMSっぽい文面のあるあるを聞きたいのだ。
      - id: l08
        speaker: right
        text: ある人は、どんな文面だったか個人情報を伏せて共有してほしいですわ。
      - id: l09
        speaker: left
        text: 実例があると、次に気づきやすいのだ。
  - id: s10
    role: cta
    scene_goal: 家族共有という行動で締める
    viewer_question: 最初に何をするか
    visual_role: 家族チャットへ短い注意文を送るスマホと、宅配箱の安全確認アイコンを並べた締めカード
    scene_format: まとめ再フック型
    motion_mode: recap
    main:
      kind: image
      asset: assets/s10_main.png
    sub:
      kind: bullets
      items:
        - 家族に共有
        - リンクを押さない
        - 公式アプリ確認
        - 入力前に相談
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 家族チャットへ短い注意文を送るスマホと、宅配箱の安全確認アイコンを並べた締めカード
        image_role: オチ補助
        composition_type: 手順図
        imagegen_prompt_ref: s10.main
    dialogue:
      - id: l01
        speaker: left
        text: まとめると、宅配SMSは便利そうでもリンクを入口にしないのだ。
      - id: l02
        speaker: right
        text: はい。SMSを閉じて、公式アプリや公式サイトから確認しますわ。
      - id: l03
        speaker: left
        text: ログイン、カード番号、認証コードを求められたら止まる。
      - id: l04
