          話者B「複合するんです。パッキン劣化＋詰めすぎ＋霜が同時に起きると月1,000円を超えることも」
          話者A「それ5年放置したらいくらになるのだ」
          話者B「最大6万円近く消えます。しかも電気代の中に紛れるから、何となく高いなで終わってしまう」
