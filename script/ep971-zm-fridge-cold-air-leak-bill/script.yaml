  - id: s04
    title_text: パッキンが一番地味で一番高い
    role: body
    scene_goal: パッキン劣化の仕組みと経済的ダメージを具体解説
    viewer_question: パッキンは消耗品だから劣化しても仕方ないんじゃないか
