          話者B「6つ確認してほしいことがあります。まずドアのパッキン、ゴムが固くなっていないか触ってみて」
          話者A「うちのやつ、なんかペコペコしてる気がするよ。あれ普通じゃない気がする」
          話者B「固くて弾力がないのが劣化のサインですわ。次に冷凍庫の霜。5mm以上ついていたら危険信号」
