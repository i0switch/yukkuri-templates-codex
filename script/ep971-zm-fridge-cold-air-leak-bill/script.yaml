    motion_mode: punch
    duration_sec: 30
    main:
      kind: image
      asset: assets/s04_main.png
      asset_requirements:
        imagegen_prompt: |-
          s04: パッキンが一番地味で一番高い

          話者A「パッキンって地味なゴムじゃん。そんなに大事なのだ？」
          話者B「全ての根本ですわ。あのゴムが冷気を密閉している。栓が抜けた状態で水を冷やすようなもの」
          話者A「冷気がダダ漏れになって、モーターがずっと動き続けてるじゃん」
          話者B「そうです。『まだ冷えてない』と判断してフル回転を続ける。その電気代が月800円の正体」
          話者A「交換したらいくらかかるのだ」
          話者B「機種によりますが3,000〜8,000円程度。DIYできる機種もありますの」
