        imagegen_prompt: |-
          s01: その冷蔵庫、毎月800円の穴が開いてる

          話者A「また電気代が高かったよ……エアコン使いすぎかな」
          話者B「その犯人、エアコンじゃないかもしれませんわよ」
          話者A「え、じゃあTVとか？ゲーム機？節電グッズ買ったのにまだ高いじゃん」
          話者B「冷蔵庫ですの。パッキンが劣化すると冷気が漏れ続けて、月800円近く静かに抜かれます」
          話者A「マジで！？冷蔵庫って一応冷えてるのに、何が問題なのだ」
          話者B「冷えていても、ドアの密閉が甘いとモーターが常時フル回転になるんです。気づかないまま課金される感じ」
          話者A「年にしたらどのくらい損するのだ」
          話者B「年間9,600円。10年放置なら10万円近く消えます。しかも静かに」

