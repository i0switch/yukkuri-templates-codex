meta:
  id: ep962-rm-notification-focus-drain
  title: スマホ通知で集中力と時間が漏れる罠と今日からできる3つの止め方
  layout_template: Scene02
  pair: RM
  fps: 30
  width: 1920
  height: 1080
  audience: スマホ通知に反応しすぎて作業や勉強が進まない人
  tone: 日常のあるあるから損失回避へ進む実用解説。霊夢の雑な解決策を魔理沙が具体的に整理する。
  bgm_mood: 明るく軽いデジタル生活改善系の解説BGM
  voice_engine: aquestalk
  target_duration_sec: 300
  image_style: 明るいデスク、スマホ通知、集中タイマー、チェックリスト、赤い警告と青い整理図解を組み合わせた生活改善ビジュアル
characters:
  left:
    character: reimu
    aquestalk_preset: れいむ
    speaking_style: 焦り、言い訳、生活感、軽いボケ
  right:
    character: marisa
    aquestalk_preset: まりさ
    speaking_style: 整理、短いツッコミ、数字、実用的な結論
bgm:
  source_url: https://dova-s.jp/bgm/detail/23286
  file: bgm/track.mp3
  license: DOVA-SYNDROME 音源利用ライセンス（背景音楽利用・商用利用可・クレジット不要）
  volume: 0.11
  fade_in_sec: 1
  fade_out_sec: 1.5
scenes:
  - id: s01
    role: intro
    scene_goal: 通知の損失を自分事化する
    viewer_question: なぜ少し見るだけで作業が止まるのか
    visual_role: 作業机の上でスマホ通知が雪崩のように積み上がり、集中タイマーが止まっている様子
    scene_format: あるある型
    motion_mode: warning
    main:
      kind: image
      asset: assets/s01_main.png
    sub:
      kind: bullets
      items:
        - 通知は用事に見える
        - 開くと別アプリへ飛ぶ
        - 戻るまで数分かかる
        - まず通知量を見える化
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 作業机の上でスマホ通知が雪崩のように積み上がり、集中タイマーが止まっている様子
        image_role: 不安喚起
        composition_type: 事故寸前構図
        imagegen_prompt_ref: s01.main
    dialogue:
      - id: l01
        speaker: left
        text: "スマホを一回見ただけなのに、気づいたら**20分**消えてたのよ。"
        expression: shock
        emphasis:
          words:
            - 20分
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l02
        speaker: right
        text: "通知沼あるあるだぜ。問題は一回見ることじゃなく、戻れなくなることなんだ。"
      - id: l03
        speaker: left
        text: "でも通知って大事な連絡かもしれないじゃない。無視したら人生終わらない？"
      - id: l04
        speaker: right
        text: "待て待て、通知の9割は今すぐじゃなくても困らないことが多い。"
      - id: l05
        speaker: left
        text: "9割って、ほぼ構ってちゃんじゃない。"
      - id: l06
        speaker: right
        text: "だから今日は通知を全部消す話じゃない。必要な通知だけ残す話だぜ。"
      - id: l07
        speaker: left
        text: "全部オフにして山へ逃げる回じゃないのね。"
      - id: l08
        speaker: right
        text: "山より先に設定を見よう。今日やるのは通知の棚卸しだ。"
      - id: l09
        speaker: left
        text: "棚卸しなら、私の集中力の在庫も確認したいわ。"
      - id: l10
        speaker: right
        text: "そこがもう赤字っぽいから、今から止血するぜ。"
      - id: l11
        speaker: left
        text: "通知に吸われる前に、先に仕組みで止めるのね。"
      - id: l12
        speaker: right
        text: "その通り。5分で設定できる3つの対策まで持っていく。"
  - id: s02
    role: body
    scene_goal: 通知から脱線する仕組みを説明する
    viewer_question: 通知を見るだけでなぜ長引くのか
    visual_role: 通知からSNS、動画、買い物ページへ枝分かれして作業画面へ戻れなくなる迷路図
    scene_format: 誤解訂正型
    motion_mode: punch
    main:
      kind: image
      asset: assets/s02_main.png
    sub:
      kind: bullets
      items:
        - 通知を見る
        - アプリを開く
        - 関連投稿を見る
        - 元の作業を忘れる
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 通知からSNS、動画、買い物ページへ枝分かれして作業画面へ戻れなくなる迷路図
        image_role: 理解補助
        composition_type: 原因マップ
        imagegen_prompt_ref: s02.main
    dialogue:
      - id: l01
        speaker: left
        text: "通知だけなら3秒で見られるし、別に大げさじゃなくない？"
      - id: l02
        speaker: right
        text: "そこが罠だぜ。通知は入口で、時間を奪うのはその先のアプリだ。"
      - id: l03
        speaker: left
        text: "入口無料、奥で課金される遊園地みたいね。"
      - id: l04
        speaker: right
        text: "例えば通知を開いて、返信して、ついでにSNSを見て、気づくと別動画まで行く。"
      - id: l05
        speaker: left
        text: "あるわ。用事は一つだったのに、帰り道で迷子になるやつ。"
      - id: l06
        speaker: right
        text: "しかも戻った後も、作業内容を思い出すのに時間がかかる。"
      - id: l07
        speaker: left
        text: "脳内のタブが全部散らかる感じね。"
      - id: l08
        speaker: right
        text: "だから通知対策は、画面を見る回数を減らすより、脱線の入口を減らすのが本命だ。"
      - id: l09
        speaker: left
        text: "通知を見ない根性じゃなく、入口に鍵をかけるのね。"
      - id: l10
        speaker: right
        text: "そうだぜ。まずは通知を種類で分けよう。"
      - id: l11
        speaker: left
        text: "全部同じピコン扱いしてたわ。"
      - id: l12
        speaker: right
        text: "そこを分けるだけで、かなり楽になる。"
  - id: s03
    role: body
    scene_goal: 通知の優先順位を作る
    viewer_question: どの通知を残せばいいか
    visual_role: スマホ通知を残す箱と消す箱に分類するチェックリスト風の整理図
    scene_format: 手順型
    motion_mode: checklist
    main:
      kind: image
      asset: assets/s03_main.png
    sub:
      kind: bullets
      items:
        - 人からの連絡
        - 予定と決済
        - 安全通知
        - 宣伝とおすすめ
        - 反応通知
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: スマホ通知を残す箱と消す箱に分類するチェックリスト風の整理図
        image_role: 手順整理
        composition_type: チェックリスト
        imagegen_prompt_ref: s03.main
    dialogue:
      - id: l01
        speaker: left
        text: "通知を分けるって、どれを切ればいいのよ。全部それっぽく大事そうよ？"
      - id: l02
        speaker: right
        text: "まず残す候補は3つ。人からの連絡、予定、決済や安全に関わる通知だ。"
      - id: l03
        speaker: left
        text: "つまり家族、予定、支払い、危険系ね。"
      - id: l04
        speaker: right
        text: "そう。逆におすすめ、セール、いいね、ランキング、新着動画は基本あとでいい。"
      - id: l05
        speaker: left
        text: "いいね通知、心の栄養なのに。"
      - id: l06
        speaker: right
        text: "栄養のつもりで砂糖を常時点滴してるようなものだぜ。"
      - id: l07
        speaker: left
        text: "急に健康診断みたいな言い方するじゃない。"
      - id: l08
        speaker: right
        text: "集中したい時間に必要なのは、今すぐ対応する理由がある通知だけだ。"
      - id: l09
        speaker: left
        text: "おすすめは見たい時に見に行けばいいのね。"
      - id: l10
        speaker: right
        text: "受け身で浴びるから時間が漏れる。取りに行く形へ変えるんだ。"
      - id: l11
        speaker: left
        text: "通知に呼ばれるんじゃなく、こっちから呼ぶ。"
      - id: l12
        speaker: right
        text: "それが主導権を取り戻す第一歩だぜ。"
  - id: s04
    role: body
    scene_goal: 画面上に出る通知を止める
    viewer_question: 音を消すだけで十分か
    visual_role: NG側は画面上部に通知バナーが連発し、OK側は作業画面が静かに保たれている比較
    scene_format: 失敗エピソード型
    motion_mode: compare
    main:
      kind: image
      asset: assets/s04_main.png
    sub:
      kind: bullets
      items:
        - 音だけオフは弱い
        - バナーが視線を奪う
        - ロック画面も要確認
        - 集中時間は表示を減らす
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: NG側は画面上部に通知バナーが連発し、OK側は作業画面が静かに保たれている比較
        image_role: 比較
        composition_type: NG / OK 比較
        imagegen_prompt_ref: s04.main
    dialogue:
      - id: l01
        speaker: left
        text: "音を消してるから私は対策済みよ。ピコンって鳴らないし。"
      - id: l02
        speaker: right
        text: "甘いぜ。音がなくても、バナーが出れば目が持っていかれる。"
      - id: l03
        speaker: left
        text: "たしかに上からひょこっと来ると見ちゃうわ。"
      - id: l04
        speaker: right
        text: "人間は動くものと新しい情報に弱い。作業中のバナーは小さい割り込みだ。"
      - id: l05
        speaker: left
        text: "小さい顔して、仕事を止める大物なのね。"
      - id: l06
        speaker: right
        text: "集中時間だけでも、バナー表示とロック画面表示を切るのが効く。"
      - id: l07
        speaker: left
        text: "通知センターには残して、画面には出さない感じ？"
      - id: l08
        speaker: right
        text: "そうだ。必要な時にまとめて見る。勝手に割り込ませない。"
      - id: l09
        speaker: left
        text: "玄関チャイムじゃなく、郵便受けに入れてもらうのね。"
      - id: l10
        speaker: right
        text: "いい例えだぜ。全部チャイムだと、家事も仕事も進まない。"
      - id: l11
        speaker: left
        text: "通知の宅配業者、多すぎ問題ね。"
      - id: l12
        speaker: right
        text: "まずはバナーの数を減らそう。"
  - id: s05
    role: body
    scene_goal: 手動ではなく時間帯で通知制御する
    viewer_question: 毎回オフにするのは面倒ではないか
    visual_role: スマホの集中モードが朝の作業時間だけ自動でオンになり、重要連絡だけ通す手順図
    scene_format: Before / After型
    motion_mode: reveal
    main:
      kind: image
      asset: assets/s05_main.png
    sub:
      kind: bullets
      items:
        - 作業時間を決める
        - 許可する人を選ぶ
        - アプリを絞る
        - 終わったら自動解除
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: スマホの集中モードが朝の作業時間だけ自動でオンになり、重要連絡だけ通す手順図
        image_role: 手順整理
        composition_type: 手順図
        imagegen_prompt_ref: s05.main
    dialogue:
      - id: l01
        speaker: left
        text: "でも毎回通知を切るの、絶対忘れるわ。私の意志は湿気に弱い。"
      - id: l02
        speaker: right
        text: "だから意志じゃなく時間で切る。集中モードをスケジュール設定するんだ。"
      - id: l03
        speaker: left
        text: "スマホ側に門番をやらせるのね。"
      - id: l04
        speaker: right
        text: "例えば平日9時から11時は通知を絞る。家族や仕事の連絡だけ許可する。"
      - id: l05
        speaker: left
        text: "それなら完全に孤島にならないわね。"
      - id: l06
        speaker: right
        text: "中盤の大事な点だが、通知対策は社会を断つことじゃない。反応する順番を決めることだぜ。"
        expression: confident
        emphasis:
          words:
            - 反応する順番
          style: punch
          se: reveal
          pause_after_ms: 300
      - id: l07
        speaker: left
        text: "マジで！？人間関係を捨てる儀式じゃなかったのね。"
      - id: l08
        speaker: right
        text: "むしろ大事な連絡に気づきやすくなる。どうでもいい通知を薄めるからな。"
      - id: l09
        speaker: left
        text: "ノイズが減ると、本当に大事な音が聞こえるわけか。"
      - id: l10
        speaker: right
        text: "そうだぜ。集中モードは我慢ではなく仕分けだ。"
      - id: l11
        speaker: left
        text: "仕分けなら、私にもできそう。"
      - id: l12
        speaker: right
        text: "まず1日2時間だけ設定して試せばいい。"
  - id: s06
    role: body
    scene_goal: 見る時間を決めて反応癖を減らす
    viewer_question: いつ確認すれば不安が減るか
    visual_role: 一日の中で通知を見る時間を3回だけに区切った時計とスマホのスケジュール図
    scene_format: 手順型
    motion_mode: checklist
    main:
      kind: image
      asset: assets/s06_main.png
    sub:
      kind: bullets
      items:
        - 午前の区切り
        - 昼休み
        - 夕方の確認
        - 寝る前は減らす
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 一日の中で通知を見る時間を3回だけに区切った時計とスマホのスケジュール図
        image_role: 手順整理
        composition_type: 手順図
        imagegen_prompt_ref: s06.main
    dialogue:
      - id: l01
        speaker: left
        text: "通知を減らすと、逆に気になって何回も開いちゃいそう。"
      - id: l02
        speaker: right
        text: "その不安には、見る時間を先に決めるのが効く。"
      - id: l03
        speaker: left
        text: "見ないんじゃなくて、見る予約を入れるのね。"
      - id: l04
        speaker: right
        text: "例えば午前の区切り、昼休み、夕方の3回。そこでまとめて確認する。"
      - id: l05
        speaker: left
        text: "3回だけなら、逆に安心かも。"
      - id: l06
        speaker: right
        text: "常時監視をやめるだけで、作業の流れが途切れにくくなる。"
      - id: l07
        speaker: left
        text: "私はスマホ警備員を勝手にやってたのね。"
      - id: l08
        speaker: right
        text: "しかも無給でな。通知確認は仕事ではなく、時間枠に入れる作業だ。"
      - id: l09
        speaker: left
        text: "寝る前の通知チェックも危険そうね。"
      - id: l10
        speaker: right
        text: "寝る前は特におすすめしない。短い確認が夜更かしに化ける。"
      - id: l11
        speaker: left
        text: "一つだけ見るつもりが、朝の私に借金を残すやつね。"
      - id: l12
        speaker: right
        text: "だから夜は通知より睡眠を優先だぜ。"
  - id: s07
    role: body
    scene_goal: バッジ通知の視覚的圧を下げる
    viewer_question: バッジは残していいか
    visual_role: スマホ画面の赤い未読バッジが大きく膨らみ、作業メモを押しつぶす誇張図
    scene_format: 誤解訂正型
    motion_mode: warning
    main:
      kind: image
      asset: assets/s07_main.png
    sub:
      kind: bullets
      items:
        - 赤い数字は圧が強い
        - 未読数で焦る
        - 重要アプリだけ残す
        - SNSは切る候補
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: スマホ画面の赤い未読バッジが大きく膨らみ、作業メモを押しつぶす誇張図
        image_role: 不安喚起
        composition_type: 誇張図解
        imagegen_prompt_ref: s07.main
    dialogue:
      - id: l01
        speaker: left
        text: "音もバナーも切ったら、赤い数字くらいは残していいでしょ。"
      - id: l02
        speaker: right
        text: "その赤い数字が意外と強い。未読があるだけで頭に引っかかるんだ。"
      - id: l03
        speaker: left
        text: "たしかに赤丸があると、こっちを見ろって言われてる感じするわ。"
      - id: l04
        speaker: right
        text: "SNS、動画、ニュース、買い物アプリのバッジは、集中したい人ほど切る候補だ。"
      - id: l05
        speaker: left
        text: "赤丸って小さい上司みたいね。"
      - id: l06
        speaker: right
        text: "しかも勤務時間外にも呼んでくる上司だぜ。"
      - id: l07
        speaker: left
        text: "最悪じゃない。"
      - id: l08
        speaker: right
        text: "未読数を知る必要があるアプリだけ残す。全部の数字を背負わなくていい。"
      - id: l09
        speaker: left
        text: "メールと連絡系だけ残して、娯楽系は切る感じね。"
      - id: l10
        speaker: right
        text: "それでいい。赤い圧力を減らすだけで、開く回数はかなり減る。"
      - id: l11
        speaker: left
        text: "スマホ画面の圧迫感も下がりそう。"
      - id: l12
        speaker: right
        text: "画面が静かだと、頭も少し静かになるぜ。"
  - id: s08
    role: body
    scene_goal: 切りすぎと戻し方を説明する
    viewer_question: 必要な通知まで消したらどうするか
    visual_role: 通知を切りすぎた状態から、本当に困った通知だけ戻すビフォーアフター図
    scene_format: 反証型
    motion_mode: compare
    main:
      kind: image
      asset: assets/s08_main.png
    sub:
      kind: bullets
      items:
        - 困った通知だけ戻す
        - 一週間試す
        - 戻す理由を書く
        - 宣伝は戻さない
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 通知を切りすぎた状態から、本当に困った通知だけ戻すビフォーアフター図
        image_role: 比較
        composition_type: ビフォーアフター
        imagegen_prompt_ref: s08.main
    dialogue:
      - id: l01
        speaker: left
        text: "でも切りすぎて、大事な連絡を逃したら怖いわ。"
      - id: l02
        speaker: right
        text: "だから一週間試して、困ったものだけ戻す。最初から完璧を狙わない。"
      - id: l03
        speaker: left
        text: "通知断捨離にも仮住まい期間があるのね。"
      - id: l04
        speaker: right
        text: "そうだ。戻す基準は、実際に困ったかどうか。なんとなく不安は戻す理由にしない。"
      - id: l05
        speaker: left
        text: "なんとなく不安、だいたい強いのよ。"
      - id: l06
        speaker: right
        text: "強いが、だいたい雑だぜ。例えば銀行の入出金通知は戻す価値がある。"
      - id: l07
        speaker: left
        text: "セール通知は？"
      - id: l08
        speaker: right
        text: "それは財布に穴を開ける通知だな。基本戻さない。"
      - id: l09
        speaker: left
        text: "節約にもつながるのか。"
      - id: l10
        speaker: right
        text: "時間だけじゃなく、衝動買いも減る。通知はお金にもつながるんだ。"
      - id: l11
        speaker: left
        text: "通知って思ったより生活に入り込んでるわね。"
      - id: l12
        speaker: right
        text: "だから仕組みで距離を置く。"
