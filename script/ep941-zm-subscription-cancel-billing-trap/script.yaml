          話者B「まずそこですわ。アプリ削除は、基本的に解約ではありませんの。」
          話者A「マジで！？アイコンを消したら関係も終わると思ってたのだ。」
          話者B「それはスマホ画面から見えなくしただけ。契約は別の場所で生きていますわ。」
          話者A「サブスク、見えないところで家賃を取りに来るのだ。」
          話者B「今日は、解約後も請求が続く典型パターンと確認順を整理しますわ。」
          話者A「財布の穴をふさぎたいのだ。」
          話者B「では最初に、どこで契約したかを見ますの。」

