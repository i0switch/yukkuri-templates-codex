          話者B「詰みではありません。契約元の一覧を探すのですわ。」
          話者A「公式サイトで登録した場合は？」
          話者B「その場合はサイト側のアカウント設定や購入履歴を見ることが多いですの。」
          話者A「解約はアプリ探検じゃなく、契約元探しなのだな。」
          話者B「その通り。請求メールやレシートが、契約元の手がかりになりますわ。」

