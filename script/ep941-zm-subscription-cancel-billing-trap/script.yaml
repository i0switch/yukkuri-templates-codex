          話者B「気持ちは分かりますが、サービス利用と契約停止は別ですわ。」
          話者A「冷蔵庫を捨てても電気契約は残る、みたいな話なのだ？」
          話者B「近いですわ。端末から消しただけでは、支払い契約には届きませんの。」
          話者A「ぼく、画面の掃除をしていただけなのだ。」
          話者B「解約は、契約一覧で「更新を停止」「サブスクリプションをキャンセル」まで進む必要がありますわ。」
          話者A「退会とログアウトも違うのだ？」
          話者B「違います。ログアウトは外へ出るだけ。契約は部屋代を払い続けますの。」
          話者A「サブスクの部屋代、油断すると怖いのだ。」
          話者B「だから、削除ではなく契約停止の証拠を残しますわ。」

