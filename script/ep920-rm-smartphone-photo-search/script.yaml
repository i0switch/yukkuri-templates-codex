          霊夢「たしかに駐車場の番号とか、店の営業時間とか、あとで見る資料とか撮る。」
          魔理沙「その“あとで”が来ないまま、写真フォルダの地層になる。」
          霊夢「私のスマホ、考古学の現場だったのか。」
          魔理沙「しかも思い出写真と一時写真が同じ場所にいるから、消す判断が怖くなる。」
          霊夢「わかる。床の写真は消せるけど、隣に旅行写真があると急に慎重になる。」
          魔理沙「だから最初の考え方は、残す写真と探すための写真と捨てる写真を分けることだ。」
          霊夢「全部を一軍扱いしないってことか。」
