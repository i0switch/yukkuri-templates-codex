    viewer_question: すぐできそうにする
    visual_role: 期限切れスクショ、追跡番号、地図メモがスマホから軽く片づいていく爽快な整理シーン
    duration_sec: 30
    main:
      kind: image
      asset: assets/s04_main.png
      asset_requirements:
        imagegen_prompt: |-
          s04: スクショと一時写真から片づける

          霊夢「でも最初にどこから触ればいい？思い出写真を消すのは怖い。」
          魔理沙「思い出写真は後回し。まずスクショと一時写真だけ見る。」
          霊夢「スクショなら心が痛みにくいかも。たぶん半分くらい期限切れの情報だし。」
          魔理沙「セール画面、地図の一時保存、友達に送った確認画像。役目が終わったものが多い。」
          霊夢「あるある。なぜか去年の宅配追跡番号が残ってる。」
          魔理沙「それはもう荷物じゃなくて化石だな。消していい。」
          霊夢「化石認定されると急に消しやすい。」
          魔理沙「コツは、思い出に手を出す前に“役目が終わった写真”を減らすことだ。」
          霊夢「容量も気持ちも軽くなりそう。」
          魔理沙「最初の勝ちを作ると、整理は続きやすい。」

          ゆっくり解説動画向けの挿入画像を日本語で生成してください。 この画像は会話内容をそのまま再現するためのものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。 字幕やセリフは別で表示するため、会話等は画像に入れないでください。 キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、UI、概念図、状況説明ビジュアルを中心に構成してください。 画面全体を有効活用し、情報が一目で伝わる、整理された高品質なビジュアルにしてください。 YouTubeの解説動画に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。 Make the aspect ratio 16:9.

