meta:
  id: ep952-rm-browser-extension-permission-trap
  title: ブラウザ拡張を入れすぎる前に見る権限の罠
  layout_template: Scene02
  pair: RM
  fps: 30
  width: 1280
  height: 720
  audience: 便利そうなブラウザ拡張を入れがちだが、権限や提供元までは確認していない人
  tone: 実用的で少し危機感のあるネット安全解説。霊夢の楽観を魔理沙が具体例でほどく
  bgm_mood: calm cyber safety explainer
  voice_engine: aquestalk
  target_duration_sec: 300
  image_style: ブラウザ拡張アイコン、権限リスト、鍵、警告マーク、チェックリスト、青とグレー基調、見やすい実用図解
