  left:
    character: reimu
    aquestalk_preset: れいむ
    speaking_style: 楽観、共感、生活感、素朴な勘違い、軽いツッコミ
  right:
    character: marisa
    aquestalk_preset: まりさ
    speaking_style: 整理、具体例、短いツッコミ、行動化
bgm:
  source_url: https://dova-s.jp/bgm/detail/22234
  file: bgm/track.mp3
