  fade_out_sec: 1.5
scenes:
  - id: s01
    role: intro
    scene_goal: 拡張機能の権限放置リスクを冒頭で刺す
    viewer_question: 便利な拡張を入れるだけで何が危ないのか
    reference_beat: 誤解訂正型
    visual_role: ブラウザ画面の上に複数の拡張アイコンが浮かび、閲覧データの流れが警告色で可視化される図解
    scene_format: 誤解訂正型
    duration_sec: 30
    main:
      kind: image
      asset: assets/s01_main.png
      asset_requirements:
        imagegen_prompt: |-
          s01: 便利な拡張が全部見てる

          話者A「最近、ブラウザ拡張って便利なの多いわよね。」
          話者B「便利だけど、入れすぎると閲覧データまで見られることがあるぜ。」
          話者A「え、拡張ってただの追加機能じゃないの？」
          話者B「開いたページに触れる権限があるんだ。」
          話者A「買い物画面も見えるの？」
          話者B「全サイト権限なら可能性はあるぜ。」
          話者A「マジで！？家計簿を覗かれる感じ？」
          話者B「だから今日は残す基準を決める。」
          話者A「便利さだけで入れるのは怖いわね。」
          話者B「まず権限を開いて確認するんだぜ。」
          話者A「まず管理画面を開くわ。」

          ゆっくり解説動画向けの挿入画像を日本語で生成してください。 この画像は会話内容をそのまま再現するためのものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。 字幕やセリフは別で表示するため、会話等は画像に入れないでください。 キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、UI、概念図、状況説明ビジュアルを中心に構成してください。 画面全体を有効活用し、情報が一目で伝わる、整理された高品質なビジュアルにしてください。 YouTubeの解説動画に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。 実在ブランド、実在UIの完全模写、実在人物、既存キャラクター、ウォーターマーク、長文テキスト、細かすぎる表は入れないでください。 画面下部20%は字幕とキャラクターが重なるため、重要情報を置かず余白を残してください。 Make the aspect ratio 16:9.
          画像の雰囲気は「ブラウザ拡張アイコン、権限リスト、鍵、警告マーク、チェックリスト、青とグレー基調、見やすい実用図解」で生成してください。このシーンで見せたいものは「ブラウザ画面の上に複数の拡張アイコンが浮かび、閲覧データの流れが警告色で可視化される図解」。余白のある横長構図で、動画のメインコンテンツ枠に入れて見やすい一枚にしてください。
