meta:
  id: ep984-rm-free-app-data
  title: 無料アプリはなぜ無料で使えるのか
  pair: RM
  voice_engine: aquestalk
  layout_template: Scene12
  width: 1280
  height: 720
  fps: 30
  target_duration_sec: 300
  audience: スマホアプリを日常的に使うが権限や課金導線を見落としがちな人
  tone: 注意喚起系。怖がらせすぎず具体策へ落とす。
  bgm_mood: 落ち着いた注意喚起と教育向け解説
  hook: 無料の代金は、お金じゃなくてデータです
characters:
  left:
    character: reimu
    aquestalk_preset: 女性１
  right:
    character: marisa
    aquestalk_preset: まりさ
scenes:
  - id: s01
    title_text: 無料の代金はデータ
    duration_sec: 31.2
    motion_mode: punch
    main:
      kind: image
      asset: assets/s01_main.png
      asset_requirements:
        imagegen_prompt_ref: s01.main
        prompt_sha256: 21f2784851346c15f6e6207b71ed66ee4740cc16c7ba2098d495e2878170c54d
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 不安喚起
        composition_type: 誇張図解
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 対象シーンの要点に一致し、字幕と重複せず理解を補助する
        imagegen_prompt_ref: s01.main
    dialogue:
      - id: l01
        speaker: left
        text: 見て魔理沙、広告が怖いわ。
        expression: shock
        emphasis:
          words:
            - 無料アプリ
            - 広告
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l02
        speaker: right
        text: 無料の代金は、お金じゃなくてデータなんだぜ。
        expression: serious
        emphasis:
          words:
            - データ
          style: danger
          se: reveal
          pause_after_ms: 300
      - id: l03
        speaker: left
        text: え、私、知らないうちに支払い済みだったの？
        expression: confused
        emphasis:
          words:
            - 支払い済み
          style: surprise
          se: question
          pause_after_ms: 300
      - id: l04
        speaker: right
        text: 現金は払ってなくても、行動、興味、位置情報、端末情報みたいな材料でサービスが回ってるんだぜ。
        expression: calm
        emphasis:
          words:
            - 行動
            - 興味
            - 位置情報
          style: punch
          se: warning
          pause_after_ms: 300
      - id: l05
        speaker: left
        text: 無料って、ただの優しさじゃなかったのね。
        expression: worried
        emphasis:
          words:
            - 優しさ
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l06
        speaker: right
        text: 今日は広告、個人情報、課金導線の3つから、無料アプリの仕組みと注意点を整理するぜ。
        expression: confident
        emphasis:
          words:
            - 3つ
          style: number
          se: success
          pause_after_ms: 300
  - id: s02
    title_text: 広告で成り立つ仕組み
    duration_sec: 31.2
    motion_mode: compare
    main:
      kind: image
      asset: assets/s02_main.png
      asset_requirements:
        imagegen_prompt_ref: s02.main
        prompt_sha256: 2a167156294a2f83c716df54e85dfc9ec07bdaba680b10119ca10d1d5a436269
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 理解補助
        composition_type: 原因マップ
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 対象シーンの要点に一致し、字幕と重複せず理解を補助する
        imagegen_prompt_ref: s02.main
    dialogue:
      - id: l01
        speaker: left
        text: まず広告って、見せるだけでそんなに意味あるの？
        expression: confused
        emphasis:
          words:
            - 広告
          style: surprise
          se: question
          pause_after_ms: 300
      - id: l02
        speaker: right
        text: アプリ側は広告枠を出して、広告主から収益を得るんだぜ。テレビCMのスマホ版みたいなものだぜ。
        expression: calm
        emphasis:
          words:
            - 広告枠
          style: punch
          se: reveal
          pause_after_ms: 300
      - id: l03
        speaker: left
        text: じゃあ私は、アプリを見る代わりに広告も見てるってことね。
        expression: serious
        emphasis:
          words:
            - 広告も見てる
          style: action
          se: success
          pause_after_ms: 300
      - id: l04
        speaker: right
        text: そうだぜ。無料で使える代わりに、画面の一部や時間を広告に渡しているんだぜ。
        expression: confident
        emphasis:
          words:
            - 時間
          style: punch
          se: success
          pause_after_ms: 300
      - id: l05
        speaker: left
        text: 時間払いのサブスクみたいで、ちょっと嫌な言い方ね。
        expression: wry
        emphasis:
          words:
            - 時間払い
          style: punch
          se: pop
          pause_after_ms: 300
      - id: l06
        speaker: right
        text: でもその見方は大事だぜ。無料はゼロ円でも、注意力は消費しているんだぜ。
        expression: serious
        emphasis:
          words:
            - 注意力
          style: danger
          se: warning
          pause_after_ms: 300
  - id: s03
    title_text: データで広告が当たる
    duration_sec: 31.2
    motion_mode: warning
    main:
      kind: image
      asset: assets/s03_main.png
      asset_requirements:
        imagegen_prompt_ref: s03.main
        prompt_sha256: 86c1811413f1d9acd63d163ca3071d98cac042c05ea845a0cd9cdf66ebbdd9a0
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 不安喚起
        composition_type: 原因マップ
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 対象シーンの要点に一致し、字幕と重複せず理解を補助する
        imagegen_prompt_ref: s03.main
    dialogue:
      - id: l01
        speaker: left
        text: でも、なんで私が見たい広告っぽいものが出るの？偶然にしては鋭いのよ。
        expression: worried
        emphasis:
          words:
            - 鋭い
          style: surprise
          se: question
          pause_after_ms: 300
      - id: l02
        speaker: right
        text: アプリ内の行動や興味の傾向から、広告が合いやすくなることがあるんだぜ。
        expression: calm
        emphasis:
          words:
            - 行動
            - 興味
          style: punch
          se: reveal
          pause_after_ms: 300
      - id: l03
        speaker: left
        text: つまり私の指の動きが、広告のヒントになってるの？
        expression: shock
        emphasis:
          words:
            - 指の動き
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l04
        speaker: right
        text: 大げさに言えばそうだぜ。何を見たか、どこで止まったか、何に反応したかが材料になる場合があるぜ。
        expression: serious
        emphasis:
          words:
            - 材料
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l05
        speaker: left
        text: 無料アプリ、私の日記を読んでるみたいで落ち着かないわ。
        expression: wry
        emphasis:
          words:
            - 日記
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l06
        speaker: right
        text: だから利用規約やプライバシー設定を見る意味があるんだぜ。難しくても、権限だけは確認したいぜ。
        expression: confident
        emphasis:
          words:
            - 権限
          style: action
          se: success
          pause_after_ms: 300
  - id: s04
    title_text: 権限は入口の鍵
    duration_sec: 31.2
    motion_mode: checklist
    main:
      kind: image
      asset: assets/s04_main.png
      asset_requirements:
