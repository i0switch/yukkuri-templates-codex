        speaker: left
        text: 無料アプリって、広告以外にも課金ボタンが多いわよね。
        expression: confused
        emphasis:
          words:
            - 課金ボタン
          style: surprise
          se: question
          pause_after_ms: 300
      - id: l02
        speaker: right
        text: 無料で入口を広げて、便利さや制限解除で課金につなげる形も多いんだぜ。
        expression: calm
        emphasis:
          words:
            - 制限解除
          style: punch
          se: reveal
          pause_after_ms: 300
      - id: l03
        speaker: left
        text: 最初は無料、気づいたら月額。これ、静かな坂道ね。
        expression: worried
        emphasis:
          words:
            - 月額
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l04
        speaker: right
        text: まさに坂道だぜ。無料期間の終了日、サブスク更新、アプリ内購入は必ず確認したいぜ。
        expression: serious
        emphasis:
          words:
            - 終了日
