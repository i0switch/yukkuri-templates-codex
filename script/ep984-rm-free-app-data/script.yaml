    dialogue:
      - id: l01
        speaker: left
        text: 通知も無料の仕組みと関係あるの？
        expression: confused
        emphasis:
          words:
            - 通知
          style: surprise
          se: question
          pause_after_ms: 300
      - id: l02
        speaker: right
        text: あるぜ。通知は、またアプリを開いてもらうための入口なんだぜ。
        expression: calm
        emphasis:
          words:
