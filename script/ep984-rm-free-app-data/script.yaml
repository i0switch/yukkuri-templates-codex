          words:
            - 分けたい
          style: action
          se: success
          pause_after_ms: 300
      - id: l06
        speaker: right
        text: だから通知は必要なものだけ残す。ニュース、ゲーム、買い物系は特に見直すと効くぜ。
        expression: confident
        emphasis:
          words:
            - 必要なものだけ
          style: action
          se: success
          pause_after_ms: 300
