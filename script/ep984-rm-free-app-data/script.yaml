        adoption_reason: 対象シーンの要点に一致し、字幕と重複せず理解を補助する
        imagegen_prompt_ref: s05.main
    dialogue:
      - id: l01
        speaker: left
        text: でも名前や住所を入れてないなら、そこまで問題ないんじゃない？
        expression: smile
        emphasis:
          words:
            - 名前や住所
          style: surprise
          se: question
          pause_after_ms: 300
      - id: l02
        speaker: right
        text: 再フックだぜ。危ないのは、1つの情報より組み合わせなんだぜ。
        expression: serious
        emphasis:
          words:
            - 組み合わせ
          style: danger
          se: reveal
          pause_after_ms: 300
      - id: l03
        speaker: left
        text: 組み合わせ？パズルみたいな話？
        expression: confused
        emphasis:
          words:
            - パズル
          style: surprise
          se: question
          pause_after_ms: 300
      - id: l04
        speaker: right
        text: たとえば興味、生活時間、よく行く場所、端末情報が重なると、その人らしさが見えてくることがあるぜ。
        expression: calm
        emphasis:
          words:
            - 生活時間
            - 場所
          style: punch
          se: warning
          pause_after_ms: 300
      - id: l05
        speaker: left
        text: 匿名のつもりでも、輪郭が出ちゃうのね。
        expression: worried
        emphasis:
          words:
            - 輪郭
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l06
        speaker: right
        text: だから「本名を入れてないから安全」と決めつけないことが大切なんだぜ。
        expression: confident
        emphasis:
          words:
            - 決めつけない
          style: action
          se: success
          pause_after_ms: 300
