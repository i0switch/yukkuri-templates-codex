      - id: l06
        speaker: right
        text: その自信は捨てるんだぜ。試した瞬間にカレンダーへ解約確認日を入れるのが安全だぜ。
        expression: confident
        emphasis:
          words:
            - カレンダー
          style: action
          se: success
          pause_after_ms: 300
