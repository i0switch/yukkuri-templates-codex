    dialogue:
      - id: l01
        speaker: left
        text: 権限って、写真とか位置情報を許可しますかってやつ？
        expression: confused
        emphasis:
          words:
            - 権限
          style: surprise
          se: question
          pause_after_ms: 300
      - id: l02
        speaker: right
        text: そうだぜ。位置情報、連絡先、写真、マイク、通知。このあたりは特に確認したいぜ。
        expression: calm
        emphasis:
          words:
            - 位置情報
            - 連絡先
            - 写真
          style: number
          se: success
          pause_after_ms: 300
      - id: l03
        speaker: left
        text: 電卓アプリが連絡先を欲しがったら、さすがに変よね。
        expression: serious
        emphasis:
          words:
            - 連絡先
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l04
        speaker: right
        text: その違和感が大事だぜ。機能に関係ない権限は、許可する前に一度止まるんだぜ。
        expression: confident
        emphasis:
          words:
            - 一度止まる
          style: action
          se: success
          pause_after_ms: 300
      - id: l05
        speaker: left
        text: 許可ボタンって、急いでると全部はいはい押しちゃうのよね。
        expression: wry
        emphasis:
          words:
            - 全部はいはい
          style: punch
          se: fail
          pause_after_ms: 300
      - id: l06
        speaker: right
        text: そこが罠だぜ。無料アプリほど、最初の許可画面で支払い内容を見ていると思った方がいいぜ。
        expression: serious
        emphasis:
          words:
            - 許可画面
          style: danger
          se: warning
          pause_after_ms: 300
