          話者A「安いのに増えるのだ？」
          話者B「使わない安さは出費ですわ。」
          話者A「マジで？安いは正義じゃない？」
          話者B「使い切れる時だけ正義ね。」
          話者A「安いロス、悲しいのだ。」
          話者B「買う前の判断を作りましょう。」
          話者A「買う前に止まれるかが勝負なのだ。」
          話者B「レジ前では遅いことが多いわ。」
          話者A「棚で止まるのだな。」
          話者B「今日は3つの罠を見るわ。」

