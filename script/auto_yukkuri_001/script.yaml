    role: intro
    scene_goal: 先延ばしの痛みと見る理由を冒頭で作る
    viewer_question: 自分も開始前に止まっているかも
    visual_role: 作業机、未着手メモ、タイマー、スマホ誘惑を抽象化した開始前の重さ
    duration_sec: 30
    main:
      kind: image
      asset: assets/s01_main.png
      asset_requirements:
        imagegen_prompt: |-
          s01: 始める前が一番重い

          話者A「やる気はあるのに、ファイルを開く前にスマホを見ちゃうのよ。」
          話者B「それ、根性不足じゃなくて開始ハードルが高い状態なんだぜ。」
          話者A「開始ハードル？机の前に透明な壁でもあるの？」
          話者B「かなり近い。作業全体を見すぎて、脳が入口で固まるんだ。」
          話者A「レポート完成、部屋片づけ、勉強全部って見ると重いわね。」
          話者B「だから今日は完成じゃなく、2分だけ着手する技に絞るぜ。」
          話者A「2分で人生変わるの？それは怪しくない？」
          話者B「人生は盛りすぎだ。でも着手状態には変えられる。」
          話者A「着手状態って、まだ勝ってないけど逃げてもない感じね。」
          話者B「そうだぜ。まず逃げ道から机へ戻るところを作るんだ。」

          ゆっくり解説動画向けの挿入画像を日本語で生成してください。 この画像は会話内容をそのまま再現するためのものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。 字幕やセリフは別で表示するため、会話等は画像に入れないでください。 キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、UI、概念図、状況説明ビジュアルを中心に構成してください。 画面全体を有効活用し、情報が一目で伝わる、整理された高品質なビジュアルにしてください。 動画の解説画面に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。 Make the aspect ratio 16:9.

          画像の雰囲気は明るい作業机、タイマー、付箋、ノート、チェックリスト、白と水色と黄色の実用図解、前向きで軽い雰囲気で生成してください。下部20%は字幕とキャラクター用に余白を残し、実在ブランド、実在UI、既存キャラクター、実在人物、会話全文を画面内に並べる構成、長文日本語、細かい表、ウォーターマークは入れないでください。
