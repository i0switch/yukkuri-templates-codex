meta:
  episode_id: "ep003-yukkuri-cognitive-traps"
  layout_template: "Scene12"
  character_pair: "RM"
  title: "全員が引っかかる『認知の罠』5選"
  voice_engine: "aquestalk"
bgm:
  title: upbeat step
  source_url: https://dova-s.jp/en/bgm/detail/16211
  file: bgm/track.mp3
  license: DOVA-SYNDROME 標準利用規約
  volume: 0.09
  fade_in_sec: 1.0
  fade_out_sec: 1.5
characters:
  left:
    character: "reimu"
    aquestalk_preset: "AquesTalk10 F1"
  right:
    character: "marisa"
    aquestalk_preset: "AquesTalk10 F2"
scenes:
  - id: s01
    title_text: "見出しだけで判断は危ない"
    main:
      kind: image
      asset: assets/s01_main.png
      caption: "判断の歪み"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          中央に折れ曲がった矢印を1本だけ配置。色は青系のクリーンなトーン。
          16:9 アスペクト比。文字・数字・ロゴ・実在ブランドは一切入れない。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、リアル調、文字、ロゴ、人物の顔、実在ブランド"
        nlm_marker_id: "[FIG:1]"
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: "ゆっくり霊夢です。"
      - id: l02
        speaker: right
        text: "ゆっくり魔理沙だぜ。"
      - id: l03
        speaker: left
        text: "私、見出しだけで内容わかるのよ。"
      - id: l04
        speaker: right
        text: "待て、それが今日の罠だぜ。"
      - id: l05
        speaker: left
        text: "罠ってどういうこと？"
      - id: l06
        speaker: right
        text: "自分で気づけない判断の歪みだ。"

  - id: s02
    title_text: "全員が引っかかる罠が5つある"
    main:
      kind: image
      asset: assets/s02_main.png
      caption: "5つの罠"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          中央に脳の輪郭アイコン、周囲に5つのドットを等間隔に配置。
          色は青緑系のクリーンなトーン。16:9 アスペクト比。
          文字・数字・ロゴ・実在ブランドは一切入れない。医学イラスト風にしない。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、医学リアル調、文字、ロゴ、解剖図、実在ブランド"
        nlm_marker_id: "[SLIDE:1]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "結論先に言うぜ、全員引っかかる。"
      - id: l02
        speaker: left
        text: "全員？私も？"
      - id: l03
        speaker: right
        text: "1日に何十回も判断ミスする目安だぜ。"
      - id: l04
        speaker: left
        text: "ええっ、それマジで！？"
      - id: l05
        speaker: right
        text: "知ってても避けにくい認知の罠だ。"
      - id: l06
        speaker: left
        text: "じゃあ気をつければいいでしょ。"
      - id: l07
        speaker: right
        text: "それが一番引っかかる発想なんだぜ。"
      - id: l08
        speaker: left
        text: "私、もう信じる気持ちが揺らぐわ。"

  - id: s03
    title_text: "信じたいから集めるってこと？"
    main:
      kind: image
      asset: assets/s03_main.png
      caption: "確証バイアス"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          手とふるいのアイコン、青い玉のみがふるいを通過し、赤い玉は弾かれる図。
          色は青系のクリーンなトーン。16:9 アスペクト比。
          文字・数字・ロゴ・実在ブランドは一切入れない。手の描写は抽象。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、リアル調、文字、ロゴ、人物の顔、実在ブランド"
        nlm_marker_id: "[INFO:1]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "1つ目は確証バイアスだぜ。"
      - id: l02
        speaker: left
        text: "名前むずかしいわね。"
      - id: l03
        speaker: right
        text: "信じたい情報だけ集める癖のことだ。"
      - id: l04
        speaker: left
        text: "それ卑怯じゃない？"
      - id: l05
        speaker: right
        text: "スマホもおすすめで似た記事ばかり出すぜ。"
      - id: l06
        speaker: left
        text: "あ、私のホーム画面それかも…"
      - id: l07
        speaker: right
        text: "集めた瞬間に答えが偏ってるんだぜ。"
      - id: l08
        speaker: left
        text: "集めるほど自信つくのに罠なのね。"
      - id: l09
        speaker: right
        text: "自信ほど、実は怪しいんだ。"

  - id: s04
    title_text: "反対意見も1つ見ると変わる"
    main:
      kind: image
      asset: assets/s04_main.png
      caption: "反対1個ルール"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          左右に向かい合う吹き出しアイコン、片方の中に小さな逆三角アイコン1つ。
          色は緑強調、白背景。16:9 アスペクト比。
          文字・数字・ロゴ・実在SNS UIは一切入れない。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、文字、ロゴ、実在SNS UI、人物の顔"
        nlm_marker_id: "[INFO:2]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "対処はシンプルに3手順だぜ。"
      - id: l02
        speaker: left
        text: "手順？気合じゃないの？"
      - id: l03
        speaker: right
        text: "反対意見を1つだけ読むルールだ。"
      - id: l04
        speaker: left
        text: "読みたくないわよ、そういうの。"
      - id: l05
        speaker: right
        text: "1個でいい、1個だけだぜ。"
      - id: l06
        speaker: left
        text: "1個なら…まあいけるかしら。"
      - id: l07
        speaker: right
        text: "次に、一晩寝てから決める。"
      - id: l08
        speaker: left
        text: "それ昔ばあちゃんも言ってた。"
      - id: l09
        speaker: right
        text: "仕組みで防ぐと迷いも減るぜ。"

  - id: s05
    title_text: "漢字ずっと見ると変になるやつ"
    main:
      kind: image
      asset: assets/s05_main.png
      caption: "ゲシュタルト崩壊"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          中央に文字風の幾何学図形（実在の漢字ではなく抽象的な四角と縦横線の組み合わせ）が分解する様子、周辺に分解線。
          色は灰青系のクリーンなトーン。16:9 アスペクト比。
          実在文字・数字・ロゴは一切入れない。あくまで抽象的な図形。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、実在の漢字、文字、ロゴ、人物の顔"
        nlm_marker_id: "[INFO:3]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "2つ目はゲシュタルト崩壊だぜ。"
      - id: l02
        speaker: left
        text: "あ、これ知ってるわ。"
      - id: l03
        speaker: right
        text: "同じ字を見すぎて変に見える現象だ。"
      - id: l04
        speaker: left
        text: "漢字30秒見たら、歪んで見えたわ。"
      - id: l05
        speaker: right
        text: "でも文字だけじゃないんだぜ。"
      - id: l06
        speaker: left
        text: "「いきもの」で書いたら戻ったわ。"
      - id: l07
        speaker: right
        text: "慣れた画像や作業でも同じ崩壊だぜ。"
      - id: l08
        speaker: left
        text: "漢字より仕事のほうがやばいわね。"

  - id: s06
    title_text: "慣れすぎると見えなくなる罠"
    main:
      kind: image
      asset: assets/s06_main.png
      caption: "見落とし"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          3列のチェック欄アイコン、各列に丸印が並ぶが、3列目だけ1つ空白マーク。
          色は緑とグレーのクリーンなトーン。16:9 アスペクト比。
          文字・数字・ロゴ・実在書類風は一切入れない。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、実在書類、文字、ロゴ、英語ラベル"
        nlm_marker_id: "[INFO:4]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "慣れた仕事は実はリスクが高いぜ。"
      - id: l02
        speaker: left
        text: "え、毎日やる方が見落とすの？"
      - id: l03
        speaker: right
        text: "3周目で抜けるって調査の例があるんだ。"
      - id: l04
        speaker: left
        text: "3周目！？逆じゃないの？"
      - id: l05
        speaker: right
        text: "慣れで脳が省エネしちまうんだ。"
      - id: l06
        speaker: left
        text: "それ毎日のレシートも危ないかも。"
      - id: l07
        speaker: right
        text: "他人にチェックを頼むだけで防げるぜ。"
      - id: l08
        speaker: left
        text: "自分でやり直すんじゃなくていいのね。"
      - id: l09
        speaker: right
        text: "別の目を入れる、これがコツなんだ。"

  - id: s07
    title_text: "自分の名前だけ聞こえる現象"
    main:
      kind: image
      asset: assets/s07_main.png
      caption: "選択的注意"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          複数の人影シルエットが点在し、中央から黄色の波紋が広がる構図。
          色は青背景に黄アクセント。16:9 アスペクト比。
          文字・数字・ロゴ・実在カフェロゴは一切入れない。人の顔は描かない（シルエットのみ）。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、人の顔、文字、ロゴ、実在カフェ風"
        nlm_marker_id: "[INFO:5]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "ここまで2つ、3つ目はパーティだぜ。"
      - id: l02
        speaker: left
        text: "パーティ？急に話変わったわね。"
      - id: l03
        speaker: right
        text: "カフェ系のお店で名前を拾う現象だ。"
      - id: l04
        speaker: left
        text: "あ、私もよくあるわ、それ。"
      - id: l05
        speaker: right
        text: "カクテルパーティ効果と呼ばれてる。"
      - id: l06
        speaker: left
        text: "集中力が高い証拠じゃないの？"
      - id: l07
        speaker: right
        text: "違う、勝手に脳が拾ってるだけだぜ。"
      - id: l08
        speaker: left
        text: "えっ、私の能力じゃないの？"
      - id: l09
        speaker: right
        text: "逆にもっと大事な話を聞き逃すんだ。"
      - id: l10
        speaker: left
        text: "それ困るわね、なんで？"

  - id: s08
    title_text: "重要な話ほど耳に入らないとき"
    main:
      kind: image
      asset: assets/s08_main.png
      caption: "気づきの偏り"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          机と椅子のアイコン、人影シルエット2、片方にだけ電球アイコン1。
          色はグレーに黄アクセント。16:9 アスペクト比。
          文字・数字・ロゴ・実在オフィス風は一切入れない。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、人の顔、文字、ロゴ、実在オフィス"
        nlm_marker_id: "[INFO:6]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "重要な話ほど聞き逃しやすいんだぜ。"
      - id: l02
        speaker: left
        text: "そんなことないでしょ、目立つもの。"
      - id: l03
        speaker: right
        text: "周りで自分の話題が出ると拾うだろ？"
      - id: l04
        speaker: left
        text: "拾うわ、なんでわかるの。"
      - id: l05
        speaker: right
        text: "その間、本来の議論を見失うんだぜ。"
      - id: l06
        speaker: left
        text: "あ、会議で聞き逃したことある…"
      - id: l07
        speaker: right
        text: "メモを事前に用意するだけで防げる。"
      - id: l08
        speaker: left
        text: "走り書きでもいいの？"
      - id: l09
        speaker: right
        text: "名前と論点1行ずつあれば十分だ。"

  - id: s09
    title_text: "占いが当たる気がする理由"
    main:
      kind: image
      asset: assets/s09_main.png
      caption: "フォアラー効果"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          人影シルエット1つが鏡の前に立ち、鏡の中に抽象的な星マーク。
          色は紫青系のクリーンなトーン。16:9 アスペクト比。
          文字・数字・ロゴ・実在占いブランド・実在星座図は一切入れない。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、人の顔、文字、ロゴ、実在ブランド、実在星座図"
        nlm_marker_id: "[INFO:7]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "4つ目は占いと診断の罠だぜ。"
      - id: l02
        speaker: left
        text: "占いって全部偶然じゃないの？"
      - id: l03
        speaker: right
        text: "誰でも当てはまる文章で頷かせるんだ。"
      - id: l04
        speaker: left
        text: "誰でも？私のは当たってるけど。"
      - id: l05
        speaker: right
        text: "「時々悩む」とか書かれて頷いただろ。"
      - id: l06
        speaker: left
        text: "あ、毎週それ書いてあるかも…"
      - id: l07
        speaker: right
        text: "全人類に当てはまる文章だぜ。"
      - id: l08
        speaker: left
        text: "そういえば占い師、私の名前外してた。"
      - id: l09
        speaker: right
        text: "フォアラー効果と呼ばれるんだぜ。"
      - id: l10
        speaker: left
        text: "なるほどね、覚えとくわ。"

  - id: s10
    title_text: "性格診断と上司の評価"
    main:
      kind: image
      asset: assets/s10_main.png
      caption: "曖昧コメント"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          書類アイコン3つを横並びに配置、それぞれに空白の枠記号。
          色はグレー基調のクリーンなトーン。16:9 アスペクト比。
          文字・数字・ロゴ・実在書式は一切入れない。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、実在書式、文字、ロゴ、英語ラベル"
        nlm_marker_id: "[INFO:8]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "占い以外でも同じ罠が起きるぜ。"
      - id: l02
        speaker: left
        text: "どこで？仕事？"
      - id: l03
        speaker: right
        text: "評価面談で曖昧コメント受ける時だ。"
      - id: l04
        speaker: left
        text: "ああ、「期待してます」みたいな？"
      - id: l05
        speaker: right
        text: "それを自分の評価だと信じちまう。"
      - id: l06
        speaker: left
        text: "ガチで信じちゃダメ？"
      - id: l07
        speaker: right
        text: "具体例を必ず聞くのが対処だぜ。"
      - id: l08
        speaker: left
        text: "「いつのどの場面で？」って？"
      - id: l09
        speaker: right
        text: "そう、3回聞けば曖昧さが消えるぜ。"

  - id: s11
    title_text: "直前に見た情報で判断は歪む"
    main:
      kind: image
      asset: assets/s11_main.png
      caption: "プライミング効果"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          矢印1本が広告風アイコン（四角の中に小さな図形）から買い物カゴアイコンへ繋がる構図。
          色は青系のクリーンなトーン。16:9 アスペクト比。
          文字・数字・ロゴ・実在ECブランドは一切入れない。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、実在EC UI、文字、ロゴ、英語ラベル"
        nlm_marker_id: "[INFO:9]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "最後はプライミング効果の罠だぜ。"
      - id: l02
        speaker: left
        text: "なにそれ、新しい言葉だわ。"
      - id: l03
        speaker: right
        text: "直前に見た情報で次の判断が歪む。"
      - id: l04
        speaker: left
        text: "私の判断は独立してるわよ！"
      - id: l05
        speaker: right
        text: "スーパーで青い水と青い洗剤と青い飴。"
      - id: l06
        speaker: left
        text: "…全部カゴに入ってたわ。"
      - id: l07
        speaker: right
        text: "直前に青い広告見ただけで揃うんだぜ。"
      - id: l08
        speaker: left
        text: "広告のせいにしないわ、私の意思よ！"
      - id: l09
        speaker: right
        text: "直前30秒を疑うだけで変わるぜ。"
      - id: l10
        speaker: left
        text: "30秒チェック、入れてみるわ。"

  - id: s12
    title_text: "直感じゃなく1個ずらす"
    main:
      kind: image
      asset: assets/s12_main.png
      caption: "1個選ぶ行動"
      asset_requirements:
        imagegen_prompt: |
          フラットなアイコンスタイルのイラスト、白背景。
          5つの円形アイコンを横一列に配置、そのうち1つだけに緑の丸印で囲む。
          色は緑強調、他は薄グレー。16:9 アスペクト比。
          文字・数字・ロゴ・実在UIは一切入れない。
        style: "フラット・アイコン系"
        aspect: "16:9"
        negative: "写真風、実在UI、文字、ロゴ、英語ラベル"
        nlm_marker_id: "[INFO:10]"
    sub: null
    dialogue:
      - id: l01
        speaker: right
        text: "5つの罠、まとめるぜ。"
      - id: l02
        speaker: left
        text: "結局気合で防ぐの？"
      - id: l03
        speaker: right
        text: "違う、仕組みで1個ずらせばいい。"
      - id: l04
        speaker: left
        text: "1個ずらすってどうやるの？"
      - id: l05
        speaker: right
        text: "まず今日の判断を1つ確認しろ。"
      - id: l06
        speaker: left
        text: "1つ確認…直前の買い物とかね。"
      - id: l07
        speaker: right
        text: "そして気になる罠を1つ選ぶんだ。"
      - id: l08
        speaker: left
        text: "私はプライミング選ぶわ、ヤバいから。"
      - id: l09
        speaker: right
        text: "最後にスマホのメモへ保存しておくぜ。"
      - id: l10
        speaker: left
        text: "翌日もう一回見直すわね。"
      - id: l11
        speaker: right
        text: "その3手なら、罠が1つ減るんだ。"
      - id: l12
        speaker: right
        text: "今日の動画はここまでだぜ。"
      - id: l13
        speaker: left
        text: "最後までご視聴ありがとう。"
      - id: l14
