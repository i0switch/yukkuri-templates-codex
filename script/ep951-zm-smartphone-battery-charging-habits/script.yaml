        adoption_reason: 常時100%充電が80%充電より寿命20〜30%短いという数字を印象づける図解
        imagegen_prompt: |-
          s02: 「100%まで入れる」が電池を壊す

          ずんだもん「でも100%まで入れないと途中で電池切れが怖いのだ」
          めたん「気持ちはわかりますわ。でもリチウムイオン電池は100%の状態が一番ストレスがかかっているのです」
          ずんだもん「ストレス？電池がストレスを受けるの？」
          めたん「電池の中では常に化学反応が起きていますの。100%は電圧が最高になる状態で、その負荷が積み重なって劣化していくのですわ」
          ずんだもん「毎日100%にしてたぼくは、毎日ダメージを与えてたってこと……？」
          めたん「特に問題なのは、充電が終わってもコンセントに挿したまま放置する状態ですの。研究によると常時100%充電の繰り返しは、80%充電と比べてバッテリー寿命が20〜30%縮む可能性があるのです」
          ずんだもん「20〜30%！？それは普通にヤバいのだ！！」
          めたん「だから「毎日100%」をやめるだけで、寿命がかなり変わりますわ」
          ずんだもん「つまり、ゴールを100%から80%に変えればいいってこと？」
          めたん「まさにその通りですわ。次はその具体的な方法を見ていきましょう」

