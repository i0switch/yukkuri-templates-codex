  - id: s05
    role: body
    scene_goal: 過放電の害と20%ルールを体感させる
    viewer_question: 使い切ってリセットすれば状態が良くなるのでは？
    visual_role: 過放電のダメージと20%充電開始ルールをビジュアルで示す
    scene_format: 失敗エピソード型
    main:
      kind: image
      asset: assets/s05_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 過放電の仕組みとバッテリー劣化への影響、20%ルールを図解
        adoption_reason: 0%まで使い切る習慣が容量急減につながる仕組みを視覚化する
        imagegen_prompt: |-
          s05: 0%まで使い切ると電池が死ぬ

          ずんだもん「じゃあ80%以上はダメとして、下はどこまでOKなのだ？」
          めたん「20%が目安ですわ。それより下に落とし続けると過放電という状態になるのです」
          ずんだもん「過放電……具体的にどうなるの？」
          めたん「電圧が下がりすぎると電池の内部素材が傷むのですわ。最悪の場合、充電しても起動できなくなるケースもありますの」
          ずんだもん「え、完全に死ぬってこと！？」
          めたん「そこまでは極端なケースですが、「0%まで使い切る」を繰り返すと確実に容量が減っていきますわ」
          ずんだもん「ぼく、電池残量1%まで粘るタイプなのだ……これが原因だったのか」
          めたん「その習慣が早期劣化の一因になっている可能性は十分ありますわ」
