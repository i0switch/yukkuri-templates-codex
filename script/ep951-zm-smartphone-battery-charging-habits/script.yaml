        adoption_reason: 毎晩100%充電しているが電池が減るという視聴者の共感を引き出す導入ビジュアル
        imagegen_prompt: |-
          s01: 毎日100%充電が当たり前の罠

          ずんだもん「ねえめたん、ぼくのスマホ最近電池の減りが早い気がするのだ」
          めたん「買ってどのくらい経ちますの？」
          ずんだもん「2年ちょっとかな。毎晩100%まで充電してから寝てるのに、朝には減ってるのだ」
          めたん「あらあら。その充電習慣、実はバッテリーを傷めている可能性がありますわよ」
          ずんだもん「え？ちゃんと満タンにしてるのに何がダメなのだ？」
          めたん「100%まで入れること自体が、むしろ問題なのです」
          ずんだもん「え、マジで？ずっとそれが正解だと思ってたのだ！」
          めたん「多くの方がそう信じていますわ。でも実は逆効果なのです」
          ずんだもん「じゃあぼくはずっと間違った充電をしてたってことなのだ？」
          めたん「今日から変えれば、まだ間に合いますわ。一緒に確認していきましょう」

          ゆっくり解説動画向けの挿入画像を日本語で生成してください。この画像は会話内容をそのまま再現するためのものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。字幕やセリフは別で表示するため、会話等は画像に入れないでください。キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、UI、概念図、状況説明ビジュアルを中心に構成してください。画面全体を有効活用し、情報が一目で伝わる、整理された高品質なビジュアルにしてください。YouTubeの解説動画に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。Make the aspect ratio 16:9.

          画像の雰囲気は スマートフォン・充電ケーブル・バッテリーアイコン・クリーンなテクノロジー図解・青とグリーンを基調にした現代的インフォグラフィック で生成してください。
          【禁止追記】ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし、細かい文字なし、英語UIなし
