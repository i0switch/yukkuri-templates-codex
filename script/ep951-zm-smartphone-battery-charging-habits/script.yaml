        adoption_reason: メモリー効果の誤解を解消し、現代スマホ電池の特性をわかりやすく整理する図解
        imagegen_prompt: |-
          s03: リチウム電池の3つの弱点

          ずんだもん「ちょっと待って。ぼく昔「電池は使い切ってから充電しなさい」って聞いたのだ。それは間違い？」
          めたん「それはニッケル水素電池の時代の話ですわ。メモリー効果という現象があった古い電池向けのアドバイスなのです」
          ずんだもん「今のスマホは違うのか」
          めたん「リチウムイオン電池にはメモリー効果がほぼないのです。使い切る必要は全くない、むしろ逆効果ですわ」
          ずんだもん「じゃあ今のスマホが嫌いなのは何なのだ？」
          めたん「3つですわ。高すぎる電圧つまり100%状態、低すぎる電圧つまり0%状態、そして熱ですの」
          ずんだもん「高くても低くてもダメで、熱もダメ……なんか繊細な子なのだ」
          めたん「言い換えると、20〜80%の間で使って熱を避ければいい、それだけですわ」
          ずんだもん「20から80、あと熱NG。これだけ覚えればいいのだ？」
          めたん「そうですわ。順番に詳しく見ていきましょう」

