        adoption_reason: 「最適化されたバッテリー充電」と各OSの設定パスを図解でわかりやすく整理する
        imagegen_prompt: |-
          s04: 充電は80%でやめるだけでいい

          ずんだもん「80%で充電やめるって、いちいち自分で止めるの？それ絶対忘れるのだ」
          めたん「安心してください。iPhoneにもAndroidにも、自動で止めてくれる設定がありますわ」
          ずんだもん「え、そんな設定があったの！？知らなかったのだ！」
          めたん「iPhoneは「設定」→「バッテリー」→「バッテリーの状態と充電」から「最適化されたバッテリー充電」をオンにするのです」
          ずんだもん「最適化されたバッテリー充電、かっこいい名前なのだ。それで80%で止まるの？」
          めたん「正確には、80%で一度止まって出発時間に合わせて上げようとする機能ですわ。iOSが使用パターンを学習するのです。iOS17以降なら「充電上限」を80%に固定することもできますの」
          ずんだもん「Androidは？」
          めたん「機種によりますが、Samsungは「設定」→「デバイスケア」→「バッテリー」→「バッテリー保護」でオンにできますわ。Pixelは「設定」→「バッテリー」→「アダプティブ充電」ですの」
          ずんだもん「つまりどのスマホにも何かしら設定があるってことなのだ」
          めたん「そうですわ。まず自分のスマホで探してオンにしてみてくださいな」

