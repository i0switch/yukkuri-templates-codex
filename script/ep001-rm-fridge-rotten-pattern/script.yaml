meta:
  id: ep001-rm-fridge-rotten-pattern
  title: 冷蔵庫で食材が早く腐る人の共通点
  layout_template: Scene19
  pair: RM
  fps: 30
  width: 1280
  height: 720
  audience: 一人暮らしから家族世帯まで自炊する人全般
  tone: フランクだが失敗回避を短く刺す
  bgm_mood: 落ち着いた家事系BGM、明るすぎず邪魔しない
  voice_engine: aquestalk
  target_duration_sec: 180
  image_style: clean explainer flat illustrations, thick lines, generous whitespace, light pastel palette
characters:
  left:
    character: reimu
    aquestalk_preset: AquesTalk10 F1
    speaking_style: 視聴者代表。雑な解決策、勘違い、ツッコミ、怖がりを担当。
  right:
    character: marisa
    aquestalk_preset: AquesTalk10 F2
    speaking_style: 解説役。短く訂正し、結論で「だぜ」を混ぜる。
scenes:
  - id: s01
    role: intro
    title_text: 冷蔵庫信仰は半分ウソ
    scene_goal: 「冷蔵庫に入れれば腐らない」は誤解と理解させる
    scene_format: 誤解訂正型
    viewer_question: 冷蔵庫に入れれば食材は本当に腐らないのか
    viewer_misunderstanding: 冷蔵庫に入れれば全部安全、と思い込んでいる
    boke_or_reaction: 霊夢が「入れたら勝ち」と雑に決めつける
    reaction_level: L3
    number_or_example: 半分ウソという比較表現で誤解の輪郭を出す
    mini_punchline: 入れ方で寿命が変わる
    visual_role: mainは「冷蔵庫に入れたのに傷んだ食材」のショックを伝える図解
    main:
      kind: text
      text: 冷蔵庫に入れた=安全、は半分ウソ
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 「冷蔵庫信仰は半分ウソ」のショックを伝えるオープニング図解
        insert_timing: シーン冒頭
        asset_path: assets/s01_main.png
        imagegen_prompt: |-
          【用途】s01 main枠。視聴者に「冷蔵庫＝安全」が誤解だと一瞬で理解させる導入図解。
          【主題】中央に閉じた冷蔵庫アイコン、扉から「半分ウソ」を示す吹き出し風ラベル。
          【構図】中央に冷蔵庫アイコン大、上部に小さく傷みかけ食材のシルエット、左右下部は余白。
          【テンプレート枠】Scene19 main枠（ホワイトボード内）。タイトル枠と下部机、左右キャラ位置に重要物を置かない。
          【色】白〜オフホワイト背景、主色は淡い水色、注意は控えめな赤、影は薄く。
          【情報量】1枚1メッセージ。画像内文字は0〜6文字以内。
          【絵柄】太線フラット図解、角丸、余白多め、ゆっくり解説動画向け。
          【禁止】実在ブランド冷蔵庫、ロゴ、人物写真、既存キャラ、英語UI、細かい文字、密な表。
        audit_points:
          - 1枚1メッセージ
          - Scene19のmain（ホワイトボード内）に収まる
          - キャラ位置と机の上部を覆わない
    dialogue:
      - id: l01
        speaker: left
        text: あれ？昨日の鍋もう傷んでる
        expression: halfOpen
        pre_pause_sec: 0.12
        post_pause_sec: 0.24
      - id: l02
        speaker: right
        text: それ冷蔵庫入れたか？
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l03
        speaker: left
