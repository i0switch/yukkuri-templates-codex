    boke_or_reaction: 霊夢が「ぎゅう詰め最強」と発想
    reaction_level: L2
    number_or_example: 7割詰めの目安、奥と手前の温度差
    mini_punchline: 奥は冷たく手前はぬるい
    visual_role: mainは「詰め込みすぎで冷気が止まる」を矢印で示す断面図
    main:
      kind: text
      text: 詰めるほど冷えない／7割詰めが目安
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 詰め込みすぎが冷気の流れを止める仕組みを断面図で示す
        insert_timing: シーン冒頭
        asset_path: assets/s02_main.png
        imagegen_prompt: |-
          【用途】s02 main枠。詰め込みすぎが冷気循環を止め、温度ムラを生む仕組みを直感的に伝える。
          【主題】冷蔵庫断面、上部から下に向かう青い冷気矢印、満杯の棚で矢印が詰まる様子。
          【構図】中央に断面、矢印は青で上→下、ブロックされた部分に小さな「×」マーク。下部は7割詰めの正解例を小さく対比。
          【テンプレート枠】Scene19 main枠。タイトル領域と机、左右キャラ位置を空ける。
          【色】白背景、冷気=水色、ブロック=薄い赤、棚=ライトグレー。
          【情報量】1枚1メッセージ。画像内文字は「7割」など6文字以内。
          【絵柄】太線フラット図解、矢印は太く、影は薄く。
          【禁止】実在ブランド、ロゴ、写真、既存キャラ、英語UI、細かい文字。
        audit_points:
          - 矢印で冷気の流れが直感的に分かる
          - Scene19のmain枠内に収まる
          - 棚と矢印が机ライン上部を侵食しない
    dialogue:
      - id: l01
        speaker: left
        text: ぎゅうぎゅう詰めなら冷えるよね
        expression: smile
        pre_pause_sec: 0.12
        post_pause_sec: 0.24
      - id: l02
        speaker: right
        text: 逆だぜ、冷気が回らない
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l03
        speaker: left
        text: えっ、詰めるほど涼しいのに
        expression: halfOpen
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l04
        speaker: right
