          【用途】s03 main枠。ドアポケに置いた卵牛乳が開閉で温度ストレスを受ける様子を伝える。
          【主題】冷蔵庫の扉が開いた状態、ドアポケの卵パックと牛乳に赤い温度上昇矢印。
          【構図】左に開いた扉、ドアポケに食材、矢印は外から内へ。右に「奥棚へ移す」の正解アイコン。
          【テンプレート枠】Scene19 main枠。タイトル枠・机・キャラ位置を避ける。
          【色】白背景、扉=ライトグレー、温度上昇=薄い赤、正解=淡い緑。
