        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l04
        speaker: right
        text: 入れ方を間違えたんだぜ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.24
      - id: l05
        speaker: left
        text: えっ、入れたら勝ちじゃん
        expression: halfOpen
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l06
        speaker: right
        text: 半分ウソだ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.20
      - id: l07
        speaker: left
        text: 待って、冷蔵=安全じゃない？
        expression: halfOpen
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l08
        speaker: right
        text: 入れ方で寿命が変わる
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l09
        speaker: left
