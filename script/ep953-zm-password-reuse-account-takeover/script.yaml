    scene_goal: 具体行動で終える
    viewer_question: 今すぐ何をすればよいか
    reference_beat: まとめ再フック型
    visual_role: 今日やる三つのチェック「メールを変える」「使い回しを分ける」「2段階認証」を大きく並べた図解
    scene_format: まとめ再フック型
    duration_sec: 30
    main:
      kind: image
      asset: assets/s10_main.png
      asset_requirements:
        imagegen_prompt: |-
          s10: 今日の三つだけやる

          話者A「同じパスワードは連鎖するのだな。」
          話者B「まずメール、次に決済を守りますわ。」
          話者A「長く別々、覚えず管理なのだ。」
          話者B「重要サービスには2段階認証ですの。」
          話者A「今日やる三つは？」
          話者B「メールを変え、使い回しを分け、認証を入れる。」
          話者A「一つでも連鎖を切るのだ。」
          話者B「放置より今日一つが強いですわ。」
          話者A「ずんだ餅パスワードは卒業なのだ。」
          話者B「今日一つ変えれば前進ですわ。」
          話者A「連鎖を一つ切るのだ。」

          ゆっくり解説動画向けの挿入画像を日本語で生成してください。 この画像は会話内容をそのまま再現するためのものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。 字幕やセリフは別で表示するため、会話等は画像に入れないでください。 キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、UI、概念図、状況説明ビジュアルを中心に構成してください。 画面全体を有効活用し、情報が一目で伝わる、整理された高品質なビジュアルにしてください。 YouTubeの解説動画に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。 実在ブランド、実在UIの完全模写、実在人物、既存キャラクター、ウォーターマーク、長文テキスト、細かすぎる表は入れないでください。 画面下部20%は字幕とキャラクターが重なるため、重要情報を置かず余白を残してください。 Make the aspect ratio 16:9.
          画像の雰囲気は「ログイン画面の抽象UI、鍵、金庫、2段階認証、警告アイコン、モノクロとミント差し色の実用図解」で生成してください。このシーンで見せたいものは「今日やる三つのチェック「メールを変える」「使い回しを分ける」「2段階認証」を大きく並べた図解」。余白のある横長構図で、動画のメインコンテンツ枠に入れて見やすい一枚にしてください。
