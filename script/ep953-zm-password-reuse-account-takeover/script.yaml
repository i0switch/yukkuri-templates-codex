        imagegen_prompt: |-
          s01: 一つ漏れると全部開く

          話者A「パスワードって、サイトごとに変えるの面倒なのだ。」
          話者B「その面倒くささで、アカウントがまとめて乗っ取られますわ。」
          話者A「一つ漏れただけでそんなに広がるのだ？」
          話者B「同じ組み合わせは別サイトでも試されますの。」
          話者A「鍵一本で全部回る感じなのだな。」
          話者B「だから使い回しは連鎖しますわ。」
          話者A「覚えやすさで選んでたのだ。」
          話者B「今日は重要順に守りますわ。」
          話者A「まず避難訓練なのだ。」
          話者B「同じ鍵を減らすのが第一ですわ。」
          話者B「特にメールと決済は同じ鍵にせず、まず重要アカウントだけ分けますわ。」
          話者A「そこが同じだと、一つの漏えいから被害が広がるのだな。」
          話者A「まず一つ分けるのだ。」

