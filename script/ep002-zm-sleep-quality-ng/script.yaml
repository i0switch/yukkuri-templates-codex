meta:
  id: ep002-zm-sleep-quality-ng
  title: 夜更かし民の睡眠の質を爆下げするNG行動
  layout_template: Scene15
  pair: ZM
  fps: 30
  width: 1280
  height: 720
  audience: 寝つきが悪い・朝のだるさが取れない夜更かし民
  tone: 静かで落ち着いた夜の解説、煽らずに刺す
  bgm_mood: 夜寄りの落ち着いたアンビエント
  voice_engine: voicevox
  target_duration_sec: 180
  image_style: night-themed flat illustrations, deep blue palette, soft glow,
    generous whitespace
characters:
  left:
    character: zundamon
    voicevox_speaker_id: 3
    speaking_style: 視聴者代表。浅い理解、油断、ボケを担当。語尾「のだ／なのだ」を控えめに混ぜる。
  right:
    character: metan
    voicevox_speaker_id: 2
    speaking_style: 解説役。冷静に刺し、現実的な対処に落とす。「のよ／わ」を散らす。
scenes:
  - id: s01
    role: intro
    title_text: 8時間寝ても疲れ取れない理由
    scene_goal: 寝てる時間ではなく睡眠の質が問題と理解させる
    scene_format: 損失型
    viewer_question: 8時間寝ているのに疲れが取れないのはなぜか
    viewer_misunderstanding: 量さえ取れれば回復する、と思っている
    boke_or_reaction: ずんだもんが「8時間信仰」で油断
    reaction_level: L3
    number_or_example: 8時間寝ても疲れが残る現実
    mini_punchline: 量より質、夜の行動で深さが変わる
    visual_role: mainは「8時間寝ても疲れた人」のシルエットで損失感を出す
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 8時間寝ても疲れ取れない理由
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 「8時間寝ても疲れが取れない」損失感を一瞬で伝える導入
        insert_timing: シーン冒頭
        asset_path: assets/s01_main.png
        imagegen_prompt: |-
          【用途】s01 main枠。長く寝ても疲れが取れない夜更かし民の損失感を視覚化する。
          【主題】時計の8時間を表す円グラフ風、その横にぐったりしたシルエットの人物、上に「？」記号。
          【構図】中央に円、右にシルエット、上部に小さく「？」。下部字幕帯と左右キャラ位置は余白。
          【テンプレート枠】Scene15 main枠（中央夜空エリア）。左上タイトル金枠と下字幕金枠を覆わない。
          【色】夜空の濃紺背景、主役は淡い水色〜白、注意=控えめなオレンジ。
          【情報量】1枚1メッセージ。画像内文字は数字「8h」など3文字以内。
          【絵柄】夜寄りフラット図解、太線、ソフトグロー、影は薄く。
          【禁止】実在ブランド、ロゴ、人物写真、既存キャラ、英語UI、密な文字。
          【トーン】ゆっくり解説動画／ずんだもん解説動画向けの落ち着いたフラット解説図解トーン。
          【禁止追記】ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし、細かい文字なし、英語UIなし。
        audit_points:
          - 1枚1メッセージ
          - Scene15のmain（中央夜空）に収まる
          - 左上タイトル金枠と下字幕金枠を覆わない
    dialogue:
      - id: l01
        speaker: left
        text: 8時間寝てるのに眠いのだ
        expression: halfOpen
        pre_pause_sec: 0.12
        post_pause_sec: 0.24
      - id: l02
        speaker: right
        text: 量より質が落ちてるのよ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l03
        speaker: left
        text: 量さえあれば余裕じゃないの？
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l04
        speaker: right
        text: 半分ハズレね
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.20
      - id: l05
        speaker: left
        text: マジで？8時間信仰崩壊なのだ
        expression: halfOpen
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l06
        speaker: right
        text: 夜の行動で深さが変わるわ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l07
        speaker: left
        text: 行動って…寝るだけじゃん
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l08
        speaker: right
        text: そこにNG行動が潜むのよ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l09
        speaker: left
        text: 完全に油断してたのだ
        expression: halfOpen
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l10
        speaker: right
        text: 今日その共通点を潰しましょ
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.30
  - id: s02
    role: body
    title_text: 寝る前スマホはOKじゃない
    scene_goal: ブルーライトより脳の興奮が問題と訂正する
    scene_format: 誤解訂正型
    viewer_question: 寝る前スマホはブルーライトカットすればOKか
    viewer_misunderstanding: ブルーライト対策だけしていれば大丈夫、と勘違い
    boke_or_reaction: ずんだもんが「余裕なのだ」と油断
    reaction_level: L3
    number_or_example: 寝つきが10分以上ズレる、年間60時間損
    mini_punchline: 興奮の自覚なく睡眠時間が削れる
    visual_role: mainは「スマホで脳が興奮している」を比喩図で示す
    main:
      kind: image
      asset: assets/s02_main.png
      caption: 寝る前スマホはOKじゃない
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: スマホで脳が興奮している状態を一目で理解させる
        insert_timing: シーン冒頭
        asset_path: assets/s02_main.png
        imagegen_prompt: |-
          【用途】s02 main枠。寝る前のスマホで脳が興奮する仕組みを比喩で伝える。
          【主題】枕元のスマホ画面から放射状の刺激線、上に脳のアイコン、脳の周りに小さな雷マーク。
          【構図】中央にスマホ、上に脳、放射線で繋ぐ。下部字幕帯と左右キャラ位置は余白。
          【テンプレート枠】Scene15 main枠（中央夜空）。左上タイトル金枠と下字幕金枠を覆わない。
          【色】濃紺背景、スマホ画面=淡い水色グロー、脳=ソフトホワイト、雷=控えめなオレンジ。
          【情報量】1枚1メッセージ。画像内文字なし。
          【絵柄】夜寄りフラット、太線、グローは控えめ。
          【禁止】実在アプリUI、ブランドロゴ、人物写真、既存キャラ、英語UI、細かい文字。
          【トーン】ゆっくり解説動画／ずんだもん解説動画向けの落ち着いたフラット解説図解トーン。
          【禁止追記】ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし、細かい文字なし、英語UIなし。
        audit_points:
          - スマホ→脳の刺激ラインが直感的
          - main枠内に収まる
          - 字幕金枠とタイトル金枠を侵食しない
    dialogue:
      - id: l01
        speaker: left
        text: 寝る前スマホは余裕なのだ
        expression: smile
        pre_pause_sec: 0.12
        post_pause_sec: 0.24
      - id: l02
        speaker: right
        text: ブルーライトより別が問題よ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l03
        speaker: left
        text: えっ、ブルーライトじゃないの？
        expression: halfOpen
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l04
        speaker: right
        text: 動画やSNSで脳が興奮するの
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.24
      - id: l05
        speaker: left
        text: 興奮…完全に他人事なのだ
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l06
        speaker: right
        text: 自覚なくても起きてるわ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l07
        speaker: left
        text: それヤバいじゃん
        expression: halfOpen
        pre_pause_sec: 0.06
        post_pause_sec: 0.20
      - id: l08
        speaker: right
        text: 寝つきが10分以上ズレるの
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l09
        speaker: left
        text: 10分なら誤差じゃないの？
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l10
        speaker: right
        text: 毎晩なら年60時間損ね
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.30
  - id: s03
    role: body
    title_text: 寝酒で深い眠りが消える
    scene_goal: 寝酒は寝つきだけ早く深睡眠を削ると訂正する
    scene_format: 失敗エピソード型
    viewer_question: 寝酒は安眠に効くのか
    viewer_misunderstanding: アルコールで深く眠れる、と思っている
    boke_or_reaction: ずんだもんが「すぐ寝れる＝勝ち」と勘違い
    reaction_level: L3
    number_or_example: 朝のだるさ、夜中に目が覚める利尿
    mini_punchline: 寝るふり状態になっている
    visual_role: mainは「寝つき速いが浅い眠り」を波形で示す
    main:
      kind: image
      asset: assets/s03_main.png
      caption: 寝酒で深い眠りが消える
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 寝酒が寝つきは早めるが深睡眠を削る事実を波形で示す
        insert_timing: シーン冒頭
        asset_path: assets/s03_main.png
        imagegen_prompt: |-
          【用途】s03 main枠。寝酒の罠を睡眠波形の対比で伝える。
          【主題】上に「通常」の深い波形、下に「寝酒」の浅い波形、夜中に小さく「目覚め」マーク。
          【構図】上下に2本の波形、左に小さなラベル「通常／寝酒」、右に説明アイコン無し。下部とキャラ位置は余白。
          【テンプレート枠】Scene15 main枠。タイトル金枠・字幕金枠を覆わない。
          【色】濃紺背景、通常=淡い水色、寝酒=控えめなオレンジ、目覚めマーク=黄。
          【情報量】1枚1メッセージ。画像内文字「通常」「寝酒」のみ4文字以内。
          【絵柄】夜寄りフラット、太線、グリッドは薄く。
          【禁止】実在ブランド、ロゴ、写真、英語UI、医療表記の数値乱用。
          【トーン】ゆっくり解説動画／ずんだもん解説動画向けの落ち着いたフラット解説図解トーン。
          【禁止追記】ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし、細かい文字なし、英語UIなし。
        audit_points:
          - 上下波形の差が瞬間で読める
          - 字幕金枠とタイトル金枠を侵食しない
          - main枠内に収まる
    dialogue:
      - id: l01
        speaker: left
        text: 寝酒したらすぐ寝れるのだ
        expression: smile
        pre_pause_sec: 0.12
        post_pause_sec: 0.24
      - id: l02
        speaker: right
        text: 寝つきだけはね
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l03
        speaker: left
        text: それで深く眠れてるじゃん
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l04
        speaker: right
        text: 違うの、深睡眠が消えるのよ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.24
      - id: l05
        speaker: left
        text: ええっ！？得じゃないのだ？
        expression: halfOpen
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l06
        speaker: right
        text: 朝のだるさは大体それね
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l07
        speaker: left
        text: 寝酒民の朝は廃人だね
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.20
      - id: l08
        speaker: right
        text: 例え強いけど近いわ
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l09
        speaker: left
        text: それじゃ寝るふりじゃん
        expression: halfOpen
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l10
        speaker: right
        text: 利尿で夜中に目も覚めるの
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.30
  - id: s04
    role: body
    title_text: 風呂は寝る90分前
    scene_goal: 入浴タイミングで深睡眠が変わる、90分前が黄金と示す
    scene_format: BeforeAfter型
    viewer_question: 風呂は寝る直前に入った方が温かくて寝やすいか
    viewer_misunderstanding: 直前熱湯派が正解、と思い込んでいる
    boke_or_reaction: ずんだもんが「暖かいうちに寝るのが勝ち」と発想
    reaction_level: L2
    number_or_example: 90分前、38度ぬるめ、15分目安、深睡眠2倍説
    mini_punchline: 直前熱湯派は損している
    visual_role: mainは「入浴後の体温降下」を時間軸で示す折れ線
    main:
      kind: image
      asset: assets/s04_main.png
      caption: 風呂は寝る90分前
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 入浴から90分後に体温が下がる過程と、そこに眠りが重なるベスト位置を見せる
        insert_timing: シーン冒頭
        asset_path: assets/s04_main.png
        imagegen_prompt: |-
          【用途】s04 main枠。入浴後の体温曲線と就寝タイミングのベストを視覚化する。
          【主題】横軸=時間、縦軸=体温。湯気アイコン→90分後に下降→「就寝ベスト」マーカー。
          【構図】中央に滑らかな曲線、左に湯気アイコン、右にベッドアイコン。下部字幕帯とキャラ位置は余白。
          【テンプレート枠】Scene15 main枠。タイトル金枠・字幕金枠を覆わない。
          【色】濃紺背景、曲線=淡い水色、湯気=ソフトホワイト、ベスト位置=控えめなオレンジ。
          【情報量】1枚1メッセージ。画像内文字「90分」など6文字以内。
          【絵柄】夜寄りフラット、太線、影は薄く。
          【禁止】医療装い数値乱用、ロゴ、人物写真、英語UI、密な文字。
          【トーン】ゆっくり解説動画／ずんだもん解説動画向けの落ち着いたフラット解説図解トーン。
          【禁止追記】ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし、細かい文字なし、英語UIなし。
        audit_points:
          - 体温曲線とベスト位置が瞬間で読める
          - 「90分」が小さくても読める
          - main枠内に収まる
    dialogue:
      - id: l01
        speaker: left
        text: 風呂は直前が暖かいのだ
        expression: smile
        pre_pause_sec: 0.12
        post_pause_sec: 0.24
      - id: l02
        speaker: right
        text: そこが落とし穴ね
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l03
        speaker: left
        text: えっ、暖かいまま寝るのが正解では
        expression: halfOpen
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l04
        speaker: right
        text: 体温が下がる時に深く眠るの
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.24
      - id: l05
        speaker: left
        text: 下がる…冷ますタイミング？
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l06
        speaker: right
        text: 入浴後90分で下がりきるわ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l07
        speaker: left
        text: 90分前がベストってこと
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.20
      - id: l08
        speaker: right
        text: 38度ぬるめで15分目安よ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l09
        speaker: left
        text: 直前熱湯派は損してたのだ
        expression: smile
        pre_pause_sec: 0.06
        post_pause_sec: 0.16
      - id: l10
        speaker: right
        text: 比較で深睡眠2倍説もあるわ
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.30
  - id: s05
    role: body
    title_text: 休日寝だめは詰み
    scene_goal: 寝だめは体内時計をズラし平日にツケが回ると示し、中盤再フックを置く
    scene_format: 反証型
    viewer_question: 休日寝だめで平日の借金は返せるか
    viewer_misunderstanding: 寝だめは正義、と信じている
    boke_or_reaction: ずんだもんが「11時まで寝れば回復」と豪語
    reaction_level: L4
    number_or_example: 平日プラス2時間が上限、月曜が時差ボケ状態
    mini_punchline: ここまでがNG行動の正体
    visual_role: mainは「寝だめで体内時計が後ろにズレる」を時計図で示す
    main:
      kind: image
      asset: assets/s05_main.png
      caption: 休日寝だめは詰み
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 寝だめが体内時計を後ろにズラす仕組みを時計図で見せる
        insert_timing: シーン冒頭
        asset_path: assets/s05_main.png
        imagegen_prompt: |-
          【用途】s05 main枠。休日寝だめで体内時計が後ろにずれて平日に響く現象を伝える。
          【主題】2つの時計を並べる。左「平日の理想」、右「休日寝だめ後」。右の針が後ろにズレている。
          【構図】中央に2つの円形時計、間に「ズレ」を示す矢印。下部字幕とキャラ位置は余白。
          【テンプレート枠】Scene15 main枠。タイトル金枠・字幕金枠を覆わない。
          【色】濃紺背景、時計=ソフトホワイト、ズレ矢印=控えめなオレンジ。
          【情報量】1枚1メッセージ。画像内文字「平日」「休日」のみ。
          【絵柄】夜寄りフラット、太線、影は薄く。
          【禁止】実在時計ブランド、ロゴ、人物写真、英語UI、密な数値。
          【トーン】ゆっくり解説動画／ずんだもん解説動画向けの落ち着いたフラット解説図解トーン。
          【禁止追記】ロゴなし、実在人物なし、既存キャラクターなし、ブランドロゴなし、細かい文字なし、英語UIなし。
        audit_points:
          - 2つの時計のズレが瞬間で読める
          - main枠内に収まる
          - 字幕金枠とタイトル金枠を侵食しない
    dialogue:
      - id: l01
        speaker: left
        text: 休日11時まで寝れば回復なのだ
        expression: smile
        pre_pause_sec: 0.12
        post_pause_sec: 0.24
      - id: l02
        speaker: right
        text: それ罠ね
        expression: calm
        pre_pause_sec: 0.06
        post_pause_sec: 0.20
      - id: l03
        speaker: left
