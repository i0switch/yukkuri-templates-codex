    role: body
    scene_goal: 冷蔵庫の使い方を整理する
    viewer_question: 冷蔵庫は触りようがない
    visual_role: 冷蔵庫の中に余白があり、開閉時間が短くなる整理されたキッチンビジュアル
    duration_sec: 30
    main:
      kind: image
      asset: assets/s04_main.png
      asset_requirements:
        imagegen_prompt: |-
          s04: 冷蔵庫は詰めすぎと開けすぎが敵

          話者A「冷蔵庫ってずっと動くから、節約しようがないのだ？」
          話者B「使い方で負担は変わりますわ。詰めすぎ、開けすぎ、熱い物を入れるのは避けたいですの。」
          話者A「ぼく、冷蔵庫を宝箱みたいに開けて悩んじゃう。」
          話者B「その時間も冷気が逃げますわ。何を取るか決めてから開けるだけでも違います。」
          話者A「冷蔵庫前の会議を減らすんだね。」
          話者B「中身は7割くらいを目安にして、空気の通り道を残すと管理しやすいですわ。」
          話者A「パンパンが正義じゃないのだ。」
          話者B「冷凍庫はある程度詰まっていた方が安定しやすいなど、場所で考え方が違いますの。」
