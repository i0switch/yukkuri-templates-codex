          話者A「寒さに震えながら節約する動画じゃないのだ？」
          話者B「違いますわ。快適さを大きく落とさず、使い方を整えるのです。」
          話者A「それなら聞きたい。ぼくの財布を冬眠から起こしたいよ。」
