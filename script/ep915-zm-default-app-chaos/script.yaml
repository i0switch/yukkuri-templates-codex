  - id: s03
    role: body
    scene_goal: PDFの既定アプリ変更手順を示す
    viewer_question: 小さく直せばいいと安心させる
    visual_role: Windows設定画面風の抽象UI、PDFアイコン、候補アプリが整理されて並ぶ
    duration_sec: 30
    main:
      kind: image
      asset: assets/s03_main.png
      asset_requirements:
        imagegen_prompt: |-
          s03: まずPDFだけ直す

          めたん「最初はPDFだけでいい。よく開くし、ズレると地味に痛い」
          ずんだもん「いきなり全ファイル種類を直す修行じゃないのだな」
          めたん「Windowsなら設定を開いて、アプリ、既定のアプリへ進む」
          ずんだもん「そこでPDFって検索するのだ？」
          めたん「そう。`.pdf`を探して、普段使うPDFアプリに変える」
          ずんだもん「AdobeでもEdgeでも、本人が使いやすいほうでいいのだ？」
          めたん「大事なのは有名さじゃなく、作業が迷子にならないこと」
          ずんだもん「PDFがいつもの画面で開くだけで、朝のイライラがだいぶ減るのだ」
          めたん「設定を変えたら、手元のPDFを一つ開いて確認する」
          ずんだもん「確認までやるのだな。直した気分だけで終わると危ないのだ」

