  - id: s02
    role: body
    scene_goal: 既定アプリの概念を簡単に説明
    viewer_question: 設定への怖さを下げる
    visual_role: ファイルアイコンを受付カウンターでPDF係、画像係、動画係へ案内するPC内の比喩
    duration_sec: 30
    main:
      kind: image
      asset: assets/s02_main.png
      asset_requirements:
        imagegen_prompt: |-
          s02: 既定アプリは受付係

          ずんだもん「そもそも既定アプリって、名前からして偉そうなのだ」
          めたん「偉いというより、ファイルを誰に渡すか決める受付係ね」
          ずんだもん「PDFならPDF係、画像なら写真係、動画なら再生係ってことか」
          めたん「そう。ファイル名の最後にある種類を見て、担当アプリに案内してる」
          ずんだもん「PDFがブラウザで開くのは、PDF係がブラウザ係に案内してるのだな」
          めたん「うん。PCが壊れたというより、案内先がズレてる」
          ずんだもん「更新とか新アプリ入れたあとに変わるの、あれは勘弁してほしい」
          めたん「アプリ側が自分を担当にしたがることもあるからね」
          ずんだもん「人気者争いに巻き込まれるファイル、かわいそうなのだ」
          めたん「だから全部を疑うより、困ってる種類だけ確認するのが現実的」

