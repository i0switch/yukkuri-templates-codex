    scene_goal: 既定アプリ問題を生活感ある失敗で掴む
    viewer_question: あるあるの苛立ちに共感させる
    visual_role: 散らかったPCデスク、PDFアイコン、ブラウザで開いてしまった請求書、困った朝の雰囲気
    duration_sec: 30
    main:
      kind: image
      asset: assets/s01_main.png
      asset_requirements:
        imagegen_prompt: |-
          s01: PDFが謎アプリで開く朝

          ずんだもん「朝イチで請求書PDFを開いたら、なぜかブラウザが全力疾走してきたのだ」
          めたん「あるね。印刷したいだけなのに、タブが増えて心まで散らかるやつ」
          ずんだもん「前は普通にPDFアプリで開いてたのだ。急に裏切られた気分」
          めたん「裏切りというより、受付係が勝手に配置換えされた感じね」
          ずんだもん「受付係、勝手に転職しないでほしいのだ」
          めたん「今日はその受付係、つまり既定アプリを5分で整える話にしよう」
          ずんだもん「壊れたPCを直す回じゃなくて、散らかった案内板を戻す回なのだ」
          めたん「そう。怖がって放置するより、よく使う順に直したほうが早い」
          ずんだもん「毎回右クリックで逃げる生活、そろそろ終わらせたいのだ」
          めたん「なら今日で終わらせよう。まずはPDFから触るのが一番わかりやすい」

          ゆっくり解説動画向けの挿入画像を日本語で生成してください。 この画像は会話内容をそのまま再現するためのものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。 字幕やセリフは別で表示するため、会話等は画像に入れないでください。 キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、UI、概念図、状況説明ビジュアルを中心に構成してください。 画面全体を有効活用し、情報が一目で伝わる、整理された高品質なビジュアルにしてください。 YouTubeの解説動画に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。 Make the aspect ratio 16:9.

          画像の雰囲気はPCデスク、ファイルアイコン、開かないPDF、設定画面を整理する明るい実用解説、白と緑を基調にした安心感で生成してください。下部20%は字幕とキャラクター用に余白を残し、実在ブランド、実在UI、会話全文、長文日本語、細かい表、ウォーターマークは入れないでください。
    sub: null
