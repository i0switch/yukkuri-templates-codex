  - id: s04
    role: body
    scene_goal: Webリンクとブラウザの既定を確認する
    viewer_question: リンク迷子のストレスを言語化する
    visual_role: メール、チャット、資料リンクが一つの普段使いブラウザへまとまるPCデスク
    duration_sec: 30
    main:
      kind: image
      asset: assets/s04_main.png
      asset_requirements:
        imagegen_prompt: |-
          s04: ブラウザを整える

          ずんだもん「次はブラウザか。ここも争いが激しいのだ」
          めたん「メールのURL、チャットのリンク、資料の共有リンク、全部ここに響く」
          ずんだもん「仕事用はEdge、普段はChrome、気づいたらログインが迷子なのだ」
          めたん「ブラウザが分かれると、パスワードや履歴も分かれて面倒になる」
          ずんだもん「リンク押しただけで別人格のブラウザが出てくるの、やめてほしい」
          めたん「既定のWebブラウザーを、一番ログイン管理しているものに合わせる」
          ずんだもん「かっこよさより、いつもの環境が出ること優先なのだな」
          めたん「毎日使う導線ほど、地味なズレが時間を削るからね」
          ずんだもん「リンクを押してログインからやり直し、あれ本当に心が折れるのだ」
          めたん「だからブラウザは早めに整える。小さいストレスほど毎日積もる」

