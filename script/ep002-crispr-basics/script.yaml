meta:
  id: "ep002-crispr-basics"
  title: "CRISPR-Cas9 を15分で理解する"
  pair: "ZM"
  fps: 30
  width: 1920
  height: 1080
  audience: "高校生以上・理系興味層"
  tone: "知的・少しシニカル・事実ベース"
  bgm_mood: "知的で落ち着くが、少し緊張感もある"
  voice_engine: "voicevox"
  target_duration_sec: 210
  allow_duplicate_templates: true

characters:
  left:
    character: "zundamon"
    voicevox_speaker_id: 3
    speaking_style: "語尾に〜のだ／〜なのだ。好奇心旺盛だが、無闇にはしゃがない。"
  right:
    character: "metan"
    voicevox_speaker_id: 2
    speaking_style: "ですわ口調。落ち着いた解説役で、過剰な断定は避ける。"

bgm:
  source_url: ""
  file: "bgm/track.mp3"
  license: ""
  volume: 0.1
  fade_in_sec: 1.0
  fade_out_sec: 1.5

scenes:
  - id: "s01"
    scene_template: "Scene19"
    role: "intro"
    title_text: "CRISPR-Cas9 を15分で理解する"
    main:
      kind: "text"
      text: "DNA を狙って切る分子ツール"
    sub:
      kind: "bullets"
      items:
        - "何者か"
        - "何ができるか"
        - "どこが危ういか"
    dialogue:
      - id: "l01"
        speaker: "left"
        text: "CRISPRって、結局なんなのだ？"
        expression: "halfOpen"
        pre_pause_sec: 0.2
        post_pause_sec: 0.3
      - id: "l02"
        speaker: "right"
        text: "DNAを狙って切る仕組みですわ"
        expression: "calm"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l03"
        speaker: "left"
        text: "ニュースだと万能っぽく見えるのだ"
        expression: "smirk"
        pre_pause_sec: 0.15
        post_pause_sec: 0.25
      - id: "l04"
        speaker: "right"
        text: "中身はもっと地道ですわ"
        expression: "smile"
        pre_pause_sec: 0.1
        post_pause_sec: 0.4

  - id: "s02"
    scene_template: "Scene02"
    role: "body"
    title_text: "まず全体像"
    main:
      kind: "image"
      asset: "assets/s02_main.png"
      caption: "DNA を探して切る Cas9"
      asset_requirements:
        description: "CRISPR-Cas9 の全体像を一枚で示す図解"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          中央にDNA二重らせん、左からガイドRNAが寄り添い、右側でCas9がDNAの特定位置を切ろうとしている図解。
          要素は少なめで、分子の関係が直感的に分かる構図。
          16:9 アスペクト比。文字、数字、ラベル、ロゴは入れない。
        style: "フラット・図解"
        aspect: "16:9"
        negative: "写真風、写実、人の顔、文字、数字、ロゴ、透かし"
    sub:
      kind: "bullets"
      items:
        - "狙う"
        - "切る"
        - "直させる"
    dialogue:
      - id: "l01"
        speaker: "right"
        text: "流れは三段階ですわ"
        expression: "calm"
        pre_pause_sec: 0.15
        post_pause_sec: 0.25
      - id: "l02"
        speaker: "left"
        text: "意外と工具っぽい説明なのだ"
        expression: "smile"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l03"
        speaker: "right"
        text: "魔法より作業工程ですの"
        expression: "smirk"
        pre_pause_sec: 0.1
        post_pause_sec: 0.3
      - id: "l04"
        speaker: "left"
        text: "そこを押さえると整理できるのだ"
        expression: "happy"
        pre_pause_sec: 0.1
        post_pause_sec: 0.35

  - id: "s03"
    scene_template: "Scene03"
    role: "body"
    title_text: "もともとは細菌の防御"
    main:
      kind: "image"
      asset: "assets/s03_main.png"
      caption: "細菌がウイルスを記憶する"
      asset_requirements:
        description: "CRISPR が細菌の免疫に由来することを示すイラスト"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          左に丸みのある細菌、周囲に単純化したウイルス粒子、細菌の内部に短いDNA断片が並んでいて記憶ライブラリのように見える構図。
          教育向けで清潔感があり、怖くしすぎない。
          16:9。文字、吹き出し、ロゴなし。
        style: "フラット・教育イラスト"
        aspect: "16:9"
        negative: "顕微鏡写真、写実、血液表現、文字、ロゴ"
    sub:
      kind: "bullets"
      items:
        - "細菌"
        - "侵入したウイルス"
        - "記憶した断片"
    dialogue:
      - id: "l01"
        speaker: "left"
        text: "誰が作った仕組みなのだ？"
        expression: "halfOpen"
        pre_pause_sec: 0.15
        post_pause_sec: 0.25
      - id: "l02"
        speaker: "right"
        text: "細菌の防御の仕組みですわ"
        expression: "calm"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l03"
        speaker: "left"
        text: "発明というより転用なのだ"
        expression: "smirk"
        pre_pause_sec: 0.1
        post_pause_sec: 0.2
      - id: "l04"
        speaker: "right"
        text: "自然の道具を借りた感じですわ"
        expression: "smile"
        pre_pause_sec: 0.1
        post_pause_sec: 0.35

  - id: "s04"
    scene_template: "Scene06"
    role: "body"
    title_text: "Cas9 はどう切るか"
    main:
      kind: "image"
      asset: "assets/s04_main.png"
      caption: "ガイドRNA が Cas9 を案内する"
      asset_requirements:
        description: "guide RNA と Cas9 の役割分担を示す図解"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          中央に大きめのCas9タンパク質アイコン、そこへ細長いガイドRNAが接続され、前方のDNA上の特定地点を指し示している構図。
          左から右へ流れが感じられる配置で、中央寄せ。
          16:9。文字や記号は入れない。
        style: "フラット・アイコン図解"
        aspect: "16:9"
        negative: "写実、3Dレンダ、文字、数字、ロゴ、水印"
    sub:
      kind: "bullets"
      items:
        - "guide RNA が目標指定"
        - "Cas9 が切断"
    dialogue:
      - id: "l01"
        speaker: "right"
        text: "ガイドRNAが住所を教えますの"
        expression: "calm"
        pre_pause_sec: 0.15
        post_pause_sec: 0.25
      - id: "l02"
        speaker: "left"
        text: "住所つき分子ハサミなのだ"
        expression: "happy"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l03"
        speaker: "right"
        text: "その比喩は近いですわ"
        expression: "smile"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l04"
        speaker: "left"
        text: "狙った配列を攻めやすいのだ"
        expression: "calm"
        pre_pause_sec: 0.1
        post_pause_sec: 0.35

  - id: "s05"
    scene_template: "Scene10"
    role: "body"
    title_text: "切った後に何が起きるか"
    main:
      kind: "image"
      asset: "assets/s05_main.png"
      caption: "NHEJ と HDR"
      asset_requirements:
        description: "DNA 切断後の二つの修復経路を比較する教育図"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          中央で切れたDNAを配置し、左側に簡略化された急ごしらえ修復、右側にテンプレートを使った丁寧な修復を対比する二分割図。
          余白を広めに取り、要素は整理された見た目。
          16:9。文字、記号、矢印ラベルなし。
        style: "フラット・比較図"
        aspect: "16:9"
        negative: "複雑すぎる図、論文風の細かい文字、写実、ロゴ"
    sub:
      kind: "bullets"
      items:
        - "雑に直ると欠失"
        - "型があると精密修復"
    dialogue:
      - id: "l01"
        speaker: "left"
        text: "切っただけで完了なのだ？"
        expression: "halfOpen"
        pre_pause_sec: 0.15
        post_pause_sec: 0.25
      - id: "l02"
        speaker: "right"
        text: "細胞の修復が結果を決めますの"
        expression: "calm"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l03"
        speaker: "left"
        text: "細胞側にも左右されるのだ"
        expression: "smirk"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l04"
        speaker: "right"
        text: "毎回設計どおりとは限りませんわ"
        expression: "smile"
        pre_pause_sec: 0.1
        post_pause_sec: 0.35

  - id: "s06"
    scene_template: "Scene20"
    role: "body"
    title_text: "なぜ大騒ぎされたのか"
    main:
      kind: "image"
      asset: "assets/s06_main.png"
      caption: "旧来法との比較"
      asset_requirements:
        description: "旧来の遺伝子編集法と CRISPR の手軽さの差を示す図"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          左に複雑で重たい研究装置の象徴、右にシンプルなCas9とRNAの道具セットを置き、右側がより簡潔に見える比較構図。
          誇張しすぎず、教育向けの清潔な印象。
          16:9。文字や数字は入れない。
        style: "フラット・比較イラスト"
        aspect: "16:9"
        negative: "スチームパンク、写実、人物、文字、ロゴ"
    sub:
      kind: "bullets"
      items:
        - "設計しやすい"
        - "安い"
        - "広く試せる"
    dialogue:
      - id: "l01"
        speaker: "right"
        text: "以前にも編集法はありましたわ"
        expression: "calm"
        pre_pause_sec: 0.15
        post_pause_sec: 0.2
      - id: "l02"
        speaker: "left"
        text: "でも急に有名になったのだ"
        expression: "halfOpen"
        pre_pause_sec: 0.1
        post_pause_sec: 0.2
      - id: "l03"
        speaker: "right"
        text: "設計しやすく安いからですわ"
        expression: "smile"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l04"
        speaker: "left"
        text: "扱いやすくなったのが大きいのだ"
        expression: "calm"
        pre_pause_sec: 0.1
        post_pause_sec: 0.35

  - id: "s07"
    scene_template: "Scene07"
    role: "body"
    title_text: "医療での使い道"
    main:
      kind: "image"
      asset: "assets/s07_main.png"
      caption: "病気の原因変異を狙う"
      asset_requirements:
        description: "医療応用として血液細胞や治療のイメージを示す図"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          中央に血液細胞のシンプルな図、近くにDNAとCas9の編集アイコン、医療応用を示す清潔な研究室風モチーフを少量だけ添える。
          人物の顔は出さず、アイコン寄りに整理する。
          16:9。文字なし。
        style: "フラット・医療図解"
        aspect: "16:9"
        negative: "患者の顔、手術写真、血まみれ、文字、ロゴ"
    sub:
      kind: "bullets"
      items:
        - "鎌状赤血球症"
        - "遺伝病研究"
        - "細胞治療"
    dialogue:
      - id: "l01"
        speaker: "left"
        text: "期待されるのは医療なのだ？"
        expression: "smile"
        pre_pause_sec: 0.15
        post_pause_sec: 0.2
      - id: "l02"
        speaker: "right"
        text: "原因が明確な病気と相性がいいですの"
        expression: "calm"
        pre_pause_sec: 0.1
        post_pause_sec: 0.2
      - id: "l03"
        speaker: "left"
        text: "全部が一発解決ではないのだ"
        expression: "smirk"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l04"
        speaker: "right"
        text: "原因が複雑だと甘くないですわ"
        expression: "smile"
        pre_pause_sec: 0.1
        post_pause_sec: 0.35

  - id: "s08"
    scene_template: "Scene11"
    role: "body"
    title_text: "医療以外でも使う"
    main:
      kind: "image"
      asset: "assets/s08_main.png"
      caption: "作物と発酵の改良"
      asset_requirements:
        description: "農業と産業利用を同時に示すフラット図解"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          左に葉や穀物のシンプルな作物アイコン、右に発酵タンクや微生物のアイコン、中央にDNA編集の小さなモチーフを置く。
          明るく整理された教育図で、中央に主題を集める。
          16:9。文字、数値なし。
        style: "フラット・産業イラスト"
        aspect: "16:9"
        negative: "農場写真、人物、文字、ロゴ、重機"
    sub:
      kind: "bullets"
      items:
        - "乾燥に強い作物"
        - "病気に強い品種"
        - "酵素や素材の生産"
    dialogue:
      - id: "l01"
        speaker: "right"
        text: "作物改良や発酵でも使いますわ"
        expression: "calm"
        pre_pause_sec: 0.15
        post_pause_sec: 0.2
      - id: "l02"
        speaker: "left"
        text: "研究室だけじゃないのだ"
        expression: "happy"
        pre_pause_sec: 0.1
        post_pause_sec: 0.2
      - id: "l03"
        speaker: "right"
        text: "食品や素材にも効いてきますの"
        expression: "smile"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l04"
        speaker: "left"
        text: "日常の裏側で働くのだ"
        expression: "calm"
        pre_pause_sec: 0.1
        post_pause_sec: 0.35

  - id: "s09"
    scene_template: "Scene13"
    role: "body"
    title_text: "限界その1 オフターゲット"
    main:
      kind: "image"
      asset: "assets/s09_main.png"
      caption: "狙い外れの切断"
      asset_requirements:
        description: "オフターゲットを分かりやすく示す図解"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          複数のDNA断片が並び、そのうち一つが目標、別の似た配列にもCas9が近づいてしまう様子をシンプルに描く。
          正解と誤差の対比が一目で分かる構図。
          16:9。文字やチェックマークは入れない。
        style: "フラット・科学図解"
        aspect: "16:9"
        negative: "論文図、細かい文字、赤黒い血液、ロゴ"
    sub:
      kind: "bullets"
      items:
        - "似た配列を誤認"
        - "想定外の変化"
    dialogue:
      - id: "l01"
        speaker: "left"
        text: "狙い外も切ることがあるのだ？"
        expression: "halfOpen"
        pre_pause_sec: 0.15
        post_pause_sec: 0.2
      - id: "l02"
        speaker: "right"
        text: "似た配列を誤って触るのですわ"
        expression: "calm"
        pre_pause_sec: 0.1
        post_pause_sec: 0.2
      - id: "l03"
        speaker: "left"
        text: "地図が曖昧だと危ないのだ"
        expression: "smirk"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l04"
        speaker: "right"
        text: "だから検証工程が重いのですの"
        expression: "smile"
        pre_pause_sec: 0.1
        post_pause_sec: 0.35

  - id: "s10"
    scene_template: "Scene21"
    role: "body"
    title_text: "限界その2 体に届けにくい"
    main:
      kind: "image"
      asset: "assets/s10_main.png"
      caption: "目的の細胞まで運ぶ難しさ"
      asset_requirements:
        description: "ドラッグデリバリーの難しさを示すイラスト"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          中央に細胞群、その外側から小さなカプセルやナノ粒子が近づくが、一部だけが目的細胞へ届く様子をシンプルに描く。
          医療教育向けの清潔な印象で、中央に主役を配置。
          16:9。文字や矢印ラベルなし。
        style: "フラット・医学生物図"
        aspect: "16:9"
        negative: "注射の写実写真、人物、文字、ロゴ"
    sub:
      kind: "bullets"
      items:
        - "狙う細胞を選ぶ"
        - "壊さず運ぶ"
        - "免疫反応を避ける"
    dialogue:
      - id: "l01"
        speaker: "right"
        text: "もう一つの壁は運ぶことですわ"
        expression: "calm"
        pre_pause_sec: 0.15
        post_pause_sec: 0.2
      - id: "l02"
        speaker: "left"
        text: "道具があっても配送が難しいのだ"
        expression: "halfOpen"
        pre_pause_sec: 0.1
        post_pause_sec: 0.2
      - id: "l03"
        speaker: "right"
        text: "分子生物学は物流も大事ですわ"
        expression: "smirk"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l04"
        speaker: "left"
        text: "派手な技術ほど足元が大事なのだ"
        expression: "calm"
        pre_pause_sec: 0.1
        post_pause_sec: 0.35

  - id: "s11"
    scene_template: "Scene17"
    role: "body"
    title_text: "研究ではどう使うか"
    main:
      kind: "image"
      asset: "assets/s11_main.png"
      caption: "設計から結果確認まで"
      asset_requirements:
        description: "研究室での CRISPR 実験ワークフローを示す図"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          左から右へ、ガイドRNA設計、細胞へ導入、培養、解析という四段階を抽象アイコンで並べたワークフロー図。
          余白を多めにし、複雑すぎない。
          16:9。文字、番号、ロゴなし。
        style: "フラット・ワークフロー図"
        aspect: "16:9"
        negative: "細密な装置写真、文字、ロゴ、暗すぎる背景"
    sub:
      kind: "bullets"
      items:
        - "設計"
        - "導入"
        - "培養"
        - "解析"
    dialogue:
      - id: "l01"
        speaker: "left"
        text: "実験は切って終わりじゃないのだ"
        expression: "halfOpen"
        pre_pause_sec: 0.15
        post_pause_sec: 0.2
      - id: "l02"
        speaker: "right"
        text: "確認のほうが長いですわ"
        expression: "calm"
        pre_pause_sec: 0.1
        post_pause_sec: 0.2
      - id: "l03"
        speaker: "left"
        text: "研究者の仕事は検品っぽいのだ"
        expression: "smirk"
        pre_pause_sec: 0.1
        post_pause_sec: 0.25
      - id: "l04"
        speaker: "right"
        text: "再現性には地味さが必要ですわ"
        expression: "smile"
        pre_pause_sec: 0.1
        post_pause_sec: 0.35

  - id: "s12"
    scene_template: "Scene05"
    role: "body"
    title_text: "倫理 生殖細胞への介入"
    main:
      kind: "image"
      asset: "assets/s12_main.png"
      caption: "次世代に残る編集は別問題"
      asset_requirements:
        description: "胚や生殖細胞への介入が倫理的に重いと分かる抽象図"
        imagegen_prompt: |
          フラットデザイン、白背景、青緑基調。
          中央に抽象化した胚のシルエットとDNA、周囲に保護シールドのような円と慎重さを示すやわらかい警告モチーフを配置。
