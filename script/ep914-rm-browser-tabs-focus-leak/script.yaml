  - id: s04
    role: body
    scene_goal: 閉じる前の保存手順を作る
    viewer_question: 閉じる怖さを軽くする
    visual_role: タブからタイトル、URL、次の行動だけを小さなメモへ移すシンプルな図解
    duration_sec: 30
    main:
