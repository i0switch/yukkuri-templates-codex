meta:
  id: ep002-zundamon-end-of-universe
  episode_id: ep002-zundamon-end-of-universe
  layout_template: Scene16
  character_pair: ZM
  pair: ZM
  title: 実はまだ決着してない、宇宙の終わり方4選
  fps: 30
  width: 1920
  height: 1080
  audience: 初心者向け
  tone: やさしい科学ミステリー
  voice_engine: voicevox
  target_duration_sec: 300
bgm:
  title: upbeat step
  source_url: https://dova-s.jp/en/bgm/detail/16211
  file: bgm/track.mp3
  license: DOVA-SYNDROME 標準利用規約
  volume: 0.09
  fade_in_sec: 1.0
  fade_out_sec: 1.5
characters:
  left:
    character: zundamon
    voicevox_speaker_id: 3
  right:
    character: metan
    voicevox_speaker_id: 2
scenes:
  - id: s01
    title_text: ずんだ餅と宇宙は4種類なのだ
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 4仮説の宇宙終焉
      asset_requirements:
        imagegen_prompt: |
          フラットSF風アイコン4分割、暗い宇宙背景。
          4つのアイコンが横並び、各アイコンは抽象的な宇宙終焉を表現。
          左から：引き裂きの放射状線／中央へ収束する渦／凍結の結晶／円環ループ。
          色は青と紫のダーク基調、各アイコンに薄い青白の光彩。
          シンプル、SF風枠線。16:9 アスペクト比。
          文字・ロゴ・実在画像・人物は禁止。
        style: フラット・SF・ダーク
        aspect: 16:9
        negative: 文字、ロゴ、実在画像、人物、写真風
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: ずんだ餅って4種類あるのだ
      - id: l02
        speaker: right
        text: いきなり何の話なのよ
      - id: l03
        speaker: left
        text: つぶし、つぶさず、固め、緩めだね
      - id: l04
        speaker: right
        text: で、それが宇宙とどう関係するの
      - id: l05
        speaker: left
        text: 宇宙の終わり方も4種類みたい？
      - id: l06
        speaker: right
        text: 比較スケールがバグってるけど…
      - id: l07
        speaker: right
        text: 仮説が4つで人類揉めてるのよ
      - id: l08
        speaker: left
        text: 人類はまだ決められないのだ
      - id: l09
        speaker: left
        text: 今日は4つ全部見るやつ？
      - id: l10
        speaker: right
        text: 全部見るわよ、覚悟しなさい
  - id: s02
    title_text: みんな「宇宙は永遠」って思ってない？
    main:
      kind: image
      asset: assets/s02_main.png
      caption: 太陽寿命 vs 宇宙寿命
      asset_requirements:
        imagegen_prompt: |
          フラットSFインフォグラフィック、暗い宇宙背景。
          横長の時間スケール棒2本。
          上：短い棒（太陽寿命を表現、薄い黄色とオレンジ）。
          下：圧倒的に長い棒（宇宙寿命、青〜紫のグラデーション）。
          長さの差が極端に視覚化される構図。シンプル、SF風枠線。
          16:9 アスペクト比。
          文字・数値ラベルは入れない、抽象記号のみ。
        style: フラット・SF・インフォグラフィック
        aspect: 16:9
        negative: 数値、文字、ロゴ、人物
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 宇宙って永遠じゃないのだ？
      - id: l02
        speaker: right
        text: 「永遠」は人間の幻想ね
      - id: l03
        speaker: left
        text: 太陽が消えたら終わりじゃない？
      - id: l04
        speaker: right
        text: 太陽が消えても宇宙は続くのよ
      - id: l05
        speaker: left
        text: マジで？太陽は通過点だね？
      - id: l06
        speaker: right
        text: 太陽寿命は約50億年、宇宙はもっと長い
      - id: l07
        speaker: left
        text: 私が寝たら宇宙終わるのだ？
      - id: l08
        speaker: right
        text: あなたの存在はノーカンよ
      - id: l09
        speaker: left
        text: 宇宙の方がずっと先まで生きるね
      - id: l10
        speaker: right
        text: その先に4つの終わり方が待ってる
  - id: s03
    title_text: 仮説1：ビッグリップ、引き裂かれる宇宙
    main:
      kind: image
      asset: assets/s03_main.png
      caption: ビッグリップ
      asset_requirements:
        imagegen_prompt: |
          フラットSFイラスト、暗い宇宙背景。
          中央に銀河の渦（青紫のスパイラル）、外側に放射状の引き裂き矢印が四方へ伸びる。
          矢印は赤系で警告感を出す、銀河の渦は薄く広がる感じ。
          シンプル、SF風枠線。16:9 アスペクト比。
          文字・実在画像・人物は禁止。
        style: フラット・SF・ダーク
        aspect: 16:9
        negative: 文字、ロゴ、実在画像、人物
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 1つ目、ビッグリップなのだ
      - id: l02
        speaker: right
        text: 宇宙が引き裂かれて終わる仮説ね
      - id: l03
        speaker: left
        text: ずんだ餅も引きちぎられるのだ
      - id: l04
        speaker: right
        text: ずんだ餅で説明しないでくれる
      - id: l05
        speaker: left
        text: 銀河も星も全部バラバラ？
      - id: l06
        speaker: right
        text: 原子レベルまで引き裂かれるとされる
      - id: l07
        speaker: left
        text: それヤバすぎる、誰がやるの？
      - id: l08
        speaker: right
        text: ダークエネルギーが暴走した場合よ
      - id: l09
        speaker: left
        text: 暗黒エネルギー、悪役だね
      - id: l10
        speaker: right
        text: 観測次第ではこの未来もあり得る
  - id: s04
    title_text: 仮説2：ビッグクランチ、潰れて終わる
    main:
      kind: image
      asset: assets/s04_main.png
      caption: ビッグクランチ
      asset_requirements:
        imagegen_prompt: |
          フラットSFイラスト、暗い宇宙背景。
          中央に黒い一点（特異点）、外側から内側へ向かう渦巻き矢印が4〜6本。
          周囲の星々が中心へ吸い込まれていくイメージ。色は青紫、中心は黒で締める。
          シンプル、SF風。16:9 アスペクト比。
          文字・実在画像・人物は禁止。
        style: フラット・SF・ダーク
        aspect: 16:9
        negative: 文字、ロゴ、実在画像、人物
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 2つ目はビッグクランチなのだ
      - id: l02
        speaker: right
        text: 宇宙が一点に潰れて終わる仮説
      - id: l03
        speaker: left
        text: ずんだ餅潰しと一緒だね
      - id: l04
        speaker: right
        text: そのスケールでは収まらないけど
      - id: l05
        speaker: left
        text: ビッグバンの逆ってこと？
      - id: l06
        speaker: right
        text: そう、膨張から収縮に転じる説
      - id: l07
        speaker: left
        text: シンプルで分かりやすいのだ
      - id: l08
        speaker: right
        text: 分かりやすいけど観測は不利なのよ
      - id: l09
        speaker: left
        text: 人気の説でも証拠が足りない？
      - id: l10
        speaker: right
        text: 今は重力よりダークエネルギー優勢
  - id: s05
    title_text: 半分来た、まだ2つ残ってるのだ
    main:
      kind: image
      asset: assets/s05_main.png
      caption: 進捗 2/4
      asset_requirements:
        imagegen_prompt: |
          フラットSFインフォグラフィック、暗い宇宙背景。
          横長の4マスメーター（横並びの長方形4個）。
          左から2マス目までを青で点灯、3〜4マスは薄いグレー。
          SF風の枠線、シンプル、余白多め。16:9 アスペクト比。
          文字・数字は入れない。
        style: フラット・SF・インフォグラフィック
        aspect: 16:9
        negative: 数字、文字、ロゴ、実在UI
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: ここまで2つ、私の脳が引き裂かれるのだ
      - id: l02
        speaker: right
        text: 自分でリップ起こさないでよ
      - id: l03
        speaker: left
        text: リップとクランチで頭爆発したよ
      - id: l04
        speaker: right
        text: あと2つは結構違う系統よ
      - id: l05
        speaker: left
        text: 先に答え教えてほしい
      - id: l06
        speaker: right
        text: ラストでまとめる、安心しなさい
      - id: l07
        speaker: left
        text: それまで脳が持つかな
      - id: l08
        speaker: right
        text: 宇宙より先にあなたが終わらないで
  - id: s06
    title_text: 仮説3：ビッグフリーズ、凍る宇宙（現有力）
    main:
      kind: image
      asset: assets/s06_main.png
      caption: ビッグフリーズ
      asset_requirements:
        imagegen_prompt: |
          フラットSFイラスト、暗い宇宙背景。
          星々が結晶化したように凍りつき、薄い青白い氷の結晶模様が画面に広がる。
          中央に大きな結晶、周囲に消えかけの星（薄く、輝度を落とす）。
          色は寒色系（青白・薄紫）、SF風。シンプル、余白多め。16:9 アスペクト比。
          文字・実在画像・人物は禁止。
        style: フラット・SF・寒色
        aspect: 16:9
        negative: 文字、ロゴ、人物、実在画像
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 3つ目、ビッグフリーズなのだ
      - id: l02
        speaker: right
        text: 宇宙が冷え切って静かに終わる説
      - id: l03
        speaker: left
        text: 冷えたずんだ餅味気ないのだ
      - id: l04
        speaker: right
        text: 宇宙のスケールで言わないで
      - id: l05
        speaker: left
        text: ゆっくり冷えるってどれくらい？
      - id: l06
        speaker: right
        text: 10の100乗年とかそんな単位ね
      - id: l07
        speaker: left
        text: もう想像できない時間軸だね
      - id: l08
        speaker: right
        text: 観測上はこれが現状で最有力なのよ
      - id: l09
        speaker: left
        text: 地味な終わり方が一番ありえる？
      - id: l10
        speaker: right
        text: そう、派手な終わりは観測支持薄め
  - id: s07
    title_text: 仮説4：ビッグバウンス、再生する宇宙
    main:
      kind: image
      asset: assets/s07_main.png
      caption: ビッグバウンス
      asset_requirements:
        imagegen_prompt: |
          フラットSFイラスト、暗い宇宙背景。
          中央に大きな円環矢印（時計回り）。
          円の各位置に「収縮→点→膨張→拡大」の4状態を抽象アイコンで配置（小さく、文字なし）。
          色は青紫と緑、希望感のある彩度。SF風枠線。16:9 アスペクト比。
          文字・実在画像・人物は禁止。
        style: フラット・SF・サイクリック
        aspect: 16:9
        negative: 文字、ロゴ、人物
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 4つ目、ビッグバウンスなのだ
      - id: l02
        speaker: right
        text: 潰れた後また膨張する説ね
      - id: l03
        speaker: left
        text: 跳ねるずんだ餅だね
      - id: l04
        speaker: right
        text: ずんだ餅は跳ねないと思うけど
      - id: l05
        speaker: left
        text: 宇宙が再生するなんて熱いね
      - id: l06
        speaker: right
        text: 希望ある仮説、でも証拠は薄いの
      - id: l07
        speaker: left
        text: マジで？跳ね返り見たい
      - id: l08
        speaker: right
        text: 観測で確認できる手段がほぼ無い
      - id: l09
        speaker: left
        text: 希望と証拠、別物なのだ
      - id: l10
        speaker: right
        text: 科学はそこを混ぜちゃ駄目なのよ
  - id: s08
    title_text: 観測でハッブル定数が合わない問題
    main:
      kind: image
      asset: assets/s08_main.png
      caption: ハッブルテンション
      asset_requirements:
        imagegen_prompt: |
          フラットSFインフォグラフィック、暗い宇宙背景。
          横並びに2本の縦棒グラフ。
          左：短め（宇宙背景放射ベース、青系）。
          右：長め（銀河距離ベース、橙系）。
          長さに数%の違いがあるが視覚的に対比が分かる構図。SF風枠。シンプル。
          16:9 アスペクト比。
          数値・文字なし、抽象記号のみ。
        style: フラット・SF・インフォグラフィック
        aspect: 16:9
        negative: 数値、文字、ロゴ
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 観測すれば一発で決まるのだ？
      - id: l02
        speaker: right
        text: それが、観測でも揉めてるのよ
      - id: l03
        speaker: left
        text: マジで？データなのに合わない？
      - id: l04
        speaker: right
        text: ハッブル定数、2手法で値が違う
      - id: l05
        speaker: left
        text: 宇宙背景放射と銀河距離だね
      - id: l06
        speaker: right
        text: 片方67、もう片方73くらい
      - id: l07
        speaker: left
        text: 定数が定数じゃないのだ
      - id: l08
        speaker: right
        text: これをハッブルテンションと呼ぶ
      - id: l09
        speaker: left
        text: 観測ですら決まらないなんて
      - id: l10
        speaker: right
        text: 物理学が今ぶつかってる壁なのよ
  - id: s09
    title_text: 結論はまだ先、でも今わかることはある
    main:
      kind: image
      asset: assets/s09_main.png
      caption: 現有力はビッグフリーズ
      asset_requirements:
        imagegen_prompt: |
          フラットSFインフォグラフィック、暗い宇宙背景。
          4つの抽象アイコンが2x2グリッドで配置（リップの放射／クランチの渦／フリーズの結晶／バウンスの円環）。
          左下のフリーズ枠に金色の星マーク（★）、他の3枠は薄め。
          SF風枠線、シンプル。16:9 アスペクト比。
          文字・ロゴ・実在画像は禁止。
        style: フラット・SF・インフォグラフィック
        aspect: 16:9
        negative: 文字、ロゴ、人物
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 結局、現有力はどれなのだ？
      - id: l02
        speaker: right
        text: ビッグフリーズ、ゆっくり凍る説ね
      - id: l03
        speaker: left
        text: 地味な方が勝つの渋いね
      - id: l04
        speaker: right
        text: ただし観測の揺れが残ってる
      - id: l05
        speaker: left
        text: 観測やめたら宇宙終わるのだ？
      - id: l06
        speaker: right
        text: 観測しなくても宇宙は続くわよ
      - id: l07
        speaker: left
        text: 揺れてるのが面白いね
      - id: l08
        speaker: right
        text: 科学の現場って答えが揺れてる
      - id: l09
        speaker: left
        text: 5年後10年後で結論変わる？
      - id: l10
        speaker: right
        text: 可能性ある、だから観測続いてる
  - id: s10
    title_text: 今夜できる、宇宙の答え合わせ準備
    main:
      kind: image
      asset: assets/s10_main.png
      caption: 3アクション
      asset_requirements:
        imagegen_prompt: |
          フラットSFアイコンチェックリスト、暗い宇宙背景。
          縦に3つのチェックボックス（未チェック）、各横にシンプルな抽象アイコン。
          1段目：星型アイコン（夜空）。
          2段目：吹き出しアイコン（コメント）。
          3段目：カレンダーアイコン（予定）。
          SF風線、シンプル。色は青と橙のアクセント。16:9 アスペクト比。
          文字・ロゴ・実在UIの模写は禁止。
        style: フラット・SF・チェックリスト
        aspect: 16:9
        negative: 文字、ロゴ、UI模写、人物
    sub: null
    dialogue:
      - id: l01
        speaker: left
        text: 結局見るだけで終わるのだ？
      - id: l02
        speaker: right
        text: 見るだけじゃない、3つやることがある
      - id: l03
        speaker: left
        text: 1個目、コメントで好きな仮説選ぶ
      - id: l04
        speaker: right
        text: 4つから1つ、自分の推しを宣言
      - id: l05
        speaker: left
        text: 2個目、ハッブル決着の年を予測
      - id: l06
        speaker: right
        text: 5年後か10年後か、カレンダーに書く
      - id: l07
        speaker: left
        text: 3個目、今夜実際に夜空見るやつ？
      - id: l08
        speaker: right
        text: 肉眼でも宇宙の余韻は感じられる
      - id: l09
        speaker: left
        text: 夜空にずんだ餅は無いのだ？
      - id: l10
        speaker: right
        text: ずんだ餅は冷蔵庫に入ってるわよ
