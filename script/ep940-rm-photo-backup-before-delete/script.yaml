      kind: image
      asset: assets/s01_main.png
      asset_requirements:
        imagegen_prompt: |-
          s01: 消した瞬間に同期も消える

          話者A「容量が限界だから、写真を一気に消そうと思ってるの。」
          話者B「待て霊夢。その一気消し、バックアップも巻き込むことがあるんだぜ。」
          話者A「え、クラウドにあるなら安全じゃないの？」
          話者B「同期とバックアップを混同すると危ない。同期は同じ状態にそろえる仕組みだ。」
          話者A「同じ状態って、消したら向こうも消えるってこと？」
          話者B「設定やアプリによっては、そうなる。写真が避難所じゃなく鏡になるんだぜ。」
          話者A「鏡に向かって消しゴムかけてたの私？」
          話者B「だから今日は、消す前に見る場所を順番に確認する。」
          話者A「今この動画を見てなかったら、思い出ごと掃除してたかも。」
          話者B「まずは、バックアップ済みの意味からほどくぞ。」

