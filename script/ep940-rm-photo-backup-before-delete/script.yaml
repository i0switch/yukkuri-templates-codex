scenes:
  - id: s01
    title_text: 消した瞬間に同期も消える
    role: intro
    scene_goal: 写真削除前の最大リスクを冒頭で刺す
    viewer_question: クラウドにあるから消して大丈夫ではないのか
    visual_role: スマホ写真を消す指と、クラウド側にも赤い消去波が広がる不安な概念図
