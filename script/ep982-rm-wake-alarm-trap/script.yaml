meta:
  id: ep982-rm-wake-alarm-trap
  title: 朝起きられない人がやりがちなNG習慣
  pair: RM
  voice_engine: aquestalk
  layout_template: Scene12
  width: 1280
  height: 720
  fps: 30
  target_duration_sec: 300
  audience: 二度寝や夜更かしで朝がつらい人
  tone: 睡眠生活習慣・二度寝ネタ・共感重視
  bgm_mood: 穏やか、生活改善、少し危機感
characters:
  left:
    character: reimu
    aquestalk_preset: 女性１
  right:
    character: marisa
    aquestalk_preset: まりさ
scenes:
  - id: s01
    title_text: 目覚まし増殖の罠
    motion_mode: punch
    main:
      kind: image
      asset: assets/s01_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 不安喚起
        composition_type: 失敗例シミュレーション
        imagegen_prompt_ref: s01.main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: sceneの要点に一致
    dialogue:
      - id: d01
        speaker: left
        text: 見て魔理沙、目覚ましを七個かけたのに全部止めてた！
        expression: shock
        emphasis:
          words:
            - 七個
          style: danger
          se: warning
          pause_after_ms: 300
      - id: d02
        speaker: right
        text: それは起きる準備じゃなくて、止める練習を七回してるだけだぜ。
        expression: wry
        emphasis:
          words:
            - 止める練習
          style: punch
          se: pop
          pause_after_ms: 300
      - id: d03
        speaker: left
        text: 目覚ましを増やすほど、起きられなくなるってこと？
        expression: surprise
        emphasis:
          words:
            - 増やすほど
          style: surprise
          se: question
          pause_after_ms: 300
      - id: d04
        speaker: right
        text: そういう落とし穴があるんだぜ。脳が「また鳴る」と覚えると、一回目を軽く扱いやすいんだぜ。
        expression: serious
        emphasis:
          words:
            - また鳴る
          style: danger
          se: reveal
          pause_after_ms: 300
      - id: d05
        speaker: left
        text: 一回目のアラーム、完全に前座扱いね。
        expression: wry
        emphasis:
          words:
            - 前座扱い
          style: punch
          se: none
          pause_after_ms: 0
      - id: d06
        speaker: right
        text: 今回の勝ち筋は、目覚ましを増やすより、起きた後の最初の動きを決めることだぜ。
        expression: confident
        emphasis:
          words:
            - 最初の動き
          style: action
          se: success
          pause_after_ms: 300
  - id: s02
    title_text: 二度寝の予約ボタン
    motion_mode: compare
    main:
      kind: image
      asset: assets/s02_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 比較
        composition_type: NG / OK 比較
        imagegen_prompt_ref: s02.main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: sceneの要点に一致
    dialogue:
      - id: d01
        speaker: left
        text: でもスヌーズって優しさじゃないの？あと五分くれる天使よ。
        expression: smile
        emphasis:
          words:
            - あと五分
          style: punch
          se: none
          pause_after_ms: 0
      - id: d02
        speaker: right
        text: 天使に見える悪魔だぜ。あと五分を何回も押すと、朝の判断力がどんどん削られるんだぜ。
        expression: serious
        emphasis:
          words:
            - 判断力
          style: danger
          se: warning
          pause_after_ms: 300
      - id: d03
        speaker: left
        text: 朝の私は判断力が豆腐なのよ。
        expression: worried
        emphasis:
          words:
            - 豆腐
          style: punch
          se: pop
          pause_after_ms: 300
      - id: d04
        speaker: right
        text: だから朝に判断させちゃだめなんだぜ。起きる、座る、水を飲む、カーテンを開ける。この流れを前日の夜に決めるんだぜ。
        expression: confident
        emphasis:
          words:
            - 前日の夜
          style: action
          se: success
          pause_after_ms: 300
      - id: d05
        speaker: left
        text: 朝の私に作戦会議をさせないってことね。
        expression: happy
        emphasis:
          words:
            - 作戦会議をさせない
          style: action
          se: success
          pause_after_ms: 300
      - id: d06
        speaker: right
        text: そうだぜ。眠い自分は信用せず、夜の自分がレールを敷くんだぜ。
        expression: calm
        emphasis:
          words:
            - レールを敷く
          style: action
          se: success
          pause_after_ms: 300
  - id: s03
    title_text: 寝る直前スマホの反撃
    motion_mode: warning
    main:
      kind: image
      asset: assets/s03_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 不安喚起
        composition_type: 事故寸前構図
        imagegen_prompt_ref: s03.main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: sceneの要点に一致
    dialogue:
      - id: d01
        speaker: left
        text: 寝る前のスマホは、ちょっと見るだけよ。ほんの動画三本くらい。
        expression: smirk
        emphasis:
          words:
            - 動画三本
          style: number
          se: question
          pause_after_ms: 300
      - id: d02
        speaker: right
        text: それはちょっとじゃないだぜ。寝る直前に刺激を入れると、眠るスイッチが入りにくくなるんだぜ。
        expression: serious
        emphasis:
          words:
            - 眠るスイッチ
          style: danger
          se: warning
          pause_after_ms: 300
      - id: d03
        speaker: left
        text: 私の睡眠スイッチ、動画のおすすめ欄に吸われてるわ。
        expression: worried
        emphasis:
          words:
            - おすすめ欄
          style: danger
          se: none
          pause_after_ms: 0
      - id: d04
        speaker: right
        text: しかも「あと一本」が一番強いんだぜ。終わりを決めないスマホは、寝る時間をじわじわ奪うんだぜ。
        expression: confident
        emphasis:
          words:
            - あと一本
          style: danger
          se: reveal
          pause_after_ms: 300
      - id: d05
        speaker: left
        text: 気づいたら日付が変わってるやつね。
        expression: shock
        emphasis:
          words:
            - 日付が変わる
          style: danger
          se: none
          pause_after_ms: 0
      - id: d06
        speaker: right
        text: 対策はシンプルだぜ。布団にスマホを持ち込まない。充電場所をベッドから離す。これだけで朝がかなり変わるんだぜ。
        expression: calm
        emphasis:
          words:
            - ベッドから離す
          style: action
          se: success
          pause_after_ms: 300
  - id: s04
    title_text: 休日寝だめの時差ぼけ
    motion_mode: normal
    main:
      kind: image
      asset: assets/s04_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 理解補助
        composition_type: 原因マップ
        imagegen_prompt_ref: s04.main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: sceneの要点に一致
    dialogue:
      - id: d01
        speaker: left
        text: 平日つらい分、休日に昼まで寝れば回復するんじゃない？
        expression: confused
        emphasis:
          words:
            - 昼まで寝る
          style: surprise
          se: question
          pause_after_ms: 300
      - id: d02
        speaker: right
        text: 回復する面もあるけど、毎週時差ぼけを作ることもあるんだぜ。
        expression: calm
        emphasis:
          words:
            - 時差ぼけ
          style: surprise
          se: reveal
          pause_after_ms: 300
      - id: d03
        speaker: left
        text: 家にいるのに海外旅行してるの？
        expression: laugh
        emphasis:
          words:
            - 海外旅行
          style: punch
          se: pop
          pause_after_ms: 300
      - id: d04
        speaker: right
        text: 体内時計の話だぜ。休日だけ起きる時間が大きくズレると、月曜の朝がさらに重くなるんだぜ。
        expression: serious
        emphasis:
          words:
            - 月曜の朝
          style: danger
          se: warning
          pause_after_ms: 300
      - id: d05
        speaker: left
        text: 月曜が強敵になる理由、私が育ててたのね。
        expression: wry
        emphasis:
          words:
            - 育ててた
          style: punch
          se: none
          pause_after_ms: 0
      - id: d06
        speaker: right
        text: 休日も完全に同じにしなくていい。でもズラすなら一、二時間くらいに抑えると戻しやすいだぜ。
        expression: confident
        emphasis:
          words:
            - 一、二時間
          style: number
          se: success
          pause_after_ms: 300
  - id: s05
    title_text: 朝の敵は夜に生まれる
    motion_mode: reveal
    main:
      kind: image
      asset: assets/s05_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 証拠提示
        composition_type: 原因マップ
        imagegen_prompt_ref: s05.main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: sceneの要点に一致
    dialogue:
      - id: d01
        speaker: left
        text: でも朝起きられないのは、朝の根性が足りないからでしょ？
        expression: worried
        emphasis:
          words:
            - 根性
          style: danger
          se: question
          pause_after_ms: 300
      - id: d02
        speaker: right
        text: そこが大きな誤解だぜ。朝の敵は、だいたい夜に作られてるんだぜ。
        expression: confident
        emphasis:
          words:
            - 夜に作られてる
          style: punch
          se: reveal
          pause_after_ms: 300
      - id: d03
        speaker: left
        text: 中盤で急に犯人が夜になったわ。
        expression: shock
        emphasis:
          words:
            - 犯人が夜
          style: surprise
          se: pop
          pause_after_ms: 300
      - id: d04
        speaker: right
        text: 寝る時刻、スマホ、カフェイン、明日の準備不足。これが朝の重さに変わるんだぜ。
        expression: serious
        emphasis:
          words:
            - 朝の重さ
          style: danger
          se: warning
          pause_after_ms: 300
      - id: d05
        speaker: left
        text: 朝の私、夜の私のツケを払ってるだけじゃない。
        expression: wry
        emphasis:
          words:
            - ツケ
          style: danger
          se: none
          pause_after_ms: 0
      - id: d06
        speaker: right
        text: そうだぜ。だから朝を変えたいなら、夜の最後三十分を整えるのが近道なんだぜ。
        expression: confident
        emphasis:
          words:
            - 夜の最後三十分
          style: number
          se: success
          pause_after_ms: 300
  - id: s06
    title_text: カフェインの残業
    motion_mode: warning
    main:
      kind: image
      asset: assets/s06_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 理解補助
        composition_type: 誇張図解
        imagegen_prompt_ref: s06.main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: sceneの要点に一致
    dialogue:
      - id: d01
        speaker: left
        text: 夕方のコーヒーくらい平気よ。眠気を倒す相棒だもの。
        expression: confident
        emphasis:
          words:
            - 夕方のコーヒー
          style: punch
          se: none
          pause_after_ms: 0
      - id: d02
        speaker: right
        text: 相棒が夜まで残業することがあるんだぜ。体質にもよるけど、カフェインは思ったより長く残る場合があるんだぜ。
        expression: serious
        emphasis:
          words:
            - 夜まで残業
          style: danger
          se: warning
          pause_after_ms: 300
      - id: d03
        speaker: left
        text: コーヒー、退勤してなかったのね。
        expression: surprise
        emphasis:
          words:
            - 退勤してなかった
          style: surprise
          se: pop
          pause_after_ms: 300
      - id: d04
        speaker: right
        text: 眠れない自覚があるなら、午後遅めのカフェインを控えてみる価値はあるぜ。
        expression: calm
        emphasis:
          words:
            - 午後遅め
          style: action
          se: success
          pause_after_ms: 300
      - id: d05
        speaker: left
        text: いきなり禁止じゃなくて、試してみる感じならできそう。
        expression: happy
        emphasis:
          words:
            - 試してみる
          style: action
          se: success
          pause_after_ms: 300
      - id: d06
        speaker: right
        text: そうだぜ。睡眠は個人差があるから、まず一週間だけ記録して変化を見るのが安全だぜ。
        expression: confident
        emphasis:
          words:
            - 一週間だけ記録
          style: number
          se: success
          pause_after_ms: 300
  - id: s07
    title_text: 起きた後が空白だと負ける
    motion_mode: checklist
    main:
      kind: image
      asset: assets/s07_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 手順整理
        composition_type: 手順図
        imagegen_prompt_ref: s07.main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: sceneの要点に一致
    dialogue:
      - id: d01
        speaker: left
        text: 起きた後の予定？とりあえず布団の中で人生を考えるわ。
        expression: wry
        emphasis:
          words:
            - 布団の中
          style: punch
          se: pop
          pause_after_ms: 300
      - id: d02
        speaker: right
        text: それが危ないんだぜ。起きた後が空白だと、布団が会議室になるんだぜ。
        expression: wry
        emphasis:
          words:
            - 布団が会議室
          style: danger
          se: warning
          pause_after_ms: 300
      - id: d03
        speaker: left
        text: 議題は、あと五分寝るべきか。
        expression: smirk
        emphasis:
          words:
            - あと五分
          style: punch
          se: none
          pause_after_ms: 0
      - id: d04
        speaker: right
        text: その会議は毎回寝る方に可決されるぜ。だから最初の一手を固定するんだぜ。
        expression: confident
        emphasis:
          words:
            - 最初の一手
          style: action
          se: reveal
          pause_after_ms: 300
      - id: d05
        speaker: left
        text: たとえば？
        expression: confused
        emphasis:
          words:
            - たとえば
          style: surprise
          se: question
          pause_after_ms: 300
      - id: d06
        speaker: right
        text: 足を床につける、水を一口飲む、カーテンを開ける。難しいことじゃなく、体を起床モードに移す動きでいいんだぜ。
        expression: calm
        emphasis:
          words:
            - 足を床につける
          style: action
          se: success
          pause_after_ms: 300
  - id: s08
    title_text: 完璧な朝活はいらない
    motion_mode: compare
    main:
      kind: image
      asset: assets/s08_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 比較
        composition_type: NG / OK 比較
        imagegen_prompt_ref: s08.main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: sceneの要点に一致
    dialogue:
      - id: d01
        speaker: left
        text: よし、明日から五時起きで運動して読書して手帳を書くわ。
        expression: confident
        emphasis:
          words:
            - 五時起き
          style: number
          se: question
          pause_after_ms: 300
      - id: d03
        speaker: left
        text: 三日坊主どころか一日坊主になりそう。
        expression: worried
        emphasis:
          words:
            - 一日坊主
          style: danger
          se: none
          pause_after_ms: 0
      - id: d04
        speaker: right
        text: 最初は朝活じゃなくて、起きるだけで合格にするんだぜ。余裕が出たら一つ足す。順番が大事だぜ。
        expression: confident
        emphasis:
          words:
            - 起きるだけで合格
          style: action
          se: success
          pause_after_ms: 300
      - id: d05
        speaker: left
        text: 合格ラインを低くするのね。
        expression: happy
        emphasis:
          words:
            - 合格ライン
          style: action
          se: success
          pause_after_ms: 300
      - id: d06
        speaker: right
        text: 低くするんじゃなく、続く高さに合わせるんだぜ。勝てる朝を作るんだぜ。
        expression: calm
        emphasis:
          words:
            - 勝てる朝
          style: punch
          se: success
          pause_after_ms: 300
  - id: s09
    title_text: 前日の準備で朝を軽くする
    motion_mode: checklist
    main:
      kind: image
      asset: assets/s09_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: 手順整理
        composition_type: チェックリスト
        imagegen_prompt_ref: s09.main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: sceneの要点に一致
    dialogue:
      - id: d01
        speaker: left
        text: 朝って、服を選ぶだけで一仕事なのよ。
        expression: worried
        emphasis:
          words:
            - 服を選ぶ
          style: danger
          se: none
          pause_after_ms: 0
      - id: d02
        speaker: right
        text: だから前日に減らすんだぜ。服、バッグ、鍵、飲み物。この四つを夜に置いておくと朝の迷いが減るんだぜ。
        expression: confident
        emphasis:
          words:
            - 四つ
          style: number
          se: pop
          pause_after_ms: 300
      - id: d03
        speaker: left
        text: 朝の私から選択肢を取り上げる作戦ね。
        expression: smile
        emphasis:
          words:
            - 選択肢を取り上げる
          style: action
          se: success
          pause_after_ms: 300
      - id: d04
        speaker: right
        text: そうだぜ。朝は意志力が少ない時間帯だから、選ぶより流れる形にした方が楽なんだぜ。
        expression: calm
        emphasis:
          words:
            - 流れる形
          style: action
          se: success
          pause_after_ms: 300
      - id: d05
        speaker: left
        text: 準備してある服に自動で吸い寄せられたいわ。
        expression: laugh
        emphasis:
          words:
            - 吸い寄せられたい
          style: punch
          se: none
          pause_after_ms: 0
  - id: s10
    title_text: 明日は一つで起きる
    motion_mode: recap
    main:
      kind: image
      asset: assets/s10_main.png
    sub: null
    visual_asset_plan:
      - slot: main
        image_role: オチ補助
        composition_type: チェックリスト
        imagegen_prompt_ref: s10.main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: sceneの要点に一致
    dialogue:
      - id: d01
        speaker: left
        text: まとめると、目覚ましを増やすより、夜と起きた直後を整えるのね。
        expression: happy
        emphasis:
          words:
            - 夜と起きた直後
          style: action
          se: success
          pause_after_ms: 300
      - id: d02
        speaker: right
        text: その通りだぜ。明日の行動は一つ。アラームを一つに減らして、鳴ったら足を床につけるんだぜ。
        expression: confident
        emphasis:
          words:
            - アラームを一つ
          style: action
          se: reveal
          pause_after_ms: 300
      - id: d03
        speaker: left
        text: 七個の目覚まし軍団は解散ね。
        expression: wry
        emphasis:
          words:
            - 解散
          style: punch
          se: pop
          pause_after_ms: 300
      - id: d04
        speaker: right
        text: 不安なら予備は離れた場所に一つだけだぜ。でも本命は、最初の一回で動くことなんだぜ。
        expression: serious
        emphasis:
          words:
            - 最初の一回
          style: action
          se: success
          pause_after_ms: 300
      - id: d05
        speaker: left
        text: コメントでは、みんなの朝の一番の敵を教えてほしいわ。スマホ、二度寝、夜更かし、どれ？
        expression: smile
        emphasis:
          words:
            - 朝の一番の敵
          style: action
          se: question
          pause_after_ms: 300
      - id: d06
        speaker: right
        text: 書くだけでも対策が見えやすくなるぜ。明日の朝は、増やすより減らす。これでいくんだぜ。
        expression: confident
        emphasis:
          words:
            - 増やすより減らす
          style: action
          se: success
          pause_after_ms: 300
