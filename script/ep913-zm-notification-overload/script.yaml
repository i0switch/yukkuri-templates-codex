meta:
  id: ep913-zm-notification-overload
  title: 通知を全部ONにしてる人が毎日失う時間の話
  layout_template: Scene16
  pair: ZM
  fps: 30
  width: 1280
  height: 720
  audience: スマホ通知をなんとなく全部ONにしている社会人
  tone: 数字で刺してから実行可能な設定手順で締める
  bgm_mood: 軽くテンポのいいSF風解説用BGM
  voice_engine: voicevox
  target_duration_sec: 180
  image_style: 太線フラット図解。SF黒背景でも読める高コントラスト。 緑・シアン・黄をアクセントに使う。余白多め、文字最小限。
  typography:
    subtitle_family: gothic
    content_family: gothic
    title_family: gothic
    subtitle_stroke_color: "#000000"
    subtitle_stroke_width: 6
characters:
  left:
    character: zundamon
    voicevox_speaker_id: 3
    speaking_style: 視聴者代表。浅い理解、驚き、ボケ担当。語尾は「のだ」「なのだ」。
  right:
    character: metan
    voicevox_speaker_id: 2
    speaking_style: 解説役。冷静に数字で刺し、具体手順まで落とす。
scenes:
  - id: s01
    role: intro
    scene_goal: 通知確認が1日23回・2時間消失というフックで刺す
    scene_format: 誤解訂正型
    viewer_question: 通知を全部確認して何が悪いのか
    viewer_misunderstanding: 通知を見るのは素早い対応でよいことだと思っている
    number_or_example: 1日23回の通知確認で約2時間のロス
    visual_role: 通知が積み重なって時間を溶かすフックイメージ
    title_text: 通知全部ONで毎日2時間消えてる話
    main:
      kind: image
      asset: assets/s01_main.png
      caption: 通知が時間を黙って盗んでいく
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 通知確認が時間を大量に奪うことをフックで視覚化
        supports_dialogue:
          - s01_l04
          - s01_l05
          - s01_l06
        supports_moment: めたんが「切り替えロスで約2時間」と言った瞬間
        visual_type: hook_poster
        composition_type: time_drain_visual
        image_direction:
          dialogue_role: 冒頭フックで危機感を最大化する
          scene_emotion: 「え、2時間も？」というショック
          image_should_support: 通知1回ごとに時間が少しずつ消えていく感覚
          key_visual_sentence: 通知のたびに集中が切れて合計2時間が溶ける
          main_subject: スマホ画面から砂時計のように時間が流れ落ちるイラスト
          foreground: シアン色のスマホシルエット、画面から砂が落ちる
          midground: 落ちた砂が下に積もり「2h」のラベル
          background: 暗いSF背景（深いネイビー）
          color_palette: シアン・黄・深ネイビー・白
          text_strategy:
            image_text_allowed: true
            image_text_max_words: 3
            remotion_overlay_text:
              - 2時間
              - 毎日
          layout_safety:
            keep_bottom_20_percent_empty: true
            avoid_character_area: true
            avoid_sub_area_overlap: true
          must_not_include:
            - 実在スマホブランド
            - 実在アプリUI
            - 実在人物
            - ずんだもん・めたん風キャラ
          quality_bar: 「時間が消える」フックとして視聴継続を引く品質
          composition_type: time_drain_visual
        imagegen_prompt: |-
          ゆっくり解説動画Scene16 main枠（1920×1080、下部20%空き）用の高品質ビジュアル素材。1枚のみ生成。
          テーマ：スマホ通知が時間を奪う「時間流出」フックポスター。
          構図：中央にシアン色のスマホシルエット（実在ブランドのデザイン禁止）。
          スマホ画面下部から砂時計の砂のように黄色い粒が流れ落ちている。
          下部に積もった砂の山に「2h」のラベル。
          背景は深いネイビー〜黒のSFグラデーション。
          前景にスマホ、中景に砂の流れ、下部に砂山。
          色：シアン・黄・深ネイビー・白、太線フラット、高コントラスト。
          文字：「2h」「毎日」のみ許可。長文・実在ブランド禁止。
          禁止：実在スマホUI、実在アプリアイコン、実在人物、ずんだもん・めたん風キャラ。
          下部20%完全空き。
          【使用目的】ゆっくり解説動画のhook_posterのセリフ補強素材。高品質なYouTube解説動画向け仕上がり。この1枚専用に個別生成すること。他画像と同時生成しない。 余白を十分に取り、シンプルで読みやすい構図にすること。実在人物なし、ロゴなし、既存キャラクターなし、細かい文字なし。
          Remotionの重ねテキストは最小限。画像内の文字は長文は入れない。
    dialogue:
      - id: l01
        speaker: left
        text: なんか常にスマホ触ってる気がするのだ。
      - id: l02
        speaker: right
        text: 通知が来るたびに確認してるからよ。
      - id: l03
        speaker: left
        text: 通知は全部見ないといけないのだ！
      - id: l04
        speaker: right
        text: それ、1日23回の集中切断になってるわ。
      - id: l05
        speaker: left
        text: 23回！？それ何時間分なのだ？
      - id: l06
        speaker: right
        text: 切り替えロスだけで約2時間よ。
      - id: l07
        speaker: left
        text: 2時間も無駄にしてたのだ！？
      - id: l08
        speaker: right
        text: 毎日積み重なってる損失よ。
      - id: l09
        speaker: left
        text: 絶対やり方を変えたいのだ！
      - id: l10
        speaker: right
        text: 通知の整理で取り戻せるわよ。
  - id: s02
    role: body
    scene_goal: 通知確認後の集中回復コスト（23分）を数字で伝える
    scene_format: 数字補強型
    viewer_question: なぜ通知確認がそんなに時間を奪うのか
    viewer_misunderstanding: 通知確認は一瞬で終わると思っている
    number_or_example: 集中回復に平均23分・10回で4時間弱消費
    visual_role: 通知1回あたりの集中回復コストの数字グラフ
    title_text: 通知1回で23分の集中が消える
    main:
      kind: image
      asset: assets/s02_main.png
      caption: 一瞬の確認が23分のコストを生む
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 通知確認後の集中回復コスト23分をタイムライン図で視覚化
        supports_dialogue:
          - s02_l01
          - s02_l02
          - s02_l04
          - s02_l05
        supports_moment: めたんが「平均23分かかる」「10回で4時間弱」と言う場面
        visual_type: danger_simulation
        composition_type: notification_cost_timeline
        image_direction:
          dialogue_role: 数字で危機感を高める
          scene_emotion: 「1回確認しただけなのに23分も！？」のショック
          image_should_support: 通知確認→集中回復コストの時間の長さが直感的に分かる
          key_visual_sentence: 通知を1回確認するたびに23分の集中時間が消える
          main_subject: 横長タイムライン。「通知確認：数秒」vs「集中回復：23分」の長さ対比
          foreground: タイムライン上の2区間（短い赤と長い黄）
          midground: 23分の区間を朱色矢印でハイライト
          background: 暗いSF背景
          color_palette: シアン・黄・朱・深ネイビー
          text_strategy:
            image_text_allowed: true
            image_text_max_words: 3
            remotion_overlay_text:
              - 確認
              - 回復23分
          layout_safety:
            keep_bottom_20_percent_empty: true
            avoid_character_area: true
            avoid_sub_area_overlap: true
          must_not_include:
            - 実在UI
            - 実在人物
            - 長文テキスト
          quality_bar: 時間の長さ対比が一目で伝わる品質
          composition_type: notification_cost_timeline
        imagegen_prompt: |-
          ゆっくり解説動画Scene16 main枠用。1枚のみ生成。
          テーマ：通知確認（数秒）vs集中回復（23分）の長さ対比タイムライン図。
          構図：横長のタイムライン。左端の短いシアンブロック「確認 数秒」、右側の長い黄ブロック「集中回復 23分」。
          長いブロックに朱色の矢印と「×10回＝4時間」の補足ラベル。
          背景は暗いネイビー〜黒のSFグラデーション。
          色：シアン・黄・朱・深ネイビー、太線フラット、高コントラスト。
          文字：「確認」「回復23分」のみ許可。
          禁止：実在UI、実在人物、長文テキスト。
          下部20%完全空き。
          【使用目的】ゆっくり解説動画のdanger_simulationのセリフ補強素材。高品質なYouTube解説動画向け仕上がり。この1枚専用に個別生成すること。他画像と同時生成しない。 余白を十分に取り、シンプルで読みやすい構図にすること。実在人物なし、ロゴなし、既存キャラクターなし、細かい文字なし。
          Remotionの重ねテキストは最小限。画像内の文字は長文は入れない。
    dialogue:
      - id: l01
        speaker: right
        text: 通知を見ると集中を取り戻すのに
      - id: l02
        speaker: right
        text: 平均23分かかると言われてるわ。
      - id: l03
        speaker: left
        text: 23分！通知1回で23分なのだ？
      - id: l04
        speaker: right
        text: 1日10回確認したら
      - id: l05
        speaker: right
        text: それだけで4時間弱が消えるのよ。
      - id: l06
        speaker: left
        text: 4時間は嫌すぎるのだ！
      - id: l07
        speaker: right
        text: 集中がブツ切れになってるのよ。
      - id: l08
        speaker: left
        text: 知らないうちに損してたのだ。
      - id: l09
        speaker: right
        text: 積み重なると膨大なコストよ。
      - id: l10
        speaker: left
        text: 節約しないといけないのだ！
  - id: s03
    role: body
    scene_goal: 「重要以外全部OFF」への恐怖を誤解訂正して乗り越えさせる
    scene_format: 誤解訂正型
    viewer_question: 全部OFFにしたら大事な通知を見逃さないか
    viewer_misunderstanding: 通知をOFFにすると重要な連絡を見逃すと思っている
    number_or_example: 即対応が必要な通知は1日のうち数件だけ
    visual_role: 通知の種類分類（ON許可 vs OFF推奨）の仕分け図
    title_text: 全部OFFが怖い人への仕分けルール
    main:
      kind: image
      asset: assets/s03_main.png
      caption: 鳴らしていい通知だけを残す
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 通知OFFへの恐怖を「ON許可 vs OFF推奨」の仕分けで解消する
        supports_dialogue:
          - s03_l04
          - s03_l05
          - s03_l06
        supports_moment: めたんが「即対応が必要なものだけ」と言う場面
        visual_type: myth_vs_fact
        composition_type: notification_sort_two_column
        image_direction:
          dialogue_role: 誤解訂正フレーム
          scene_emotion: 「なにを残せばいいか分かった」という安心感
          image_should_support: ON許可とOFF推奨の2カラム仕分けが明確に分かる
          key_visual_sentence: 鳴らしていい通知は即対応が必要なものだけ
          main_subject: 左「ON許可（電話・緊急）」右「OFF推奨（SNS・広告）」の2カラム
          foreground: 各カラムに3つ以内のアイコン（電話、メッセージ、SNS風）
          midground: カラム間の仕分けライン
          background: 暗いSF背景
          color_palette: シアン（ON）・朱（OFF）・深ネイビー・白
          text_strategy:
            image_text_allowed: true
            image_text_max_words: 3
            remotion_overlay_text:
              - ON許可
              - OFF推奨
          layout_safety:
            keep_bottom_20_percent_empty: true
            avoid_character_area: true
            avoid_sub_area_overlap: true
          must_not_include:
            - 実在アプリアイコン
            - 実在ブランドロゴ
            - 実在人物
            - 長文
          quality_bar: ON/OFFの仕分けが一目で理解できる品質
          composition_type: notification_sort_two_column
        imagegen_prompt: |-
          ゆっくり解説動画Scene16 main枠用。1枚のみ生成。
          テーマ：通知のON許可とOFF推奨を仕分けする2カラム図解。
          構図：左カラム「ON許可（シアン背景）」に電話アイコン・直接メッセージアイコン（最大2つ、実在ブランド禁止）。
          右カラム「OFF推奨（朱色背景）」にSNS風アイコン・広告アイコン（最大2つ、実在ブランド禁止）。
          カラム間に縦の仕分けライン。背景は暗いネイビー〜黒。
          色：シアン・朱・深ネイビー・白、太線フラット、高コントラスト。
          文字：「ON許可」「OFF推奨」各3文字のみ許可。
          禁止：実在アプリアイコン、実在ブランドロゴ、実在人物、長文。
          下部20%完全空き。
          【使用目的】ゆっくり解説動画のmyth_vs_factのセリフ補強素材。高品質なYouTube解説動画向け仕上がり。この1枚専用に個別生成すること。他画像と同時生成しない。 余白を十分に取り、シンプルで読みやすい構図にすること。実在人物なし、ロゴなし、既存キャラクターなし、細かい文字なし。
          Remotionの重ねテキストは最小限。画像内の文字は長文は入れない。
    dialogue:
      - id: l01
        speaker: left
        text: じゃあ全部OFFにすればいいのだ！
      - id: l02
        speaker: right
        text: 全部OFFは極端すぎるわよ。
      - id: l03
        speaker: left
        text: 大事なの見逃しそうで怖いのだ。
      - id: l04
        speaker: right
        text: 必要な通知は即対応が必要なものだけよ。
      - id: l05
        speaker: left
        text: 即対応が必要なもの、思い浮かばないのだ。
      - id: l06
        speaker: right
        text: 電話と緊急連絡だけよ。それ以外は後でいい。
      - id: l07
        speaker: left
        text: SNSの通知は即対応じゃないのだ？
      - id: l08
        speaker: right
        text: あれは「気にさせる」設計で来てるのよ。
      - id: l09
        speaker: left
        text: 気にさせる設計って怖いのだ。
      - id: l10
        speaker: right
        text: だから通知OFFが正解なのよ。
  - id: s04
    role: body
    scene_goal: 通知タイプ別に許可基準を3つの分類で示す
    scene_format: 手順型
    viewer_question: 具体的にどの通知をOFFにすればいいか
    viewer_misunderstanding: SNSのいいね通知も仕事上必要かもしれないと思っている
    number_or_example: 残す通知3種類・切る通知の代表例はSNS全般
    visual_role: 通知許可基準3分類の図解
    title_text: 残す通知の基準は3種類だけ
    main:
      kind: image
      asset: assets/s04_main.png
      caption: 基準を決めると迷わなくなる
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 通知許可基準3分類（電話・直接連絡・緊急のみ）を視覚化
        supports_dialogue:
          - s04_l01
          - s04_l03
          - s04_l05
        supports_moment: めたんが「基準は3つよ」と整理する場面
        visual_type: checklist_panel
        composition_type: three_tier_criteria
        image_direction:
          dialogue_role: 行動基準を具体化して迷いを消す
          scene_emotion: 「これで基準が決まった」という明瞭感
          image_should_support: 通知ON許可の3基準が明確に分かる
          key_visual_sentence: 電話・緊急・仕事の直接連絡だけを残す
          main_subject: 縦に3行の基準リスト（各行にアイコン付き）
          foreground: 電話アイコン・緊急アイコン・直接連絡アイコンの3行
          midground: 各行をシアン色の細線で区切る
          background: 暗いSF背景
          color_palette: シアン・白・深ネイビー
          text_strategy:
            image_text_allowed: true
            image_text_max_words: 3
            remotion_overlay_text:
              - 電話
              - 緊急連絡
              - 直接連絡
          layout_safety:
            keep_bottom_20_percent_empty: true
            avoid_character_area: true
            avoid_sub_area_overlap: true
          must_not_include:
            - 実在アプリアイコン
            - 実在ブランドロゴ
            - 実在人物
            - 長文
          quality_bar: 3基準が一目で理解できる品質
          composition_type: three_tier_criteria
        imagegen_prompt: |-
          ゆっくり解説動画Scene16 main枠用。1枚のみ生成。
          テーマ：通知ON許可の3基準リスト。SF黒背景のチェックリストパネル。
          構図：縦3行のリスト。①電話アイコン＋「電話」、②緊急アイコン＋「緊急連絡」、③メッセージアイコン＋「直接連絡」。
          各行の左端にシアン色チェックマーク。行間はシアン細線で区切る。
          背景は暗いネイビー〜黒のSFグラデーション。
          色：シアン・白・深ネイビー、太線フラット、高コントラスト。
          文字：各ラベル4文字以内のみ許可。
          禁止：実在アプリアイコン、実在ブランドロゴ、実在人物、長文。
          下部20%完全空き。
          【使用目的】ゆっくり解説動画のchecklist_panelのセリフ補強素材。高品質なYouTube解説動画向け仕上がり。この1枚専用に個別生成すること。他画像と同時生成しない。 余白を十分に取り、シンプルで読みやすい構図にすること。実在人物なし、ロゴなし、既存キャラクターなし、細かい文字なし。
          Remotionの重ねテキストは最小限。画像内の文字は長文は入れない。
    dialogue:
      - id: l01
        speaker: right
        text: 基準は3つよ。まず電話と緊急連絡。
      - id: l02
        speaker: left
        text: それは分かるのだ！
      - id: l03
        speaker: right
        text: 次に仕事の直接連絡。グループ通知は切る。
      - id: l04
        speaker: left
        text: SNSの通知は全部いるのだ？
      - id: l05
        speaker: right
        text: SNSは全部OFFで試してみて。
      - id: l06
        speaker: left
        text: でもいいねの通知が楽しいのだ！
      - id: l07
        speaker: right
        text: 楽しいけど集中を売ってるのと同じよ。
      - id: l08
        speaker: left
        text: うっ、そう言われると弱いのだ。
      - id: l09
        speaker: right
        text: 集中は一番大事なリソースよ。
      - id: l10
        speaker: left
        text: リソースを守る設定をするのだ！
  - id: s05
    role: body
    scene_goal: 通知OFFで仕事速度28%増という数字で中盤再フックを刺す
    scene_format: 数字補強型
    viewer_question: 実際に通知を切った人はどうなったのか
    viewer_misunderstanding: 通知を切っても大して変わらないと思っている
    number_or_example: 通知OFFの1週間で仕事完了速度28%向上
    visual_role: 通知OFF前後の仕事速度比較グラフ
    title_text: 通知を切った1週間で速度28%増
    main:
      kind: image
      asset: assets/s05_main.png
      caption: 通知に動かされていた時間が戻ってくる
    sub: null
    visual_asset_plan:
      - slot: main
        purpose: 通知OFF実施後の仕事速度改善を中盤再フックで視覚化
        supports_dialogue:
          - s05_l03
          - s05_l04
          - s05_l05
        supports_moment: ずんだもんが「28%！それはすごいのだ」と驚く瞬間
        visual_type: before_after
        composition_type: work_speed_before_after
        image_direction:
          dialogue_role: 中盤再フックの数字インパクト
          scene_emotion: 「やれば確実に変わる」という期待感への転換
          image_should_support: 通知OFF前後の仕事速度の差が一目で分かる
          key_visual_sentence: 通知をOFFにした1週間で仕事の完了速度が28%上がった
