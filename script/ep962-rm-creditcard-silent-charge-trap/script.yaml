  title: クレカの明細を確認しない人が気づかず損している話
  layout_template: Scene02
  pair: RM
  fps: 30
  width: 1280
  height: 720
  audience: クレカ払いを日常的に使っているが明細をほとんど確認しない20〜40代
  tone: 生活感のあるゆっくり実用解説、軽い危機感から安心へ
  voice_engine: aquestalk
  target_duration_sec: 312
  image_style: クレジットカード明細、スマートフォン家計管理、落ち着いた赤・グレー・白を基調にした警戒感と誠実感

