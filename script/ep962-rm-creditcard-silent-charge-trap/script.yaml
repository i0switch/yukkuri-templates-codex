scenes:
  - id: s01
    role: intro
    scene_goal: 明細未確認の危険性を損失ファーストで提示
    viewer_question: 焦りと共感
    visual_role: スマートフォンのクレカ明細画面に見覚えのない請求が混じるコミカルな家計ビジュアル
    motion_mode: warning
    main:
      kind: image
      asset: assets/s01_main.png
    sub:
      kind: bullets
      items:
        - 見覚えのない請求が紛れる
        - 放置すると損が続く
        - 月1回確認が防御になる
    visual_asset_plan:
      - slot: main
        purpose: script_final直投げ型の挿入画像
        adoption_reason: 冒頭の損失提示シーンを視覚的に強調するため
        image_role: 不安喚起
        composition_type: 事故寸前構図
        imagegen_prompt: |-
          s01: 明細を開かない人の末路

          霊夢「ねえ魔理沙、クレカって払い終わったら明細なんて見なくてよくない？」
          魔理沙「それ、相当危険な考え方だぜ。」
          霊夢「え、なんで。引き落としされたら終わりでしょ。」
          魔理沙「引き落とされた中に、身に覚えのない請求が混じってたらどうするんだぜ。」
          霊夢「……それ、気づかなかったら？」
          魔理沙「そのままずっと払い続けるだぜ。半年気づかなかった人、実際にかなりいるんだぜ。」

          ゆっくり解説動画向けの挿入画像を日本語で生成してください。 この画像は会話内容をそのまま再現するためのものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。 字幕やセリフは別で表示するため、会話等は画像に入れないでください。 キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、UI、概念図、状況説明ビジュアルを中心に構成してください。 画面全体を有効活用し、情報が一目で伝わる、整理された高品質なビジュアルにしてください。 YouTubeの解説動画に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。 Make the aspect ratio 16:9.

          画像の雰囲気はクレジットカード明細、スマートフォン家計管理、落ち着いた赤・グレー・白を基調にした警戒感と誠実感で生成してください。下部20%は字幕とキャラクター用に余白を残し、実在ブランド、実在UI、会話全文、長文日本語、細かい表、ウォーターマークは入れないでください。
    dialogue:
      - id: l01
        speaker: left
        text: "魔理沙、知らない間に毎月お金が消えてたらどうする？クレカ明細って実は怖いよ。"
        expression: confused
        emphasis:
          words:
            - 消えてたら
          style: danger
          se: warning
          pause_after_ms: 300
      - id: l02
        speaker: right
        text: "毎月なんとなく明細を放置してる人、実はかなりいるんだぜ。"
        expression: shock
      - id: l03
        speaker: left
        text: "この動画を見れば確認すべき3つのポイントがわかるのね。"
        expression: smile
      - id: l04
        speaker: right
        text: "引き落とされた中に、身に覚えのない請求が混じってたらどうするんだ。"
        expression: confident
      - id: l05
        speaker: left
        text: "……それ、気づかなかったら？"
        expression: surprise
      - id: l06
        speaker: right
        text: "半年気づかなかった人が実際にかなりいる。静かに損し続けているんだぜ。"
        expression: smug

