scenes:
  - id: s01
    role: intro
    scene_goal: 電池消耗の悩みを数字で共感させ通知が原因と気づかせる
    viewer_question: 焦りと共感
    visual_role: 電池残量が昼過ぎに40%を切ったスマートフォン画面、充電ケーブルに繋がれた焦りのある情景
    motion_mode: warning
    main:
