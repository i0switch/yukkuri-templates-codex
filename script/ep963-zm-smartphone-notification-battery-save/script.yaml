        adoption_reason: 冒頭の電池消耗フック画像として視聴者の共感を引くため
        image_role: 不安喚起
        composition_type: 事故寸前構図
        imagegen_prompt: |-
          s01: 充電ケーブルから離れられない現実

          ずんだもん「めたん、ぼくのスマホ、昼過ぎには電池が40%を切るのだ。」
          めたん「それ、電池をすごく食っているものが裏で動いていますわ。」
          ずんだもん「使ってないのに電池が減っていくのだ。スマホって寝てても働いてるのだ？」
          めたん「正確には、あなたが何もしていない間も通知が来るたびにスマホが起きているのです。」
          ずんだもん「え、ぼくが寝てる間もスマホが起き上がってるのだ？それ大変なのだ。」
          めたん「その通り。通知の数が多いほど、電池はどんどん削れていくわ。」
          ずんだもん「ぼくのスマホ、ぼくより働き者なのだ。」
          めたん「心配しなくて大丈夫。設定を少し変えるだけで、電池の減りはかなり改善されますわ。」

          ゆっくり解説動画向けの挿入画像を日本語で生成してください。 この画像は会話内容をそのまま再現するためのものではなく、シーンの要点・状況・概念・比喩を視覚的にわかりやすく補強するためのコンテンツ画像です。 字幕やセリフは別で表示するため、会話等は画像に入れないでください。 キャラクター同士の会話シーンにはせず、テーマ理解を助ける図解、アイコン、小物、UI、概念図、状況説明ビジュアルを中心に構成してください。 画面全体を有効活用し、情報が一目で伝わる、整理された高品質なビジュアルにしてください。 YouTubeの解説動画に適した、見やすく印象的で、内容理解を助ける16:9の横長構図で作成してください。 Make the aspect ratio 16:9.

          画像の雰囲気はスマートフォン通知設定、電池アイコン、ブルーと緑を基調にした清潔でわかりやすいテック解説で生成してください。下部20%は字幕とキャラクター用に余白を残し、実在ブランド、実在UI、会話全文、長文日本語、細かい表、ウォーターマークは入れないでください。
